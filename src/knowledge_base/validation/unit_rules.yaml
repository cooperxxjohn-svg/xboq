# Unit validation rules for xBOQ
# For each item type: what IS the correct unit, what units are WRONG, and why.
# item_id_prefix matches the first 3 segments of taxonomy IDs (e.g. CIV.EW.EXC).
# error_type values: dimension_mismatch | unit_confusion | ambiguous_unit | rate_not_quantity
# is_code_ref: IS 1200 part numbers are the primary measurement standard.
#
# Schema:
#   item_id_prefix   - 3-segment taxonomy prefix  (STR.RCC.PCC)
#   canonical_name   - human-readable work description
#   correct_unit     - the single authoritative unit
#   also_acceptable  - other units that are valid with a note (empty list if none)
#   wrong_units      - list of units that are definitely wrong
#   error_type       - category of the error
#   error_message    - message template; {actual_unit} is substituted at runtime
#   is_code_ref      - IS code governing measurement
#   common_reason    - why this mistake is made in practice

unit_rules:

  # ---------------------------------------------------------------------------
  # CIVIL / EARTHWORK
  # ---------------------------------------------------------------------------

  - item_id_prefix: CIV.EW.EXC
    canonical_name: Excavation (foundation trenches, pits, bulk)
    correct_unit: cum
    also_acceptable: []
    wrong_units: [sqm, sqft, rmt, nos]
    error_type: dimension_mismatch
    error_message: "Excavation must be in cum (IS 1200 Part 1). Found {actual_unit} — this is a measurement dimension error (3D volume billed in 2D or count)."
    is_code_ref: IS 1200 Part 1
    common_reason: "Contractors sometimes quote in sqm (plan area only) which ignores depth entirely."

  - item_id_prefix: CIV.EW.FIL
    canonical_name: Earth filling and compaction
    correct_unit: cum
    also_acceptable: []
    wrong_units: [sqm, sqft, MT, rmt]
    error_type: dimension_mismatch
    error_message: "Earth filling must be in cum (IS 1200 Part 1). Found {actual_unit} — filling is a volume operation; area or weight units omit a critical dimension."
    is_code_ref: IS 1200 Part 1
    common_reason: "Some BOQs quote filling in sqm (plan area) treating it like a surface treatment; compaction rates sometimes quoted per MT which conflates material supply with placing."

  - item_id_prefix: CIV.EW.CMP
    canonical_name: Compaction of earthfill (mechanised)
    correct_unit: cum
    also_acceptable: []
    wrong_units: [sqm, sqft, MT, rmt]
    error_type: dimension_mismatch
    error_message: "Compaction must be in cum (IS 1200 Part 1). Found {actual_unit} — compaction is measured by volume of material placed and compacted."
    is_code_ref: IS 1200 Part 1
    common_reason: "Often confused with road sub-base compaction which can be sqm; for general earthfill it is always cum."

  - item_id_prefix: CIV.PL.BCI
    canonical_name: Bored cast-in-situ piling
    correct_unit: rmt
    also_acceptable: []
    wrong_units: [nos, sqm, sqft, cum]
    error_type: unit_confusion
    error_message: "Piling (bored cast-in-situ) must be in rmt (IS 1200 Part 16). Found {actual_unit} — length is the controlling dimension; billing per number ignores pile length variation."
    is_code_ref: IS 1200 Part 16
    common_reason: "Piles billed per 'nos' when pile lengths vary across the layout; this hides significant quantity risk."

  - item_id_prefix: CIV.EW.AT
    canonical_name: Anti-termite treatment (soil poisoning)
    correct_unit: sqm
    also_acceptable: []
    wrong_units: [cum, rmt, nos, liter]
    error_type: dimension_mismatch
    error_message: "Anti-termite treatment must be in sqm (IS 6313 Part 2). Found {actual_unit} — the treatment is applied to a surface area; volume or linear units are incorrect."
    is_code_ref: IS 6313 Part 2
    common_reason: "Applicators sometimes quote in liters (chemical quantity) rather than the treated area; this makes comparison impossible."

  - item_id_prefix: CIV.EW.DEM
    canonical_name: Demolition of structure (bulk)
    correct_unit: cum
    also_acceptable: [MT]
    wrong_units: [nos, sqm, sqft, rmt]
    error_type: unit_confusion
    error_message: "Bulk demolition must be in cum or MT (IS 1200 Part 2). Found {actual_unit} — 'nos' is acceptable only for discrete items (individual columns, walls); bulk rubble demolition requires volume or weight."
    is_code_ref: IS 1200 Part 2
    common_reason: "BOQs often list demolition as 'nos of rooms' or 'nos of walls' which gives no basis for calculating debris disposal or shoring requirements."

  - item_id_prefix: CIV.UW.EXC
    canonical_name: Underwater / dewatered excavation
    correct_unit: cum
    also_acceptable: []
    wrong_units: [sqm, sqft, rmt, nos]
    error_type: dimension_mismatch
    error_message: "Underwater excavation must be in cum (IS 1200 Part 1). Found {actual_unit} — same as ordinary excavation; dewatering is a separate item."
    is_code_ref: IS 1200 Part 1
    common_reason: "Dewatering pump hours sometimes conflated with excavation quantity."

  # ---------------------------------------------------------------------------
  # STRUCTURAL — RCC CONCRETE
  # ---------------------------------------------------------------------------

  - item_id_prefix: STR.RCC.PCC
    canonical_name: Plain cement concrete (PCC)
    correct_unit: cum
    also_acceptable: []
    wrong_units: [sqm, sqft, MT, kg, rmt]
    error_type: dimension_mismatch
    error_message: "PCC must be in cum (IS 1200 Part 2). Found {actual_unit} — concrete is a 3D volume pour; area or weight units are incorrect and prevent proper rate verification."
    is_code_ref: IS 1200 Part 2
    common_reason: "Thin blinding courses sometimes quoted in sqm by area; MT is a material-supply unit not a placing unit."

  - item_id_prefix: STR.RCC.FTG
    canonical_name: RCC footing / foundation concrete
    correct_unit: cum
    also_acceptable: []
    wrong_units: [sqm, sqft, MT, nos, rmt]
    error_type: dimension_mismatch
    error_message: "RCC footing concrete must be in cum (IS 1200 Part 2). Found {actual_unit} — footings are volumetric; 'nos' hides size variation across footing schedule."
    is_code_ref: IS 1200 Part 2
    common_reason: "BOQs sometimes list footings as 'nos' when sizes vary widely, leading to under-pricing of larger footings."

  - item_id_prefix: STR.RCC.COL
    canonical_name: RCC column concrete
    correct_unit: cum
    also_acceptable: []
    wrong_units: [sqm, sqft, MT, nos, rmt]
    error_type: dimension_mismatch
    error_message: "RCC columns must be in cum (IS 1200 Part 2). Found {actual_unit} — column concrete is measured by volume poured."
    is_code_ref: IS 1200 Part 2
    common_reason: "Columns occasionally quoted per 'nos' without size reference, causing rate ambiguity."

  - item_id_prefix: STR.RCC.BEM
    canonical_name: RCC beam concrete
    correct_unit: cum
    also_acceptable: []
    wrong_units: [sqm, sqft, MT, nos, rmt]
    error_type: dimension_mismatch
    error_message: "RCC beams must be in cum (IS 1200 Part 2). Found {actual_unit} — beam concrete is measured by volume; length alone (rmt) ignores cross-section."
    is_code_ref: IS 1200 Part 2
    common_reason: "rmt used for beams when cross-section is 'standard', but cross-section variations are common."

  - item_id_prefix: STR.RCC.SLB
    canonical_name: RCC slab concrete
    correct_unit: cum
    also_acceptable: []
    wrong_units: [sqm, sqft, MT, rmt]
    error_type: dimension_mismatch
    error_message: "RCC slab concrete must be in cum (IS 1200 Part 2). Found {actual_unit} — sqm ignores slab thickness; a 125mm and 200mm slab have the same plan area but very different volumes."
    is_code_ref: IS 1200 Part 2
    common_reason: "Slabs measured in sqm when thickness is uniform, but thickness changes at cantilevers and thickened edges are missed."

  - item_id_prefix: STR.RCC.PLC
    canonical_name: RCC plinth beam / grade beam concrete
    correct_unit: cum
    also_acceptable: []
    wrong_units: [sqm, sqft, MT, nos, rmt]
    error_type: dimension_mismatch
    error_message: "RCC plinth beam concrete must be in cum (IS 1200 Part 2). Found {actual_unit}."
    is_code_ref: IS 1200 Part 2
    common_reason: "Grade beams sometimes quoted in rmt (length only) ignoring depth and width."

  # ---------------------------------------------------------------------------
  # STRUCTURAL — FORMWORK / SHUTTERING
  # ---------------------------------------------------------------------------

  - item_id_prefix: STR.FW.FND
    canonical_name: Formwork for foundations and footings
    correct_unit: sqm
    also_acceptable: []
    wrong_units: [cum, rmt, nos, MT]
    error_type: dimension_mismatch
    error_message: "Formwork must be in sqm (IS 1200 Part 2). Found {actual_unit} — shuttering is a contact area measurement; volume or length units are incorrect."
    is_code_ref: IS 1200 Part 2
    common_reason: "Contractors sometimes price formwork by cum of concrete, bundling it into the concrete rate rather than measuring separately."

  - item_id_prefix: STR.FW.COL
    canonical_name: Formwork for columns
    correct_unit: sqm
    also_acceptable: []
    wrong_units: [cum, rmt, nos, MT]
    error_type: dimension_mismatch
    error_message: "Column formwork must be in sqm (IS 1200 Part 2). Found {actual_unit} — contact surface area is the measurable quantity."
    is_code_ref: IS 1200 Part 2
    common_reason: "Column formwork listed as 'nos' when column sizes vary; this hides surface area differences."

  - item_id_prefix: STR.FW.BEM
    canonical_name: Formwork for beams
    correct_unit: sqm
    also_acceptable: []
    wrong_units: [cum, rmt, nos, MT]
    error_type: dimension_mismatch
    error_message: "Beam formwork must be in sqm (IS 1200 Part 2). Found {actual_unit} — contact area governs; rmt ignores web depth."
    is_code_ref: IS 1200 Part 2
    common_reason: "rmt used for beam soffit only, missing side shuttering; sqm of contact area is complete."

  - item_id_prefix: STR.FW.SLB
    canonical_name: Formwork for slabs
    correct_unit: sqm
    also_acceptable: []
    wrong_units: [cum, rmt, nos, MT]
    error_type: dimension_mismatch
    error_message: "Slab formwork must be in sqm (IS 1200 Part 2). Found {actual_unit} — soffit contact area is the standard measure."
    is_code_ref: IS 1200 Part 2
    common_reason: "Slab formwork sometimes quoted in cum matching the concrete pour, conflating two separate operations."

  # ---------------------------------------------------------------------------
  # STRUCTURAL — REINFORCEMENT STEEL
  # ---------------------------------------------------------------------------

  - item_id_prefix: STR.RCC.RFT
    canonical_name: Reinforcement steel (TMT bars, Fe415/500)
    correct_unit: MT
    also_acceptable: [kg]
    wrong_units: [rmt, nos, cum, sqm]
    error_type: unit_confusion
    error_message: "Reinforcement steel must be in MT or kg (IS 1200 Part 5). Found {actual_unit} — rmt ignores bar diameter (a 32mm bar and 8mm bar per metre have vastly different weights). 'nos' gives no quantity basis."
    is_code_ref: IS 1200 Part 5
    common_reason: "rmt used when bar diameter is 'standard'; kg used in small projects but should be converted to MT for large packages to avoid transcription errors."

  # ---------------------------------------------------------------------------
  # STRUCTURAL STEEL (FABRICATED)
  # ---------------------------------------------------------------------------

  - item_id_prefix: STR.SF.ISMB
    canonical_name: Structural steel fabricated sections (ISMB, ISMC, etc.)
    correct_unit: MT
    also_acceptable: []
    wrong_units: [kg, rmt, nos, cum, sqm]
    error_type: unit_confusion
    error_message: "Fabricated structural steel must be in MT (IS 1200 Part 8). Found {actual_unit} — kg is technically correct but causes errors in large BOQs; rmt and nos ignore section weight."
    is_code_ref: IS 1200 Part 8
    common_reason: "Small steel packages quoted in kg which is fine, but when BOQs mix kg and MT errors of 1000x occur."

  - item_id_prefix: STR.SF.CLD
    canonical_name: Cold-formed / light-gauge steel sections
    correct_unit: MT
    also_acceptable: [kg]
    wrong_units: [rmt, nos, sqm, cum]
    error_type: unit_confusion
    error_message: "Cold-formed steel must be in MT or kg (IS 1200 Part 8). Found {actual_unit} — rmt ignores section weight per metre."
    is_code_ref: IS 1200 Part 8
    common_reason: "Z-purlins and C-sections sometimes quoted in rmt when section size varies across the roof."

  # ---------------------------------------------------------------------------
  # STRUCTURAL — PRESTRESSED CONCRETE
  # ---------------------------------------------------------------------------

  - item_id_prefix: STR.PC.BM
    canonical_name: Prestressed concrete beams / elements
    correct_unit: cum
    also_acceptable: []
    wrong_units: [rmt, nos, sqm, MT]
    error_type: dimension_mismatch
    error_message: "Prestressed concrete must be in cum (IS 1200 Part 7). Found {actual_unit} — rmt ignores cross-section; nos hides length variation."
    is_code_ref: IS 1200 Part 7
    common_reason: "Precast prestressed beams quoted per 'nos' when beam lengths and cross-sections vary in a schedule."

  # ---------------------------------------------------------------------------
  # MASONRY
  # ---------------------------------------------------------------------------

  - item_id_prefix: MAS.BRK.CLA
    canonical_name: Brick masonry (half-brick 115mm, full-brick 230mm, thicker)
    correct_unit: cum
    also_acceptable: []
    wrong_units: [sqm, sqft, rmt, nos]
    error_type: dimension_mismatch
    error_message: "Brickwork must be in cum (IS 1200 Part 3). Found {actual_unit} — sqm is only valid for half-brick (115mm) partition walls; for any other thickness cum is mandatory."
    is_code_ref: IS 1200 Part 3
    common_reason: "All walls measured in sqm regardless of thickness, removing the cost signal for thicker structural walls vs thin partitions."

  - item_id_prefix: MAS.BRK.CLB
    canonical_name: Brick partition wall half-brick (115mm) thick
    correct_unit: sqm
    also_acceptable: [cum]
    wrong_units: [sqft, rmt, nos]
    error_type: unit_confusion
    error_message: "Half-brick partition walls may be measured in sqm or cum (IS 1200 Part 3). Found {actual_unit} — sqft is a non-SI unit; rmt and nos give no area or volume basis."
    is_code_ref: IS 1200 Part 3
    common_reason: "sqft used in many private projects in India; this creates conversion errors when comparing with IS-code-based rates."

  - item_id_prefix: MAS.AAC.100
    canonical_name: AAC block masonry
    correct_unit: cum
    also_acceptable: [sqm]
    wrong_units: [sqft, rmt, nos, MT]
    error_type: unit_confusion
    error_message: "AAC block masonry must be in cum (preferred) or sqm (only if single standard thickness). Found {actual_unit} — sqft is non-SI; 'nos' of blocks is a supply unit, not a measurement unit."
    is_code_ref: IS 1200 Part 3
    common_reason: "AAC suppliers quote in 'nos of blocks' or sqm; BOQs sometimes copy these supply units directly."

  - item_id_prefix: MAS.STN.CRS
    canonical_name: Stone masonry (coursed rubble, random rubble)
    correct_unit: cum
    also_acceptable: []
    wrong_units: [sqm, sqft, rmt, nos, MT]
    error_type: dimension_mismatch
    error_message: "Stone masonry must be in cum (IS 1200 Part 3). Found {actual_unit} — sqm ignores wall thickness; MT is a material-supply unit not a placing unit."
    is_code_ref: IS 1200 Part 3
    common_reason: "Stone walls measured in sqm like plastering; thickness of stone walls (450-600mm typically) makes this a large error."

  - item_id_prefix: MAS.JPT.PTG
    canonical_name: Pointing to masonry / stone joints
    correct_unit: sqm
    also_acceptable: []
    wrong_units: [cum, rmt, nos, MT]
    error_type: dimension_mismatch
    error_message: "Pointing must be in sqm (IS 1200 Part 3). Found {actual_unit} — pointing is applied to a surface; cum would imply volume of mortar which is not meaningful."
    is_code_ref: IS 1200 Part 3
    common_reason: "Pointing sometimes measured in rmt of joint length, which ignores the width of the joint and makes rate comparison difficult."

  # ---------------------------------------------------------------------------
  # WATERPROOFING
  # ---------------------------------------------------------------------------

  - item_id_prefix: WP.MEM.APP
    canonical_name: APP/SBS bitumen membrane waterproofing
    correct_unit: sqm
    also_acceptable: []
    wrong_units: [cum, rmt, nos, kg, liter]
    error_type: dimension_mismatch
    error_message: "Membrane waterproofing must be in sqm (IS 1322 / NBC). Found {actual_unit} — the membrane covers a surface area; volume, length, or weight units do not represent the installed quantity."
    is_code_ref: IS 1322
    common_reason: "Material suppliers quote membrane in kg or rolls; contractors copy the supply unit into the BOQ instead of converting to installed sqm."

  - item_id_prefix: WP.APP.PLN
    canonical_name: Liquid-applied / crystalline waterproofing
    correct_unit: sqm
    also_acceptable: [kg]
    wrong_units: [cum, rmt, nos, liter]
    error_type: unit_confusion
    error_message: "Crystalline / cementitious waterproofing may be sqm (area) or kg (material weight at specified coverage). Found {actual_unit} — liter and cum do not correspond to any standard measurement basis."
    is_code_ref: IS 2645
    common_reason: "Manufacturer data sheets give kg/sqm coverage; BOQs sometimes list kg without tying to area, making verification impossible."

  - item_id_prefix: WP.APP.EXJ
    canonical_name: Injection waterproofing (crack injection, PU injection)
    correct_unit: rmt
    also_acceptable: []
    wrong_units: [sqm, cum, nos, liter]
    error_type: dimension_mismatch
    error_message: "Crack injection waterproofing must be in rmt (length of crack treated). Found {actual_unit} — sqm is incorrect because injection follows linear cracks; 'nos' ignores crack length."
    is_code_ref: IS 2645
    common_reason: "BOQs list injection as 'nos of ports' (the injection nozzles) rather than rmt of crack, hiding total crack length."

  - item_id_prefix: MAS.DMP.TRT
    canonical_name: Damp proof course (DPC)
    correct_unit: rmt
    also_acceptable: [sqm]
    wrong_units: [cum, nos, liter, kg]
    error_type: unit_confusion
    error_message: "DPC may be rmt (for strip DPC by wall length) or sqm (for DPC over full plinth area). Found {actual_unit} — cum, nos, and material units are incorrect."
    is_code_ref: IS 3067
    common_reason: "Strip DPC and horizontal slab DPC require different units; mixing them creates errors when comparing tenders."

  # ---------------------------------------------------------------------------
  # PLASTERING
  # ---------------------------------------------------------------------------

  - item_id_prefix: FIN.WL.PLS
    canonical_name: Cement plaster (internal walls, external walls, different thicknesses)
    correct_unit: sqm
    also_acceptable: []
    wrong_units: [cum, rmt, nos, MT, kg]
    error_type: dimension_mismatch
    error_message: "Cement plaster must be in sqm (IS 1200 Part 13). Found {actual_unit} — plaster is a surface treatment; cum overstates the operation (it is not a volumetric pour)."
    is_code_ref: IS 1200 Part 13
    common_reason: "cum used when BOQ writer confuses plaster measurement with concrete measurement."

  - item_id_prefix: FIN.CL.PLS
    canonical_name: Ceiling plaster (cement / gypsum)
    correct_unit: sqm
    also_acceptable: []
    wrong_units: [cum, rmt, nos, MT]
    error_type: dimension_mismatch
    error_message: "Ceiling plaster must be in sqm (IS 1200 Part 13). Found {actual_unit}."
    is_code_ref: IS 1200 Part 13
    common_reason: "Same error pattern as wall plaster."

  - item_id_prefix: FIN.WL.GCL
    canonical_name: Gypsum plaster (drywall skim, board finish)
    correct_unit: sqm
    also_acceptable: []
    wrong_units: [cum, rmt, nos, kg]
    error_type: dimension_mismatch
    error_message: "Gypsum plaster must be in sqm. Found {actual_unit} — kg is the material supply unit, not the installed quantity."
    is_code_ref: IS 2547
    common_reason: "Gypsum plaster suppliers quote in bags/kg; BOQs sometimes use this material unit."

  - item_id_prefix: FIN.CL.CRN
    canonical_name: Plaster cornice / POP cornice
    correct_unit: rmt
    also_acceptable: []
    wrong_units: [sqm, sqft, nos, cum]
    error_type: dimension_mismatch
    error_message: "POP cornice must be in rmt (linear run). Found {actual_unit} — a cornice is a linear profile; sqm is meaningless for a moulding of fixed profile."
    is_code_ref: IS 1200 Part 13
    common_reason: "BOQ writers treat cornice as a wall finish and list in sqm instead of measuring the perimeter length."

  - item_id_prefix: FIN.WL.MCX
    canonical_name: Machine-applied plaster (spray plaster)
    correct_unit: sqm
    also_acceptable: []
    wrong_units: [cum, rmt, nos, MT, kg]
    error_type: dimension_mismatch
    error_message: "Machine plaster must be in sqm. Found {actual_unit} — same measurement basis as hand-applied plaster."
    is_code_ref: IS 1200 Part 13
    common_reason: "Machine plaster sometimes quoted by bag consumption (kg or MT) instead of applied area."

  # ---------------------------------------------------------------------------
  # FLOORING AND TILING
  # ---------------------------------------------------------------------------

  - item_id_prefix: FIN.FLR.CER
    canonical_name: Ceramic / vitrified floor tiles
    correct_unit: sqm
    also_acceptable: []
    wrong_units: [sqft, nos, rmt, cum]
    error_type: unit_confusion
    error_message: "Floor tiles must be in sqm (IS 1200 Part 12). Found {actual_unit} — sqft is non-SI and creates conversion errors; 'nos' of tiles depends on tile size and cannot be compared across tenders."
    is_code_ref: IS 1200 Part 12
    common_reason: "sqft is extremely common in Indian private-sector BOQs; this is the single most frequent unit error in floor tiling."

  - item_id_prefix: FIN.FLR.VTR
    canonical_name: Vitrified tiles (large format, GVT, PGVT)
    correct_unit: sqm
    also_acceptable: []
    wrong_units: [sqft, nos, rmt, cum]
    error_type: unit_confusion
    error_message: "Vitrified floor tiles must be in sqm. Found {actual_unit} — sqft is non-SI; 'nos' depends on tile format which changes product-to-product."
    is_code_ref: IS 1200 Part 12
    common_reason: "Architects specify tile size in mm but BOQ uses sqft, causing systematic conversion errors."

  - item_id_prefix: FIN.WL.TIL
    canonical_name: Wall tiles (ceramic, glazed, porcelain)
    correct_unit: sqm
    also_acceptable: []
    wrong_units: [sqft, nos, rmt, cum]
    error_type: unit_confusion
    error_message: "Wall tiles must be in sqm (IS 1200 Part 12). Found {actual_unit} — sqft is non-SI; 'nos' is size-dependent and cannot be compared."
    is_code_ref: IS 1200 Part 12
    common_reason: "Same sqft error as floor tiles; very common in bathroom BOQs."

  - item_id_prefix: FIN.FLR.STN
    canonical_name: Natural stone flooring (marble, granite, kota, kadappa)
    correct_unit: sqm
    also_acceptable: []
    wrong_units: [sqft, nos, rmt, MT, cum]
    error_type: unit_confusion
    error_message: "Natural stone flooring must be in sqm (IS 1200 Part 12). Found {actual_unit} — 'nos' of slabs is a supply unit; sqft is non-SI."
    is_code_ref: IS 1200 Part 12
    common_reason: "Stone suppliers quote per sqft or per slab; BOQs copy supply units into measurement."

  - item_id_prefix: FIN.FLR.MRB
    canonical_name: Marble / granite polishing
    correct_unit: sqm
    also_acceptable: []
    wrong_units: [sqft, nos, rmt, cum]
    error_type: unit_confusion
    error_message: "Stone polishing must be in sqm. Found {actual_unit} — polishing is a surface operation measured by area."
    is_code_ref: IS 1200 Part 12
    common_reason: "sqft used in specifications that mix IS code measurements with builder's estimates."

  - item_id_prefix: FIN.FLR.CPT
    canonical_name: Carpet flooring (broadloom, tiles, area rugs)
    correct_unit: sqm
    also_acceptable: []
    wrong_units: [rmt, sqft, nos, cum]
    error_type: unit_confusion
    error_message: "Carpet must be in sqm. Found {actual_unit} — rmt (roll metres) depends on roll width which varies by product; sqft is non-SI."
    is_code_ref: IS 1200 Part 12
    common_reason: "Carpet suppliers quote in rmt of roll; roll widths vary (3.66m, 4m, 5m) so rmt cannot be compared across products."

  - item_id_prefix: FIN.FLR.IPS
    canonical_name: IPS / tremix / granolithic floor
    correct_unit: sqm
    also_acceptable: []
    wrong_units: [cum, rmt, nos, sqft]
    error_type: dimension_mismatch
    error_message: "IPS floor must be in sqm (IS 1200 Part 11). Found {actual_unit} — IPS is measured by plan area; cum is incorrect because the topping thickness is defined in the spec, not variable."
    is_code_ref: IS 1200 Part 11
    common_reason: "IPS billed in cum because it involves a concrete-like mix; the thin topping (~12-20mm) makes sqm the correct unit."

  - item_id_prefix: FIN.FLR.SKT
    canonical_name: Skirting (ceramic, stone, timber, vinyl)
    correct_unit: rmt
    also_acceptable: []
    wrong_units: [sqm, sqft, nos, cum]
    error_type: dimension_mismatch
    error_message: "Skirting must be in rmt (IS 1200 Part 12). Found {actual_unit} — skirting is a linear element; sqm ignores height (height is fixed by the spec); 'nos' pieces are non-comparable."
    is_code_ref: IS 1200 Part 12
    common_reason: "Skirting listed in sqm treating it like a floor tile band; the linear metre is the standard."

  - item_id_prefix: FIN.FLR.NOS
    canonical_name: Stair nosing / threshold strip
    correct_unit: rmt
    also_acceptable: []
    wrong_units: [nos, sqm, sqft, cum]
    error_type: unit_confusion
    error_message: "Stair nosing / threshold must be in rmt. Found {actual_unit} — 'nos' ignores length; each stair has a specific nosing length."
    is_code_ref: IS 1200 Part 12
    common_reason: "Nosing listed as 'nos per tread' when stair widths vary; rmt captures length variation."

  # ---------------------------------------------------------------------------
  # PAINTING
  # ---------------------------------------------------------------------------

  - item_id_prefix: FIN.WL.PNT
    canonical_name: Wall and ceiling painting (emulsion, distemper, acrylic)
    correct_unit: sqm
    also_acceptable: []
    wrong_units: [sqft, liter, nos, rmt, cum]
    error_type: unit_confusion
    error_message: "Wall/ceiling painting must be in sqm (IS 1200 Part 13). Found {actual_unit} — liter is a material quantity (coverage varies by brand and surface); sqft is non-SI."
    is_code_ref: IS 1200 Part 13
    common_reason: "Painters quote in liters of paint required; coverage rates vary significantly by brand making liter-based quantities incomparable."

  - item_id_prefix: FIN.WL.COT
