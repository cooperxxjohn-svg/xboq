# Rate Tiers Validation
# Purpose: Defines what rate ranges correspond to different scope inclusions for key construction items.
# Enables the model to say e.g. "your RCC column rate of Rs 6,500/cum suggests material-only —
# formwork and steel are likely excluded."
# Source: CPWD DSR 2023, Delhi NCR market rates 2024, IS code references.
# Version: 2024-25

rate_tiers:

  - canonical: pcc_m75
    description: "Plain cement concrete M7.5 (1:4:8) under footings as blinding course"
    unit: cum
    is_code_ref: IS 456:2000
    tiers:
      material_only:
        min: 3800
        max: 5200
        includes: [cement, sand, aggregate_40mm, mixing, placing]
        excludes: [centering, shuttering, curing_compound, levelling_charges]
        flag: "Rate suggests basic concrete supply and place only. Confirm curing and levelling are covered."
      supply_fix:
        min: 5300
        max: 7000
        includes: [cement, sand, aggregate, mixing, placing, levelling, curing_7days]
        excludes: [reinforcement]
        flag: "Rate includes placing and curing. No reinforcement expected for PCC — verify if grade is correct."
      composite_all_in:
        min: 7100
        max: 9000
        includes: [cement, sand, aggregate, mixing, placing, levelling, curing, dewatering_allowance]
        excludes: []
        flag: null
    red_flag_below: 3200
    red_flag_above: 10000
    red_flag_message: "Rate outside expected range for M7.5 PCC blinding. Verify mix design and scope."

  - canonical: rcc_footing_m20
