    common_omissions:
      - waterproofing_under_sink
      - exhaust_connection_to_shaft
      - electrical_appliance_points
      - gas_connection_point
    rfi_template: >
      Residential kitchen scope appears incomplete. Missing: {missing_items}.
      Please confirm: (a) Kitchen platform material and thickness (granite min
      18 mm or SS 16 gauge); (b) Exhaust fan discharge point — kitchen shaft or
