rooms:

  # ─────────────────────────────────────────────────────────────────────────────
  # WET ROOMS (RESIDENTIAL / GENERAL)
  # ─────────────────────────────────────────────────────────────────────────────

  - room_type: toilet
    display_name: "Toilet / Bathroom (Residential)"
    keywords:
      - toilet
      - bathroom
      - WC
      - wash room
      - W.C.
      - restroom
      - attached bath
      - bath room
      - bathing
    required_items:
      - waterproofing_sunken_slab
      - anti_skid_floor_tile
      - wall_tile_dado_minimum_2100mm
      - floor_trap_with_grating
      - soil_pipe_connection_UPVC_or_CI
      - wash_basin_with_pedestal_or_counter
      - EWC_or_IWC_with_seat_cover
      - flush_valve_or_cistern
      - chromium_plated_CP_fittings_set
      - health_faucet_with_hose
      - mirror_above_basin_with_frame
      - exhaust_fan_150mm_dia
      - towel_rod_CP
      - soap_dish_CP
      - door_with_hardware_and_privacy_latch
      - waterproof_paint_or_cementitious_coating_walls
      - P_trap_for_wash_basin
    conditional_items:
      - item: shower_tray_or_enclosure_with_glass_partition
        if: shower_provision
      - item: bathtub_with_waste_overflow_and_CP_fittings
        if: master_bathroom
      - item: grab_bar_32mm_dia_SS
        if: accessible_toilet
      - item: raised_WC_seat_with_arm_rests
        if: accessible_toilet
      - item: floor_mounted_WC_with_concealed_cistern
        if: premium_specification
      - item: hot_water_connection_and_mixer
        if: shower_or_bathtub
      - item: ventilation_shaft_or_duct
        if: internal_bathroom_no_external_wall
    common_omissions:
      - waterproofing (most common — 40% of residential BOQs omit this)
      - health_faucet
      - floor_trap_grating
      - soil_pipe_size_and_material_spec
      - door_hardware_specification
    rfi_template: >
      Toilet/bathroom scope appears incomplete. Missing items: {missing_items}.
      Waterproofing (IS 3067 / IS 2645), anti-skid floor tiles (COF >= 0.6),
      floor trap, and a complete CP fittings set are mandatory for wet areas.
      Please confirm: (a) Waterproofing system type and upturn height on walls
      (min 300 mm behind shower, 150 mm elsewhere); (b) Anti-skid tile
      specification and COF rating; (c) Soil pipe dia (100 mm IWC / 50 mm basin);
      (d) Complete CP fittings schedule.
    priority: critical
    building_types: [all]

  - room_type: toilet_commercial
    display_name: "Toilet / WC (Commercial / Office)"
    keywords:
      - office toilet
      - public toilet
      - common toilet
      - staff toilet
      - ladies toilet
      - gents toilet
      - accessible WC
      - disabled WC
      - unisex toilet
    required_items:
      - waterproofing_sunken_slab_and_plinth_beam
      - anti_skid_vitrified_floor_tile
      - wall_tile_dado_full_height
      - floor_trap_grating_heavy_duty
      - soil_waste_stack_pipe_UPVC
      - wash_basin_wall_hung_or_counter_top
      - EWC_wall_hung_with_concealed_cistern
      - flush_valve_or_automatic_flush
      - CP_fittings_set
      - hand_drier_or_paper_towel_dispenser
      - mirror_with_backlit_or_MS_frame
      - liquid_soap_dispenser
      - exhaust_fan_or_mechanical_ventilation_with_fresh_air
      - door_with_toilet_indicator_hardware
      - toilet_cubicle_partition_with_door
      - sanitary_bin_in_ladies_toilet
      - signage_male_female_accessible
      - vinyl_or_epoxy_skirting
    conditional_items:
      - item: accessible_WC_grab_bars_900mm_and_700mm
        if: accessible_provision_required
      - item: baby_changing_table
        if: family_facility
      - item: urinal_with_flush_valve_or_sensor
        if: gents_toilet
      - item: raised_WC_seat_with_safety_rail
        if: accessible_toilet
      - item: automatic_sensor_faucet
        if: touchless_spec
    common_omissions:
      - cubicle_partition_spec_and_door_type
      - mechanical_ventilation_fresh_air_rate
      - signage_spec
      - sanitary_bin_ladies_room
      - automatic_flush_or_sensor_spec
    rfi_template: >
      Commercial toilet scope appears incomplete. Missing: {missing_items}.
      IS 1172 (sanitary fittings) and IS 3267 (WC) apply. Per NBC 2016 Part 9,
      minimum 1 accessible WC per floor is required. Please confirm: (a)
      Waterproofing membrane and upturn spec; (b) Cubicle partition system
      (HPL / powder-coated steel / aluminium); (c) Ventilation rate (min 10 ACH
      per NBC for toilets); (d) Accessible WC compliance with IS 11214.
    priority: critical
    building_types: [commercial, institutional, hospitality, healthcare]

