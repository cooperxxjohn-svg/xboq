      - grease_trap_with_access_cover
      - stainless_steel_SS316_work_tables
      - SS_double_bowl_sink_with_splash_guard
      - commercial_dishwasher_provision
      - exhaust_hood_over_cooking_range_with_baffle_filters
      - makeup_air_supply_to_balance_exhaust
      - hot_water_supply_to_sinks_and_dishwasher
      - gas_or_LPG_piping_to_cooking_range
      - fire_suppression_system_over_cooking_range_ansul_or_equivalent
      - vermin_proof_floor_skirting_and_door_seals
      - refrigeration_cold_room_provision
      - storage_dry_goods_shelving_SS
      - pest_control_measures_fly_screen_etc
