      - lead_lining_for_C_arm
      - pressurisation_spec
    rfi_template: >
      Operating Theatre scope appears incomplete. Missing: {missing_items}.
      NABH Standards, AERB (for radiation), and IS 7105 / ASHRAE 170 apply.
      Please confirm: (a) Laminar airflow ceiling module area and ACH (min 20
      ACH per ASHRAE 170); (b) Medical gas outlets per HTMM 2007 — schedule of
      O2, N2O, vacuum, compressed air per pendant; (c) IT isolated power system
      (IEC 60364-7-710) — IMD (insulation monitoring device) required; (d) Air
      pressure differential — min +25 Pa over corridor (ASHRAE 170); (e) Lead
      lining specification (mm Pb equivalent) if C-arm used; (f) HEPA H14
      filter final filtration efficiency.
    priority: critical
    building_types: [healthcare]

