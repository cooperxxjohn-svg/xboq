      - item: waste_food_disposal_unit
        if: high_volume_kitchen
      - item: hand_wash_station_dedicated
        if: FSSAI_requirement
    common_omissions:
      - grease_trap_spec
      - fire_suppression_over_cooking_range
      - makeup_air_for_exhaust_balance
      - vermin_proofing
    rfi_template: >
      Commercial kitchen scope appears incomplete. Missing: {missing_items}.
      FSSAI and NBC 2016 compliance requirements apply. Please confirm: (a)
      Floor finish — non-slip quarry tile or approved epoxy with COF >= 0.7
      (wet); (b) Grease trap capacity (litres) and access; (c) Exhaust hood
      static pressure and CFM — makeup air system to prevent negative pressure;
      (d) Fire suppression system over cooking range (NFPA 17A); (e)
      Waterproofing membrane and perimeter upturn.
    priority: critical
    building_types: [hospitality, institutional, commercial]

