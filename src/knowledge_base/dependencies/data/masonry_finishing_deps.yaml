rules:
  # ============================================================
  # EXTERNAL WALL FINISHING DEPENDENCIES
  # ============================================================
  - id: "DEP-MAS-001"
    trigger: "external_wall"
    required_items: ["plaster_ext_2_coat", "primer_ext", "ext_emulsion_2_coat", "scaffolding"]
    trade: "masonry"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 1661"
    note: "External wall requires 2-coat plaster, primer, and 2-coat exterior emulsion with scaffolding"

  - id: "DEP-MAS-002"
    trigger: "external_wall"
    required_items: ["chicken_mesh_at_junction", "drip_mould"]
    trade: "masonry"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 1661"
    note: "Chicken mesh at RCC-masonry junction to prevent cracks, drip mould at projections"

  - id: "DEP-MAS-003"
    trigger: "external_wall"
    required_items: ["expansion_joint_sealant", "control_joint"]
    trade: "masonry"
    priority: 2
    condition: "long_wall"
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 1905"
    note: "Long external walls require expansion joints and control joints"

  - id: "DEP-MAS-004"
    trigger: "external_wall"
    required_items: ["weather_coat_texture"]
    trade: "painting"
    priority: 2
    condition: "premium_finish"
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: ""
    note: "Premium external finish with texture coat as alternative to standard emulsion"

