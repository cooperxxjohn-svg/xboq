    priority: 1
    condition: ""
    building_types: ["commercial", "hospital", "hotel"]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: ""
    note: "Grid ceiling: suspension system, mineral fibre tiles, perimeter trim, access panels"

  - id: "DEP-MAS-100"
    trigger: "metal_ceiling"
    required_items: ["suspension_system", "metal_panel", "perimeter_trim", "clip_system"]
    trade: "ceiling"
    priority: 1
    condition: ""
    building_types: ["commercial", "hotel"]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: ""
    note: "Metal ceiling: suspension, metal panels, perimeter trim, clip fixing system"

  # ============================================================
  # EXTERNAL PLASTER EXTENDED DEPENDENCIES
  # ============================================================
  - id: "DEP-MAS-101"
    trigger: "external_plaster"
    required_items: ["chicken_mesh_at_rcc_masonry_junction", "expansion_joint_at_10m_intervals"]
    trade: "masonry"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 1661"
    note: "Chicken mesh (galvanised, 20mm aperture) bridging the RCC-masonry junction is the single most effective way to prevent junction cracks — differential thermal and structural movement between frame and infill is the primary cause of staircase-step cracking; expansion joints at 10m intervals in long external plaster runs accommodate thermal expansion without cracking"

  - id: "DEP-MAS-102"
    trigger: "external_plaster"
    required_items: ["bonding_agent_on_rcc_surfaces", "pre_wetting_masonry_before_plaster"]
    trade: "masonry"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 1661"
    note: "RCC surfaces must be treated with bonding agent (polymer bonding liquid or cement slurry) before external plaster — smooth RCC provides poor mechanical key; masonry must be pre-wetted to absorb moisture evenly, preventing plaster water being sucked out too quickly which causes sand-face and delamination"

  # ============================================================
  # INTERNAL PLASTER DEPENDENCIES
  # ============================================================
  - id: "DEP-MAS-103"
    trigger: "internal_plaster"
    required_items: ["bond_coat_or_bonding_agent", "curing_7_days_internal"]
    trade: "masonry"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 1661"
    note: "Internal plaster on RCC surfaces requires a bond coat (cement slurry 1:1 or proprietary bonding agent) to achieve adhesion — without it, plaster delaminates within 1-2 years, typically in patches; 7-day water curing of internal plaster prevents shrinkage cracking and surface dusting, especially with rapid-set OPC mixes"

  - id: "DEP-MAS-104"
    trigger: "internal_plaster"
    required_items: ["beading_at_corners", "screed_dots_for_level_control"]
    trade: "masonry"
    priority: 2
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: ""
    note: "PVC or metal corner beading at internal and external corners gives clean, durable arises that survive furniture contact without chipping; screed dots and screeds (patches to control thickness) ensure plaster is applied to uniform thickness, critical for level wall surfaces and consistent tile adhesive bed thickness"

  # ============================================================
  # GYPSUM PLASTER DEPENDENCIES
  # ============================================================
  - id: "DEP-MAS-105"
    trigger: "gypsum_plaster"
    required_items: ["priming_before_paint", "alkali_resistant_primer"]
    trade: "painting"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: ""
    note: "Gypsum plaster is alkaline and must be allowed to dry fully (minimum 4 weeks) before priming with alkali-resistant primer — applying emulsion paint directly on undried gypsum causes saponification (paint goes chalky and peels); a dedicated alkali-resistant primer seals the surface and creates a stable bond layer for the finish coat"

  - id: "DEP-MAS-106"
    trigger: "gypsum_plaster"
    required_items: ["joint_tape_at_board_joints", "gypsum_finish_coat"]
    trade: "masonry"
    priority: 1
    condition: "gypsum_board_ceiling_or_partition"
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: ""
    note: "Gypsum board joints must be taped with paper or fibreglass mesh tape embedded in joint compound before skim coat — untaped joints crack and become visible through paint within months; a finish skim coat of gypsum achieves smooth surface required for premium paint finishes in commercial and hospitality projects"

  # ============================================================
  # FALSE CEILING DEPENDENCIES
  # ============================================================
  - id: "DEP-MAS-107"
    trigger: "false_ceiling"
    required_items: ["soffit_level_marking", "mep_clearance_check", "fire_rating_check_if_required"]
    trade: "ceiling"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "NBC Part 4"
    note: "Soffit level must be marked before false ceiling hangers are fixed — MEP clearance (minimum 150mm above ceiling for ducts, pipes, cables) must be confirmed with all service trades to prevent clashing; in escape corridors and public areas, fire-rated ceiling boards (60 min) are required by NBC Part 4 to maintain corridor fire compartmentation"

  - id: "DEP-MAS-108"
    trigger: "false_ceiling"
    required_items: ["access_panels_at_valves_and_junctions", "perimeter_trim_angle"]
    trade: "ceiling"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: ""
    note: "Access panels must be provided at every plumbing valve, drain clean-out, fire sprinkler isolating valve, electrical junction box, and AHU service point above the false ceiling — sealed ceilings with no access result in costly ceiling demolition for routine maintenance; perimeter trim angle gives a clean, level finish at the wall junction"

  # ============================================================
  # FLOORING DEPENDENCIES
  # ============================================================
  - id: "DEP-MAS-109"
    trigger: "flooring"
    required_items: ["screed_bed_or_adhesive_bed", "level_check_with_4m_straightedge"]
    trade: "flooring"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 1237"
    note: "Flooring requires either a screed bed (12-25mm cement:sand 1:4) or tile adhesive bed — without a proper bed, tiles hollow and crack under foot traffic; level check with 4m straightedge (maximum 5mm variation in 4m per IS 1237) before laying ensures even floor that does not pond water or cause lippage between tiles"

  - id: "DEP-MAS-110"
    trigger: "flooring"
    required_items: ["expansion_joint_flooring_at_6m_to_9m", "perimeter_isolation_joint"]
    trade: "flooring"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 13630"
    note: "Large format tile flooring must have expansion joints at maximum 6-9m centres and around all columns and walls — thermal and moisture movement in a 10m tile field without joints creates compressive stress that causes tiles to tent and pop; perimeter isolation joint (filled with silicone or flexible sealant) prevents the floor slab transmitting settlement to tiles"

  # ============================================================
  # STONE FLOORING DEPENDENCIES
  # ============================================================
  - id: "DEP-MAS-111"
    trigger: "stone_flooring"
    required_items: ["protective_coating_after_polish", "penetrating_sealer_granite_or_marble"]
    trade: "flooring"
    priority: 2
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: ""
    note: "Polished granite and marble must be treated with a penetrating stone sealer after final polish and before handover — unsealed stone absorbs oil, wine, and cleaning chemicals that permanently stain; sealer application after polish protects the surface without changing appearance; this step is frequently skipped by flooring contractors and is extremely difficult to remedy after occupation"

  - id: "DEP-MAS-112"
    trigger: "stone_flooring"
    required_items: ["anti_skid_treatment_in_wet_areas", "honed_finish_in_bathrooms"]
    trade: "flooring"
    priority: 1
    condition: "wet_area_or_exterior"
    building_types: [all]
    room_types: ["toilet", "bathroom", "balcony"]
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "NBC Part 3"
    note: "Polished stone in wet areas is dangerous — NBC Part 3 requires slip resistance coefficient > 0.5 (wet); honed finish (not polished) or sand-blast treatment achieves adequate slip resistance in bathrooms and balconies; anti-skid treatment strips or chemical etching can be applied to existing polished surfaces but must be renewed periodically"

  # ============================================================
  # TILE WORK WATERPROOFING DEPENDENCIES
  # ============================================================
  - id: "DEP-MAS-113"
    trigger: "tile_work_wet_area"
    required_items: ["waterproof_membrane_below_tiles", "flood_test_before_tiling"]
    trade: "waterproofing"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: ["toilet", "bathroom"]
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 2645"
    note: "Waterproof membrane (cementitious or liquid-applied) must be applied to walls and floors in all wet areas before tile adhesive and tiles — tiles alone are not waterproof; flood test (fill to overflow level, hold 24 hours) must be done and observed for leakage before tiling to verify membrane integrity; a single pinhole in the membrane allows water to reach the slab and the ceiling of the floor below"

  - id: "DEP-MAS-114"
    trigger: "tile_work_wet_area"
    required_items: ["tile_adhesive_c2_grade_wet_area", "anti_fungal_grout"]
    trade: "flooring"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: ["toilet", "bathroom"]
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: ""
    note: "C2 grade tile adhesive (improved adhesive per ISO 13007) with water resistance is mandatory in wet areas — standard C1 grade adhesive dissolves in persistent moisture causing tile de-bonding; anti-fungal grout with polymer additive resists mould growth in bathroom grout joints, one of the most common complaints at handover"

  # ============================================================
  # PAINT DEPENDENCIES
  # ============================================================
  - id: "DEP-MAS-115"
    trigger: "interior_paint"
    required_items: ["wall_putty_coat", "primer_coat", "min_2_finish_coats"]
    trade: "painting"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: ""
    note: "Interior paint system must be separate measured BOQ items — wall putty fills pores and micro-cracks for smooth base; primer seals substrate and improves adhesion; minimum 2 finish coats achieve uniform sheen and specified washability; combining these into a single 'paint' item in the BOQ leads to contractors skipping putty or primer, resulting in patchy, peeling paint within the defect liability period"

  - id: "DEP-MAS-116"
    trigger: "interior_paint"
    required_items: ["surface_dry_before_paint", "moisture_content_below_5pct"]
    trade: "painting"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: ""
    note: "Plaster and masonry must have moisture content below 5% before painting — painting on damp surfaces causes efflorescence (white salt deposits), blistering, and peeling; moisture meter readings must be taken and recorded before primer application; walls adjacent to bathrooms and external walls are particularly prone to residual construction moisture"

  # ============================================================
  # EXTERNAL PAINT DEPENDENCIES
  # ============================================================
  - id: "DEP-MAS-117"
    trigger: "external_paint"
    required_items: ["weather_coat_elastomeric", "anti_carbonation_check"]
    trade: "painting"
    priority: 2
    condition: "rcc_exposed_or_coastal"
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: ""
    note: "Elastomeric weather coat (2mm DFT minimum) bridges hairline cracks up to 0.3mm width, preventing water ingress that drives carbonation — carbonation of concrete reduces alkalinity and triggers rebar corrosion; anti-carbonation check (phenolphthalein test) on existing concrete before repainting identifies depth of existing carbonation; in coastal zones (< 50km from sea), chloride penetration is the critical durability threat and must be assessed"

  - id: "DEP-MAS-118"
    trigger: "external_paint"
    required_items: ["scaffolding_inspection_before_painting", "mastic_sealant_at_junctions"]
    trade: "painting"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: ""
    note: "Scaffolding must be inspected and certified safe before external painting commences — unsupported or inadequately braced scaffolding is a leading cause of painter fatalities; mastic sealant (polyurethane or silicone) at window-wall, door-wall, and chajja-wall junctions must be applied before paint to prevent the most common source of post-handover water leakage complaints"

  # ============================================================
  # MASONRY WALL QUALITY CONTROL
  # ============================================================
  - id: "DEP-MAS-119"
    trigger: "brick_or_block_masonry"
    required_items: ["soaking_bricks_before_laying", "uniform_mortar_joint_10mm"]
    trade: "masonry"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 2212"
    note: "Bricks must be soaked in water for minimum 8 hours before laying — dry bricks absorb water from mortar, reducing mortar strength by up to 40% and causing premature cracking; IS 2212 specifies 10mm ± 3mm uniform mortar joints — thick joints (>15mm) are weak and variable-thickness joints cause uneven load distribution and cracking"

  - id: "DEP-MAS-120"
    trigger: "aac_block_masonry"
    required_items: ["thin_bed_mortar_aac", "curing_aac_blocks_before_plaster", "vertical_joints_staggered"]
    trade: "masonry"
    priority: 1
    condition: "aac_autoclaved_aerated_concrete"
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 6441"
    note: "AAC blocks require thin-bed mortar (2-3mm) not traditional cement mortar — using 10mm mortar with AAC negates the block's dimensional precision and causes cracking at mortar joints; AAC must cure for minimum 7 days after laying before plaster is applied to allow moisture equilibration; vertical joints must be staggered minimum half-block length to prevent continuous vertical crack planes"

  # ============================================================
  # WATERPROOFING - TERRACE AND SUNKEN SLAB
  # ============================================================
  - id: "DEP-MAS-121"
    trigger: "terrace_waterproofing"
    required_items: ["slope_to_drain_min_1_in_100", "waterproof_membrane_terrace", "protective_screed_over_membrane"]
    trade: "waterproofing"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 3067"
    note: "Terrace must slope minimum 1:100 (preferably 1:60) to rain water pipes before waterproofing — ponding on a flat terrace creates hydrostatic head that drives water through even good membranes; waterproof membrane (modified bituminous or liquid-applied) must be protected with screed or paver tiles to prevent damage during maintenance; inadequate terrace slope is India's single most common post-handover leakage complaint"

  - id: "DEP-MAS-122"
    trigger: "sunken_slab_waterproofing"
    required_items: ["brick_bat_coba_or_puf_filling", "screed_slope_to_drain", "upturned_membrane_at_junction"]
    trade: "waterproofing"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: ["toilet", "bathroom"]
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 2645"
    note: "Sunken slab filling with brick bat coba (broken brick aggregate in CM 1:3) or PUF blocks reduces dead load while providing drainage gradient; screed slope (1:60 minimum) ensures no standing water in the void; waterproofing membrane must be turned up minimum 150mm on all walls at the slab-wall junction — without this upstand, water migrates at the joint, causing ceiling stains in the flat below"

  # ============================================================
  # DOOR AND WINDOW FRAME FIXING
  # ============================================================
  - id: "DEP-MAS-123"
    trigger: "door_frame_installation"
    required_items: ["door_frame_holdfast_at_600mm_c_c", "frame_fixed_before_masonry", "gap_filling_with_cement_mortar"]
    trade: "masonry"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: ""
    note: "Door frames must be fixed with MS holdfasts (200x25x3mm) at maximum 600mm spacing before surrounding masonry is raised — frames fixed after masonry cannot be adequately anchored and rock under load; gap between frame and masonry must be packed with cement mortar (not plaster), providing solid backing that prevents door slamming cracks"

  - id: "DEP-MAS-124"
    trigger: "window_frame_installation"
    required_items: ["window_sill_waterproofing", "drip_groove_at_sill", "gap_sealant_frame_to_wall"]
    trade: "masonry"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: ""
    note: "Window sill requires a slope of minimum 1:20 with waterproof screed to throw rainwater away from the wall; a drip groove (5mm deep x 5mm wide, 25mm from wall face) on the underside of the sill prevents water tracking back to the wall; the frame-to-wall gap is the most critical point for water ingress and must be sealed with polyurethane sealant after plaster"

  # ============================================================
  # FLOOR HARDENER FOR INDUSTRIAL
  # ============================================================
  - id: "DEP-MAS-125"
    trigger: "industrial_floor"
    required_items: ["floor_hardener_aggregate_shaker", "power_float_finish", "surface_hardness_min_6_mohs"]
    trade: "flooring"
    priority: 1
    condition: ""
    building_types: ["factory", "warehouse"]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: ""
    note: "Industrial floors require dry-shake floor hardener (metallic aggregate or quartz) applied while concrete is still green, then power-floated — this creates a surface hardness of Mohs 6-7, resisting forklift traffic and chemical spills; plain concrete floors in warehouses dust within months under heavy traffic; the floor hardener must be specified per the anticipated forklift axle load and traffic frequency"

  # ============================================================
  # EPOXY FLOORING SYSTEM
  # ============================================================
  - id: "DEP-MAS-126"
    trigger: "epoxy_flooring"
    required_items: ["substrate_preparation_shot_blasting", "moisture_vapour_barrier", "epoxy_primer_epoxy_body_coat_epoxy_topcoat"]
    trade: "flooring"
    priority: 1
    condition: ""
    building_types: ["factory", "hospital", "laboratory"]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: ""
    note: "Epoxy flooring requires shot-blast preparation of concrete surface to SSPC SP-6 (3-4 concrete surface profile) for mechanical key; residual moisture in slab must be below 4% (75% RH) — high moisture causes epoxy delamination through osmotic blistering; full system (primer + body coat + sealer/topcoat) achieves required chemical resistance and hygienic finish in OTs, labs, and food-processing areas"

  # ============================================================
  # CORNICE AND MOULDING FINISHING
  # ============================================================
  - id: "DEP-MAS-127"
    trigger: "decorative_plaster_moulding"
    required_items: ["gypsum_cornice_glue_fix", "joint_tape_cornice", "paint_system_cornice"]
    trade: "ceiling"
    priority: 2
    condition: "premium_finish"
    building_types: ["hotel", "residential_villa"]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: ""
    note: "Gypsum cornice must be fixed with appropriate adhesive (Cornice Fix or equivalent) and screwed to ceiling at 450mm centres for stability — loose cornice is a safety hazard; joints between cornice sections must be taped and skimmed to conceal; paint system must match main ceiling paint to avoid different sheen levels highlighting joints"

  # ============================================================
  # ANTI-TERMITE TREATMENT BEFORE FLOORING
  # ============================================================
  - id: "DEP-MAS-128"
    trigger: "ground_floor_flooring"
    required_items: ["anti_termite_treatment_under_floor", "soil_treatment_is6313"]
    trade: "specialist"
    priority: 1
    condition: "ground_floor"
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 6313"
    note: "Anti-termite chemical treatment to soil under ground floor slabs per IS 6313 Part 2 is mandatory before PCC or flooring is laid — treatment after slab completion requires core drilling and cannot achieve uniform coverage; wood-framed furniture in untreated buildings in India is typically destroyed within 5-7 years; IS 6313 specifies application rate, chemical concentration, and treatment methodology"

  # ============================================================
  # DADO TILE WORK IN WET AREAS
  # ============================================================
  - id: "DEP-MAS-129"
    trigger: "dado_tile_wet_area"
    required_items: ["waterproof_adhesive_dado", "full_bed_adhesive_no_dot_fixing", "silicone_joint_at_floor_wall_junction"]
    trade: "flooring"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: ["toilet", "bathroom"]
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: ""
    note: "Bathroom wall (dado) tiles must be fixed with water-resistant C2 adhesive in full-bed application — dot-fixing creates voids behind tiles where moisture accumulates, causing hollow tiles and mould; silicone sealant at the floor-wall junction instead of cement grout accommodates movement between floor and wall tiles, preventing the joint from cracking and allowing water infiltration behind dado"

  # ============================================================
  # PAINTING SYSTEM FOR METAL SURFACES
  # ============================================================
  - id: "DEP-MAS-130"
    trigger: "metal_surface_paint"
    required_items: ["rust_removal_before_primer", "zinc_phosphate_primer", "enamel_or_epoxy_finish_coat"]
    trade: "painting"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 2339"
    note: "All structural steel, grilles, gates, and metal railings must have rust removed (wire brush minimum, blast clean preferred) before primer — applying primer over mill scale or rust locks in corrosion underneath; zinc phosphate primer provides corrosion inhibition; minimum 2 coats enamel or epoxy topcoat for durability; IS 2339 specifies paint system for metal in different exposure environments"
