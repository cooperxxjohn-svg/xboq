    priority: 1
    condition: ""
    building_types: [all]
    room_types: ["toilet", "bathroom", "kitchen"]
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: ""
    note: "Plumbing chasing and pipe embedding in walls before plastering in wet areas"

