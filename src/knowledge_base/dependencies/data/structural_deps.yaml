rules:
  # ============================================================
  # FOOTING DEPENDENCIES
  # ============================================================
  - id: "DEP-STR-001"
    trigger: "footing"
    required_items: ["excavation", "pcc_blinding", "rcc_footing", "formwork", "reinforcement", "curing"]
    trade: "structural"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 456"
    note: "Every footing requires excavation, PCC blinding, RCC, formwork, reinforcement, and curing as mandatory dependencies"

  - id: "DEP-STR-002"
    trigger: "footing"
    required_items: ["backfill", "compaction", "sand_filling"]
    trade: "structural"
    priority: 2
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 456"
    note: "Backfill around footing with compaction and sand filling after footing completion"

  - id: "DEP-STR-003"
    trigger: "footing"
    required_items: ["anti_termite_treatment"]
    trade: "structural"
    priority: 2
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 6313"
    note: "Anti-termite treatment at footing level is mandatory before backfill"

  - id: "DEP-STR-004"
    trigger: "footing"
    required_items: ["soil_investigation_report"]
    trade: "structural"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 1904"
    note: "Soil investigation report required to determine safe bearing capacity before footing design"

  - id: "DEP-STR-005"
    trigger: "isolated_footing"
    required_items: ["excavation", "pcc_blinding", "rcc_footing", "formwork", "reinforcement", "curing", "pedestal"]
    trade: "structural"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 456"
    note: "Isolated footing requires pedestal/column stub in addition to standard footing items"

  - id: "DEP-STR-006"
    trigger: "combined_footing"
    required_items: ["excavation", "pcc_blinding", "rcc_footing", "formwork", "reinforcement", "curing", "construction_joint_treatment"]
    trade: "structural"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 456"
    note: "Combined footing connecting two or more columns requires construction joint treatment"

  # ============================================================
  # PILE FOUNDATION DEPENDENCIES
  # ============================================================
  - id: "DEP-STR-007"
    trigger: "pile_foundation"
    required_items: ["soil_investigation", "pile_integrity_test", "pile_cap", "pile_rcc", "pile_reinforcement"]
    trade: "structural"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 2911"
    note: "Pile foundation requires soil investigation, integrity testing, and pile cap"

  - id: "DEP-STR-008"
    trigger: "pile_foundation"
    required_items: ["pile_load_test", "pile_boring_log"]
    trade: "structural"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 2911"
    note: "Pile load test (initial and routine) and boring log documentation mandatory"

  - id: "DEP-STR-009"
    trigger: "pile_cap"
    required_items: ["excavation", "pcc_blinding", "rcc_pile_cap", "formwork", "reinforcement", "curing", "pile_head_treatment"]
    trade: "structural"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 2911"
    note: "Pile cap requires pile head treatment to ensure proper bond between pile and cap"

  - id: "DEP-STR-010"
    trigger: "pile_foundation"
    required_items: ["dewatering"]
    trade: "structural"
    priority: 2
    condition: "high_water_table"
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 2911"
    note: "Dewatering required when water table is high during pile construction"

  # ============================================================
  # RAFT FOUNDATION DEPENDENCIES
  # ============================================================
  - id: "DEP-STR-011"
    trigger: "raft_foundation"
    required_items: ["excavation", "pcc_blinding", "waterproofing_below_raft", "rcc_raft", "formwork", "reinforcement", "curing"]
    trade: "structural"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 456"
    note: "Raft foundation requires waterproofing membrane below the raft before concreting"

  - id: "DEP-STR-012"
    trigger: "raft_foundation"
    required_items: ["construction_joints", "joint_treatment", "water_stop"]
    trade: "structural"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 456"
    note: "Construction joints in raft require water stops and proper joint treatment"

  - id: "DEP-STR-013"
    trigger: "raft_foundation"
    required_items: ["dewatering", "shoring"]
    trade: "structural"
    priority: 2
    condition: "deep_excavation"
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 3764"
    note: "Deep raft excavation requires dewatering and shoring for safety"

  - id: "DEP-STR-014"
    trigger: "raft_foundation"
    required_items: ["protection_screed", "mud_mat"]
    trade: "structural"
    priority: 2
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 456"
    note: "Protection screed or mud mat required above waterproofing before raft reinforcement"

  # ============================================================
  # COLUMN DEPENDENCIES
  # ============================================================
  - id: "DEP-STR-015"
    trigger: "column"
    required_items: ["footing_complete", "rcc_column", "formwork_column", "reinforcement_column", "curing"]
    trade: "structural"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 456"
    note: "Column requires completed footing, RCC, formwork, reinforcement, and curing"

  - id: "DEP-STR-016"
    trigger: "column"
    required_items: ["starter_bars", "kicker"]
    trade: "structural"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 456"
    note: "Column starter bars and kicker must be cast with footing for continuity"

  - id: "DEP-STR-017"
    trigger: "column"
    required_items: ["cover_blocks", "spacers", "binding_wire"]
    trade: "structural"
    priority: 2
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 456"
    note: "Cover blocks and spacers ensure proper concrete cover to reinforcement"

  - id: "DEP-STR-018"
    trigger: "column"
    required_items: ["lap_splice_detailing"]
    trade: "structural"
    priority: 1
    condition: "multi_storey"
    building_types: [all]
    room_types: []
    min_floors: 2
    min_area_sqm: 0
    is_code_ref: "IS 13920"
    note: "Multi-storey columns require proper lap splice detailing at floor levels"

  # ============================================================
  # BEAM DEPENDENCIES
  # ============================================================
  - id: "DEP-STR-019"
    trigger: "beam"
    required_items: ["column_support", "rcc_beam", "formwork_beam", "reinforcement_beam", "curing"]
    trade: "structural"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 456"
    note: "Beam requires column support, RCC, formwork, reinforcement, and curing"

  - id: "DEP-STR-020"
    trigger: "beam"
    required_items: ["shear_reinforcement", "stirrups"]
    trade: "structural"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 456"
    note: "Beam shear reinforcement with stirrups is a structural safety requirement"

  - id: "DEP-STR-021"
    trigger: "beam"
    required_items: ["propping", "centering"]
    trade: "structural"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 456"
    note: "Beam requires propping and centering during and after casting until design strength achieved"

  - id: "DEP-STR-022"
    trigger: "beam"
    required_items: ["construction_joint_treatment"]
    trade: "structural"
    priority: 2
    condition: "large_span"
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 456"
    note: "Large span beams may require construction joint treatment at designated locations"

  # ============================================================
  # SLAB DEPENDENCIES
  # ============================================================
  - id: "DEP-STR-023"
    trigger: "slab"
    required_items: ["beam_support", "rcc_slab", "formwork_slab", "reinforcement_slab", "curing"]
    trade: "structural"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 456"
    note: "Slab requires beam support, RCC, formwork, reinforcement, and curing"

  - id: "DEP-STR-024"
    trigger: "slab"
    required_items: ["propping_slab", "re_propping"]
    trade: "structural"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 456"
    note: "Slab propping must remain for minimum 14 days, re-propping for 21 days per IS 456"

  - id: "DEP-STR-025"
    trigger: "slab"
    required_items: ["distribution_steel", "main_steel", "chair_bars"]
    trade: "structural"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 456"
    note: "Slab reinforcement includes main steel, distribution steel, and chair bars for top steel support"

  - id: "DEP-STR-026"
    trigger: "slab"
    required_items: ["sleeve_openings", "mep_conduit_inserts"]
    trade: "structural"
    priority: 2
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 456"
    note: "MEP sleeve openings and conduit inserts must be placed before slab casting"

  - id: "DEP-STR-027"
    trigger: "slab"
    required_items: ["concrete_testing_cubes"]
    trade: "structural"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 456"
    note: "Concrete cube testing mandatory for every slab pour as per IS 456"

  # ============================================================
  # STAIRCASE DEPENDENCIES
  # ============================================================
  - id: "DEP-STR-028"
    trigger: "staircase"
    required_items: ["rcc_staircase", "formwork_staircase", "reinforcement_staircase", "curing"]
    trade: "structural"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 456"
    note: "Staircase RCC structure requires formwork, reinforcement, and curing"

  - id: "DEP-STR-029"
    trigger: "staircase"
    required_items: ["railing", "handrail"]
    trade: "structural"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "NBC Part 4"
    note: "Staircase railing and handrail mandatory for safety per NBC"

  - id: "DEP-STR-030"
    trigger: "staircase"
    required_items: ["flooring_staircase", "nosing"]
    trade: "finishing"
    priority: 2
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "NBC Part 4"
    note: "Staircase flooring with anti-skid nosing for safety"

  - id: "DEP-STR-031"
    trigger: "staircase"
    required_items: ["landing_slab", "waist_slab"]
    trade: "structural"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 456"
    note: "Staircase includes landing slab and waist slab as structural components"

  # ============================================================
  # RETAINING WALL DEPENDENCIES
  # ============================================================
  - id: "DEP-STR-032"
    trigger: "retaining_wall"
    required_items: ["drainage_behind_wall", "waterproofing_retaining", "backfill_retaining"]
    trade: "structural"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 456"
    note: "Retaining wall requires drainage behind, waterproofing, and controlled backfill"

  - id: "DEP-STR-033"
    trigger: "retaining_wall"
    required_items: ["weep_holes", "filter_media"]
    trade: "structural"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 456"
    note: "Weep holes with filter media to relieve hydrostatic pressure behind retaining wall"

  - id: "DEP-STR-034"
    trigger: "retaining_wall"
    required_items: ["rcc_retaining", "formwork_retaining", "reinforcement_retaining", "base_slab"]
    trade: "structural"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 456"
    note: "Retaining wall structural components including base slab/heel/toe"

  - id: "DEP-STR-035"
    trigger: "retaining_wall"
    required_items: ["expansion_joints"]
    trade: "structural"
    priority: 2
    condition: "length_above_20m"
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 456"
    note: "Long retaining walls require expansion joints at intervals"

  # ============================================================
  # BASEMENT DEPENDENCIES
  # ============================================================
  - id: "DEP-STR-036"
    trigger: "basement"
    required_items: ["retaining_wall", "waterproofing_basement", "ventilation_basement", "drainage_basement"]
    trade: "structural"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "NBC Part 4"
    note: "Basement requires retaining wall, waterproofing, ventilation, and drainage"

  - id: "DEP-STR-037"
    trigger: "basement"
    required_items: ["fire_egress_basement", "emergency_exit"]
    trade: "fire_safety"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "NBC Part 4"
    note: "Basement fire egress with separate emergency exit mandatory per NBC"

  - id: "DEP-STR-038"
    trigger: "basement"
    required_items: ["dewatering", "sump_pit", "sump_pump"]
    trade: "plumbing"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 456"
    note: "Basement dewatering with sump pit and pump for water management"

  - id: "DEP-STR-039"
    trigger: "basement"
    required_items: ["shoring", "sheet_piling"]
    trade: "structural"
    priority: 1
    condition: "deep_basement"
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 3764"
    note: "Deep basements require shoring or sheet piling for earth retention during construction"

  - id: "DEP-STR-040"
    trigger: "basement"
    required_items: ["ramp_vehicle", "ramp_pedestrian"]
    trade: "structural"
    priority: 2
    condition: "parking_basement"
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "NBC Part 4"
    note: "Parking basement requires vehicle ramp and separate pedestrian access"

  - id: "DEP-STR-041"
    trigger: "basement"
    required_items: ["mechanical_ventilation", "co_detection"]
    trade: "mechanical"
    priority: 1
    condition: "parking_basement"
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "NBC Part 4"
    note: "Parking basement requires mechanical ventilation with CO detection per NBC"

  # ============================================================
  # WATER TANK DEPENDENCIES
  # ============================================================
  - id: "DEP-STR-042"
    trigger: "water_tank"
    required_items: ["waterproofing_tank", "rcc_tank", "reinforcement_tank", "formwork_tank", "curing_tank"]
    trade: "structural"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 3370"
    note: "Water tank design per IS 3370 with waterproofing, RCC, reinforcement, formwork, and extended curing"

  - id: "DEP-STR-043"
    trigger: "water_tank"
    required_items: ["ladder_tank", "overflow_pipe", "inlet_pipe", "outlet_pipe", "cleaning_access"]
    trade: "plumbing"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 3370"
    note: "Water tank requires ladder, overflow, inlet, outlet, and cleaning access provisions"

  - id: "DEP-STR-044"
    trigger: "water_tank"
    required_items: ["water_stop_joints", "construction_joint_treatment"]
    trade: "structural"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 3370"
    note: "Water tank joints require water stops and proper treatment for leak-proof construction"

  - id: "DEP-STR-045"
    trigger: "water_tank"
    required_items: ["leak_test", "chlorination"]
    trade: "structural"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 3370"
    note: "Water tank must pass leak test and be chlorinated before use"

  - id: "DEP-STR-046"
    trigger: "overhead_tank"
    required_items: ["structural_support_frame", "access_ladder", "lightning_arrester"]
    trade: "structural"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 3370"
    note: "Overhead tank requires structural support, access ladder, and lightning protection"

  # ============================================================
  # POST-TENSIONED SLAB DEPENDENCIES
  # ============================================================
  - id: "DEP-STR-047"
    trigger: "post_tensioned_slab"
    required_items: ["pt_cables", "anchorage_system", "stressing_operation", "grouting_ducts"]
    trade: "structural"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 1343"
    note: "Post-tensioned slab requires PT cables, anchorage, stressing, and grouting"

  - id: "DEP-STR-048"
    trigger: "post_tensioned_slab"
    required_items: ["duct_profile_check", "stressing_jack", "elongation_measurement"]
    trade: "structural"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 1343"
    note: "PT slab requires duct profile verification, stressing jack, and elongation measurement records"

  - id: "DEP-STR-049"
    trigger: "post_tensioned_slab"
    required_items: ["bonded_reinforcement", "edge_reinforcement", "bursting_reinforcement"]
    trade: "structural"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 1343"
    note: "PT slab requires supplementary bonded, edge, and bursting reinforcement"

  - id: "DEP-STR-050"
    trigger: "post_tensioned_beam"
    required_items: ["pt_cables", "anchorage_system", "stressing_operation", "grouting_ducts", "deviation_blocks"]
    trade: "structural"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 1343"
    note: "Post-tensioned beam requires PT cables, anchorage, stressing, grouting, and deviation blocks"

  # ============================================================
  # PARAPET DEPENDENCIES
  # ============================================================
  - id: "DEP-STR-051"
    trigger: "parapet"
    required_items: ["coping_stone", "waterproofing_junction"]
    trade: "structural"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "NBC Part 4"
    note: "Parapet requires coping stone and waterproofing at wall-slab junction"

  - id: "DEP-STR-052"
    trigger: "parapet"
    required_items: ["rcc_parapet", "reinforcement_parapet"]
    trade: "structural"
    priority: 1
    condition: "height_above_600mm"
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 456"
    note: "Parapets above 600mm height require RCC with reinforcement"

  - id: "DEP-STR-053"
    trigger: "parapet"
    required_items: ["metal_railing_on_parapet"]
    trade: "structural"
    priority: 2
    condition: "parapet_below_1200mm"
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "NBC Part 4"
    note: "If parapet height is less than 1200mm, metal railing must be added to meet minimum height"

  # ============================================================
  # LIFT PIT DEPENDENCIES
  # ============================================================
  - id: "DEP-STR-054"
    trigger: "lift_pit"
    required_items: ["waterproofing_lift_pit", "sump_pump_provision"]
    trade: "structural"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 14665"
    note: "Lift pit requires waterproofing and sump pump provision for water management"

  - id: "DEP-STR-055"
    trigger: "lift_pit"
    required_items: ["rcc_lift_pit", "formwork_lift_pit", "reinforcement_lift_pit"]
    trade: "structural"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
