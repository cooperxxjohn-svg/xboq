    note: "IS 10262 mix design must be approved by structural engineer before first pour — nominal mix (1:1.5:3) is not permitted for structural grades above M20; slump test at each batch ensures consistent workability and prevents unauthorized water addition that weakens concrete"

  - id: "DEP-STR-102"
    trigger: "rcc_work"
    required_items: ["admixture_if_required", "superplasticiser_compatibility_test"]
    trade: "structural"
    priority: 2
    condition: "long_distance_transit_or_hot_weather"
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 9103"
    note: "Chemical admixtures per IS 9103 must be compatibility-tested with the specific cement brand — incompatible admixtures can cause flash set or delayed set; in hot weather (>35°C), retarder is essential to prevent premature stiffening during transit"

  # ============================================================
  # TMT STEEL QUALITY CONTROL
  # ============================================================
  - id: "DEP-STR-103"
    trigger: "reinforcement_steel"
    required_items: ["tmt_bar_mill_test_certificate", "third_party_steel_testing"]
    trade: "structural"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 1786"
    note: "IS 1786 TMT bars must arrive with mill test certificate showing yield strength, UTS, elongation, and chemical composition — sub-standard re-rolled bars without certificates cause brittle failures; third-party testing from random batches is strongly recommended for large projects"

  # ============================================================
  # FORMWORK SAFETY
  # ============================================================
  - id: "DEP-STR-104"
    trigger: "formwork"
    required_items: ["formwork_design_approved", "striking_time_per_is456", "prop_inspection_before_pour"]
    trade: "structural"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 456"
    note: "Formwork must be designed for wet concrete pressure plus construction loads — IS 456 Table 9 gives minimum striking times (e.g., slabs must retain soffits for 14 days); prop inspection before each pour prevents catastrophic formwork collapse, which is a leading cause of construction fatalities in India"

  # ============================================================
  # SEISMIC DETAILING EXTENDED
  # ============================================================
  - id: "DEP-STR-105"
    trigger: "rcc_frame"
    required_items: ["strong_column_weak_beam_check", "capacity_design_principle"]
    trade: "structural"
    priority: 1
    condition: "seismic_zone_iii_plus"
    building_types: [all]
    room_types: []
    min_floors: 3
    min_area_sqm: 0
    is_code_ref: "IS 13920"
    note: "IS 13920 requires strong column–weak beam (SCWB) design so beams yield before columns in an earthquake, preventing storey mechanism collapse; capacity design ensures energy is dissipated in ductile flexural hinges rather than brittle shear failures — this is the most important seismic design principle for Indian RCC frames"

  # ============================================================
  # WATERPROOFING FOR BELOW-GRADE STRUCTURES
  # ============================================================
  - id: "DEP-STR-106"
    trigger: "below_grade_structure"
    required_items: ["external_waterproofing_membrane", "protection_board", "drainage_cell_mat"]
    trade: "structural"
    priority: 1
    condition: "high_water_table_or_heavy_rain_zone"
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 3414"
    note: "External waterproofing membrane applied to the positive side (soil face) of basement walls is the most effective method — it seals before water penetrates concrete; protection board shields membrane during backfill; drainage cell mat provides secondary drainage path to weep holes, critical in high-rainfall zones like Mumbai, Chennai, Hyderabad"

  # ============================================================
  # UNDERPINNING / ADJACENT STRUCTURE PROTECTION
  # ============================================================
  - id: "DEP-STR-107"
    trigger: "excavation_near_existing_structure"
    required_items: ["underpinning_scheme", "settlement_monitoring", "structural_protection_adjacent"]
    trade: "structural"
    priority: 1
    condition: "excavation_within_1_5x_depth_of_neighbour_footing"
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 1498"
    note: "Excavating close to an existing building can undermine its foundation — an approved underpinning scheme or sheet pile must be in place before excavation; settlement monitoring with datum points detects movement early; failure to protect adjacent structures leads to legal liability and structural damage claims"

  # ============================================================
  # FLAT PLATE / FLAT SLAB PUNCHING SHEAR
  # ============================================================
  - id: "DEP-STR-108"
    trigger: "flat_slab"
    required_items: ["punching_shear_check", "shear_head_or_stud_rail", "drop_panel_or_column_head"]
    trade: "structural"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 456"
    note: "Flat slabs are vulnerable to punching shear failure at column-slab junction — IS 456 requires punching shear check and if insufficient, shear studs, shear head, drop panel, or column head must be provided; punching failures are sudden and catastrophic (e.g., Ronan Point, several Indian multi-storey failures)"

  # ============================================================
  # TRANSFER STRUCTURE DEPENDENCIES
  # ============================================================
  - id: "DEP-STR-109"
    trigger: "transfer_slab_or_beam"
    required_items: ["deep_beam_design", "high_grade_concrete_m40_plus", "detailed_structural_drawing", "specialist_formwork"]
    trade: "structural"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 456"
    note: "Transfer structures carry columns from upper floors to different grid positions below — deep beam design (span/depth < 2) applies; M40+ concrete minimises section sizes; specialist formwork and propping is required for the heavy dead load; these are high-consequence structural elements requiring enhanced QA on every pour"

  # ============================================================
  # LINTEL OVER WIDE OPENINGS
  # ============================================================
  - id: "DEP-STR-110"
    trigger: "wide_opening_lintel"
    required_items: ["rcc_lintel_span_check", "adequate_bearing_each_side", "crack_control_reinforcement"]
    trade: "structural"
    priority: 1
    condition: "opening_above_1200mm"
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 456"
    note: "Lintels over openings wider than 1200mm must be span-checked with adequate depth; minimum 150mm bearing on each side prevents bearing failure; crack control reinforcement at mid-span bottom and at top near supports is essential — wide lintel cracking is a common complaint in completed buildings, particularly over large window openings in external walls"
