    min_floors: 0
    min_area_sqm: 0
    is_code_ref: ""
    note: "Retail mall tenant coordination manual specifies what services are provided by landlord (shell and core) and what tenant must provide — without clear TCM, tenants make modifications that overload electrical or HVAC systems, block fire exits, or damage structure; shell and core HVAC (chilled water connection point per tenant bay) allows each tenant to fit their own fan coil units; dedicated electrical capacity per tenant bay (typically 60-100 W/sqm) must be allocated at design stage to prevent transformer overloading when all tenants fit out simultaneously"

