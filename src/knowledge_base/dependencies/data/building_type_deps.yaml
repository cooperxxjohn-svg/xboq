  # ============================================================
  # HOSPITAL - INFECTION CONTROL
  # ============================================================
  - id: "DEP-BLD-081"
    trigger: "hospital"
    required_items: ["hepa_filtration_ot_and_icu", "negative_pressure_isolation_rooms", "infection_control_risk_assessment_during_construction"]
    trade: "hvac"
    priority: 1
    condition: ""
    building_types: ["hospital"]
    room_types: ["ot", "icu", "isolation"]
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "NABH"
    note: "HEPA filtration (H14 class, >99.995% efficiency for 0.3µm particles) is mandatory in OTs and ICUs per NABH guidelines — inadequate filtration causes post-operative infections (SSI) which are a leading cause of hospital mortality; isolation rooms for infectious patients must maintain negative pressure (-8 Pa) to prevent airborne pathogen escape; ICRA (Infection Control Risk Assessment) during hospital construction or renovation protects existing patients from fungal spores released by demolition dust"

  # ============================================================
  # DATA CENTRE - PRECISION AC, UPS, FM200
  # ============================================================
  - id: "DEP-BLD-082"
    trigger: "data_center"
    required_items: ["pac_with_free_cooling_economiser", "ups_2n_with_bypass", "fm200_or_novec_fire_suppression"]
    trade: "hvac"
    priority: 1
    condition: ""
    building_types: ["data_center"]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "TIA-942"
    note: "Precision AC with free cooling economiser operates in partial economiser mode (Indian conditions) reducing compressor run-time by 20-40% in winter months; UPS 2N topology (two independent UPS paths to each PDU) provides double fault tolerance — minimum requirement for Tier III data centre; FM200 or Novec 1230 gas suppression must discharge within 10 seconds to suppress Class C electrical fires without water damage to servers worth hundreds of crores"

  # ============================================================
  # SCHOOL - ACOUSTIC TREATMENT IN CLASSROOMS
  # ============================================================
  - id: "DEP-BLD-083"
    trigger: "school"
    required_items: ["acoustic_tiles_classrooms_nrc_0_5_min", "sound_insulation_between_classrooms", "pa_system_for_emergency_evacuation"]
    trade: "finishing"
    priority: 1
