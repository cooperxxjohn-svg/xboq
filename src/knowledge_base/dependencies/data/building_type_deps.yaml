    min_area_sqm: 0
    is_code_ref: "IS 1172"
    note: "IS 1172 specifies 135 LPCD (litres per capita per day) for urban residential — water storage must provide 24 hours supply (i.e., full day's demand) to protect occupants from municipal supply interruptions; dual-tank system (underground sump + overhead tank) with pump ensures continuous supply — a single overhead tank with direct mains is inadequate for high-rise as municipal pressure is insufficient to reach upper floors; tank sizing is frequently under-specified, leading to water shortages in summer"

  # ============================================================
  # WAREHOUSE - LOADING DOCK DESIGN
  # ============================================================
  - id: "DEP-BLD-094"
    trigger: "warehouse"
    required_items: ["dock_leveller_hydraulic", "dock_shelter_or_seal", "dock_approach_apron_1_in_50_slope"]
    trade: "external"
    priority: 1
    condition: ""
    building_types: ["warehouse"]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: ""
    note: "Hydraulic dock leveller bridges the height difference between warehouse floor and truck bed (typically 150-350mm variation) — fixed ramp alternatives cannot accommodate height variation and damage goods and forklifts; dock shelter or seal closes the gap between truck and dock opening, preventing rain entry and heat/cold loss (critical for temperature-controlled storage); dock approach apron must be 1:50 slope to drain rainwater away from dock opening; dock approach length minimum 18m for articulated trucks to manoeuvre"

  # ============================================================
  # HOSPITAL - ICU DESIGN REQUIREMENTS
  # ============================================================
  - id: "DEP-BLD-095"
    trigger: "intensive_care_unit"
    required_items: ["minimum_bed_space_12sqm_per_bed", "all_round_access_each_bed", "centralized_nurse_station_visibility", "dedicated_hvac_icu"]
    trade: "finishing"
    priority: 1
    condition: ""
    building_types: ["hospital"]
    room_types: ["icu"]
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "NABH"
    note: "NABH mandates minimum 12 sqm per ICU bed (including space for equipment), with all-round access (minimum 1200mm on all three sides) to allow CPR and equipment positioning; nurse station must have direct visual access to all beds or remote camera monitoring; dedicated HVAC with HEPA filtration (separate from rest of hospital) is required — ICU patients are immunocompromised and cannot share air with general wards"

  # ============================================================
  # DATA CENTRE - DIESEL STORAGE AND FIRE SAFETY
  # ============================================================
  - id: "DEP-BLD-096"
    trigger: "data_center"
    required_items: ["diesel_storage_above_ground_with_bund", "fuel_transfer_pump_with_day_tank", "fire_detection_in_dg_room_explosion_proof"]
    trade: "mechanical"
    priority: 1
    condition: ""
    building_types: ["data_center"]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "PESO"
    note: "Data centres with multiple DG sets store thousands of litres of diesel — storage above-ground (preferred over underground due to leak detection visibility) requires a bund (impermeable containment wall) with 110% capacity of the largest tank per PESO regulations; fuel transfer pump with day tank (300-500 litres) adjacent to DG set provides 4-6 hours runtime before needing to pump from bulk storage; explosion-proof fire detection in DG room prevents electrical faults triggering diesel fire"

  # ============================================================
  # COMMERCIAL - TOILET PROVISION
  # ============================================================
  - id: "DEP-BLD-097"
    trigger: "commercial_office"
    required_items: ["toilet_ratio_1_per_25_female_1_per_40_male", "female_toilets_minimum_as_per_factories_act", "accessible_toilet_per_floor"]
    trade: "plumbing"
    priority: 1
    condition: ""
    building_types: ["commercial"]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "NBC Part 8"
    note: "NBC Part 8 specifies 1 WC per 25 female occupants and 1 WC per 40 male occupants — under-provision causes long queues, particularly for female employees (an equality issue increasingly highlighted by HR departments); Factories Act has more generous provisions for large numbers of workers (1:15 female); accessible toilet per floor required by RPwD Act 2016; RERA-registered commercial spaces must demonstrate NBC-compliant toilet provision before Occupancy Certificate"

  # ============================================================
  # HOTEL - KITCHEN GAS SAFETY
  # ============================================================
  - id: "DEP-BLD-098"
    trigger: "hotel_commercial_kitchen_gas"
    required_items: ["lpg_manifold_outside_building", "gas_detector_in_kitchen", "automatic_gas_shutoff_on_alarm", "gas_flexi_hose_max_1m"]
    trade: "plumbing"
    priority: 1
    condition: ""
    building_types: ["hotel", "restaurant"]
    room_types: ["kitchen"]
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 5572"
    note: "LPG manifold for commercial kitchens must be located outside the building (not in basement or enclosed rooms per PESO regulations) — LPG is denser than air and accumulates in basements creating explosion risk; gas detector in kitchen triggers audible alarm; automatic solenoid shutoff valve isolates gas supply on alarm — this prevents small leaks becoming catastrophic accumulations when kitchen is unoccupied at night; flexible hose to appliance must be < 1m (longer hoses are easily damaged and are a common fire cause)"

  # ============================================================
  # SCHOOL - SAFETY BARRIERS
  # ============================================================
  - id: "DEP-BLD-099"
    trigger: "school"
    required_items: ["parapet_or_railing_1200mm_min_height", "anti_climb_parapet_detail", "staircase_baluster_max_100mm_gap_school"]
    trade: "structural"
    priority: 1
    condition: ""
    building_types: ["school"]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "NBC Part 4"
    note: "School parapets and balcony railings must be minimum 1200mm high (higher than NBC standard of 900mm for general buildings, to account for children) with anti-climb design (no horizontal members that children can step on); staircase balusters must not allow a 100mm sphere to pass through — multiple child fatalities at school buildings from falls over inadequate barriers have resulted in regulatory tightening; insurance companies require certifiable compliance"

  # ============================================================
  # HOSPITAL - EMERGENCY DEPARTMENT DESIGN
  # ============================================================
  - id: "DEP-BLD-100"
    trigger: "hospital"
    required_items: ["emergency_department_separate_entry", "triage_area_at_entry", "resuscitation_room_2_per_30_beds"]
    trade: "finishing"
    priority: 1
    condition: ""
    building_types: ["hospital"]
    room_types: ["emergency"]
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "NABH"
    note: "NABH requires ED to have independent entry for ambulances separate from OPD — mixing emergency and routine outpatient flows causes dangerous delays; triage area (minimum 12 sqm) at ED entry with trained nurse to classify patients by severity; resuscitation room with crash cart, defibrillator, and all emergency equipment at ratio of 1 per 15 emergency beds, minimum 2; ED without proper triage and resus capability will not achieve NABH accreditation"

  # ============================================================
  # INDUSTRIAL - FIRE COMPARTMENTATION
  # ============================================================
  - id: "DEP-BLD-101"
    trigger: "factory"
    required_items: ["fire_compartment_max_2000sqm_per_compartment", "fire_rated_wall_between_compartments", "sprinkler_in_high_piled_storage"]
    trade: "fire_safety"
    priority: 1
    condition: "above_2000sqm"
    building_types: ["factory", "warehouse"]
    room_types: []
    min_floors: 0
    min_area_sqm: 2000
    is_code_ref: "NBC Part 4"
    note: "NBC Part 4 limits fire compartment size in factories to 2000 sqm for ordinary hazard — large open factories must be sub-divided by 2-hour fire-rated walls to limit fire spread and reduce insurance premiums; high-piled storage above 3.6m requires ESFR (Early Suppression Fast Response) sprinklers rated for storage height and commodity class — standard sprinklers cannot suppress fires in high rack storage before major inventory loss; fire compartmentation is also required by most property insurers"

  # ============================================================
  # DATA CENTRE - OPERATIONAL CONTINUITY
  # ============================================================
  - id: "DEP-BLD-102"
    trigger: "data_center"
    required_items: ["dcim_data_centre_infrastructure_management", "redundant_network_paths", "24x7_noc_room"]
    trade: "electrical"
    priority: 2
    condition: ""
    building_types: ["data_center"]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "TIA-942"
    note: "DCIM software provides real-time monitoring of power, cooling, and space utilisation across the data centre — without DCIM, administrators manually track capacity leading to hotspots and stranded capacity; redundant network paths (dual fibre routes from two providers) ensure network stays up if one provider has a cut; 24x7 NOC (Network Operations Centre) with trained staff who can respond to alarms within minutes is required for Tier III+ data centres serving enterprise customers"

  # ============================================================
  # HOTEL - ACCESSIBILITY FOR GUESTS
  # ============================================================
  - id: "DEP-BLD-103"
    trigger: "hotel"
    required_items: ["min_1_accessible_room_per_25_rooms", "roll_in_shower_accessible_room", "accessible_pool_entry_lift"]
    trade: "finishing"
    priority: 1
    condition: ""
    building_types: ["hotel"]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "RPwD Act 2016"
    note: "RPwD Act 2016 and NBC Part 3 require hotels to provide minimum 1 fully accessible room per 25 guest rooms with wider door (900mm clear), turning space, roll-in shower (no threshold), lowered controls, and accessible bed height; swimming pool must have a pool lift or zero-entry ramp for guests using wheelchairs — international hotel chains are specifically asked about accessibility features by travel agents and disabled travel groups; non-compliance is grounds for FHRAI (Federation of Hotel and Restaurant Associations of India) complaint"

  # ============================================================
  # COMMERCIAL - GREEN ROOF OR COOL ROOF
  # ============================================================
  - id: "DEP-BLD-104"
    trigger: "commercial_roof"
    required_items: ["cool_roof_coating_sri_above_78", "or_green_roof_vegetation_layer"]
    trade: "finishing"
    priority: 2
    condition: "ecbc_targeted"
    building_types: ["commercial", "hotel", "hospital"]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "ECBC 2017"
    note: "ECBC 2017 requires roof Solar Reflectance Index (SRI) above 78 for climate zones 1-5 — standard grey cement tiles have SRI of 20-30 and absorb heat, increasing top-floor cooling load by 30-40%; cool roof coating (white or light pigmented) achieves SRI 80+ at low cost; green roof vegetation layer provides both insulation and SRI compliance while also managing storm water and biodiversity; some states (Maharashtra, Tamil Nadu) offer FAR incentives for green roofs"

  # ============================================================
  # ALL BUILDINGS - DOCUMENTATION REGISTER
  # ============================================================
  - id: "DEP-BLD-105"
    trigger: "all_buildings"
    required_items: ["quality_assurance_plan", "site_inspection_register", "material_approval_register"]
    trade: "preliminaries"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 456"
    note: "Quality Assurance Plan (QAP) defines inspection and test plan for each trade — without QAP, inspection responsibilities are unclear and critical inspections are skipped; site inspection register records every structural engineer and client visit with observations; material approval register documents each material submission, approval status, and approved-equals — without this register, contractors substitute non-approved materials after initial approval and the substitution goes undetected; all three documents are required by serious institutional clients and form the evidence base for defect claims during DLP"
