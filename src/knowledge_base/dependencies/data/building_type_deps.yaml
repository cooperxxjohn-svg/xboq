    is_code_ref: "Local Bylaws / CPCB"
    note: "Most state building rules now mandate RWH (recharge structures for plots above 100 sqm), STP (sewage treatment for >10 units or 10000 sqft), and OWC (organic waste composter for kitchen waste) for residential apartments above 20 units — RERA completion certificate is withheld if these are absent; STP treated water must achieve CPCB norms (BOD < 10 mg/L) and be reused for landscaping and flushing; OWC converts kitchen waste to manure, diverting it from municipal garbage"

