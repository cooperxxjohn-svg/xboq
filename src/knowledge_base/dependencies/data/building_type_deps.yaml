    note: "Hotel guest floors must have automatic sprinklers in every room (NBC Part 4 mandatory for hotels above 3 storeys) — hotel room fires spread rapidly due to synthetic soft furnishings; fire-rated door at every corridor-to-staircase junction must be self-closing; horizontal 2-hour fire compartments limit area through which fire can spread and protect evacuation routes; hotel fire risks are higher than office as rooms are occupied at night when occupants are sleeping and fire discovery is delayed"

