    building_types: ["school"]
    room_types: ["classroom"]
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "NBC Part 8"
    note: "NBC Part 8 specifies reverberation time 0.4-0.6 seconds for classrooms (achieved with NRC 0.5 acoustic tiles on ceiling) — high reverberation makes speech intelligibility poor, particularly for students with hearing difficulties; sound insulation between classrooms (STC 45 minimum) prevents noise from active classes disturbing adjacent classes; PA system with emergency tone must reach every classroom for lockdown or evacuation — increasingly required by CBSE affiliation guidelines"

  # ============================================================
  # HOTEL - GRMS AND CARD ACCESS
  # ============================================================
  - id: "DEP-BLD-084"
    trigger: "hotel"
    required_items: ["grms_guest_room_management_system", "card_key_access_all_guest_rooms", "dnd_mur_panel_at_door"]
    trade: "electrical"
    priority: 1
    condition: "three_star_plus"
    building_types: ["hotel"]
    room_types: ["hotel_room"]
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: ""
    note: "GRMS (Guest Room Management System) integrates card key status, room temperature, lighting, DND/MUR signals and sends to BMS — when card is removed, GRMS can automatically set back HVAC setpoint saving 20-30% room energy; card key access to guest rooms is standard practice for security and GRMS integration; DND/Make Up Room panel at door avoids staff disturbing guests, improving guest satisfaction scores which directly affect online ratings"

  # ============================================================
  # INDUSTRIAL - EXPLOSION-PROOF FITTINGS
  # ============================================================
  - id: "DEP-BLD-085"
    trigger: "industrial_hazardous_zone"
    required_items: ["explosion_proof_fittings_zone_1_or_2", "atex_or_iecex_certified_equipment", "hazardous_area_classification_drawing"]
    trade: "electrical"
    priority: 1
    condition: "flammable_gas_vapour_or_dust"
    building_types: ["factory", "petrol_pump"]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 5572"
    note: "IS 5572 (IEC 60079) requires hazardous area classification (Zone 0, 1, 2 for gas/vapour; Zone 20, 21, 22 for dust) before electrical design — standard electrical fittings in Zone 1 are a potential ignition source; all equipment in hazardous zones must be ATEX or IECEx certified for the applicable zone and gas group; hazardous area classification drawing (HAC drawing) must be submitted with electrical design for factory license and PESO approval"

  # ============================================================
  # RESIDENTIAL ABOVE 20 UNITS - RWH, STP, OWC
  # ============================================================
  - id: "DEP-BLD-086"
    trigger: "residential_apartment_above_20_units"
    required_items: ["rwh_rainwater_harvesting", "stp_sewage_treatment_plant", "owc_organic_waste_converter"]
