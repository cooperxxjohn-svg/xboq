  # FACTORY - VENTILATION AND HVAC INDUSTRIAL
  # ============================================================
  - id: "DEP-BLD-091"
    trigger: "factory"
    required_items: ["roof_monitor_for_natural_ventilation", "evaporative_cooling_if_high_temp_process", "local_exhaust_ventilation_hazardous_processes"]
    trade: "hvac"
    priority: 1
    condition: ""
    building_types: ["factory"]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "Factories Act Schedule"
    note: "Factories Act Schedule mandates minimum temperature and air change rates for workers — roof monitors (ridge glazing with opening lights) provide natural thermal buoyancy ventilation for hot processes; evaporative cooling through wet pads and fans reduces air temperature by 8-12°C at very low energy cost for factories in hot-dry zones (Rajasthan, Gujarat, MP); local exhaust ventilation at each fume-generating process (welding, painting, chemical mixing) must be designed to capture 95% of contaminants before they enter the breathing zone"

