    trade: "electrical"
    priority: 1
    condition: ""
    building_types: ["commercial", "hospital"]
    room_types: []
    min_floors: 0
    min_area_sqm: 500
    is_code_ref: ""
    note: "Telecom: MDF room, IDF per floor, backbone, horizontal cable, patch panels"

  # ============================================================
  # HOT WATER PIPE INSULATION
  # ============================================================
  - id: "DEP-PLE-081"
    trigger: "hot_water_piping"
    required_items: ["pipe_insulation_nitrile_rubber_25mm", "aluminium_foil_vapour_barrier", "cladding_at_exposed_locations"]
    trade: "plumbing"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: ""
    note: "Hot water pipes above 50°C must be insulated with minimum 25mm nitrile rubber foam with aluminium foil facing — uninsulated hot water pipes lose up to 20% of heat per metre, dramatically reducing system efficiency and increasing energy costs; insulation also prevents condensation on cold water pipes running adjacent to hot water pipes in humid Indian conditions"

  # ============================================================
  # COLD WATER PRESSURE TESTING
  # ============================================================
  - id: "DEP-PLE-082"
    trigger: "cold_water_supply_piping"
    required_items: ["hydraulic_pressure_test_1_5x_working_pressure", "pressure_hold_minimum_30_min"]
    trade: "plumbing"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 779"
    note: "IS 779 specifies hydraulic pressure test at 1.5 times maximum working pressure (typically 9-15 bar for high-rise cold water systems) held for minimum 30 minutes — pressure drop indicates leaks that must be located and repaired before concealment; testing before plastering or ceiling closure saves enormous remediation cost if leaks are found later"

  # ============================================================
  # ISI MARKED PIPES COMPLIANCE
  # ============================================================
  - id: "DEP-PLE-083"
    trigger: "plumbing_pipe_supply"
    required_items: ["isi_marked_cpvc_is15778", "isi_marked_upvc_is4985", "isi_marked_gi_is1239"]
    trade: "plumbing"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 1239 / IS 15778 / IS 4985"
    note: "All plumbing pipes must be ISI marked: CPVC per IS 15778, uPVC per IS 4985, GI per IS 1239 — non-ISI pipes are common on Indian construction sites and may have 30-50% less wall thickness than specified; ISI marking requires BIS certification with regular factory audits; non-compliant pipes fail prematurely and void material warranties"

  # ============================================================
  # ELECTRICAL CIRCUIT DIAGRAM AND LOAD CALCULATION
  # ============================================================
  - id: "DEP-PLE-084"
    trigger: "electrical_wiring"
    required_items: ["single_line_diagram", "load_calculation_sheet", "cable_schedule"]
    trade: "electrical"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 732"
    note: "Electrical single line diagram and load calculation sheet must be prepared before wiring commences — sizing cables and MCBs without calculations leads to overloaded circuits (fire risk) or over-sized cables (cost waste); cable schedule documents size, length, and routing of each circuit and is essential for future modifications and for electrical inspector approval"

  # ============================================================
  # DISTRIBUTION BOARD MCB PROTECTION
  # ============================================================
  - id: "DEP-PLE-085"
    trigger: "distribution_board"
    required_items: ["mcb_for_each_circuit", "rccb_30ma_main_incomer", "spare_ways_min_20pct"]
    trade: "electrical"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 732"
    note: "Each circuit must be individually protected by a correctly rated MCB — a common site practice is to wire multiple circuits on one MCB, defeating overload protection; 30mA RCCB (residual current device) on the main incomer provides earth fault protection required by IS 732; minimum 20% spare ways in every DB allows future circuit additions without adding a new board"

  # ============================================================
  # EARTHING IS 3043 TEST
  # ============================================================
  - id: "DEP-PLE-086"
    trigger: "earthing_system"
    required_items: ["earth_resistance_test_is3043", "resistance_below_5_ohm", "test_certificate_before_commissioning"]
    trade: "electrical"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 3043"
    note: "IS 3043 requires earth electrode resistance below 5 ohms (1 ohm for critical installations like hospitals); resistance must be measured with Megger earth tester before any electrical commissioning — high earth resistance fails to clear earth faults quickly, allowing dangerous touch voltages to persist; test certificate is required by Electrical Inspector before issuing clearance for connection to DISCOM supply"

  # ============================================================
  # GENERATOR AMF PANEL AND NEUTRAL LINK
  # ============================================================
  - id: "DEP-PLE-087"
    trigger: "generator_set"
    required_items: ["amf_panel_automatic_mains_failure", "neutral_link_or_separate_neutral", "earthing_generator"]
    trade: "electrical"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 4722"
    note: "AMF (Automatic Mains Failure) panel auto-starts DG set and transfers loads within 15 seconds of mains failure — manual operation is inadequate for hospitals and data centres; separate neutral is required (two earthing systems cannot share neutral) per IS 3043; DG earthing must be independent from building earthing to prevent fault current returning through building structure"

  # ============================================================
  # SOLAR SYSTEM - NET METERING AND STRUCTURAL LOAD
  # ============================================================
  - id: "DEP-PLE-088"
    trigger: "solar_pv_system"
    required_items: ["net_metering_application_to_discom", "structural_load_check_roof", "shadow_free_area_verification"]
    trade: "electrical"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "CERC Net Metering Regulations"
    note: "Net metering application to DISCOM must be submitted and approved before commissioning solar system — without net metering connection, exported power is wasted and system economics collapse; structural engineer must verify roof slab can carry solar panel dead load (typically 15-20 kg/sqm for panel + frame); shadow analysis from parapet walls, water tanks, and neighbouring buildings must confirm shadow-free area, as even partial shading of one panel degrades entire string output"

  # ============================================================
  # EV CHARGING POINT DEDICATED CIRCUIT
  # ============================================================
  - id: "DEP-PLE-089"
    trigger: "ev_charging_point"
    required_items: ["dedicated_circuit_32a_type2", "rcd_protection_ev", "cable_route_conduit"]
    trade: "electrical"
    priority: 2
    condition: ""
    building_types: ["residential_apartment", "commercial"]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "BIS EV Charging Standard"
    note: "EV charging points require a dedicated 32A circuit (for AC Level 2 Type 2 charging at 7.4kW) from the DB — sharing with other loads causes nuisance MCB tripping; RCD Type A or B protection is mandatory for EV circuits as EV chargers can produce DC fault currents that regular RCCBs cannot detect; conduit from panel to parking bay must be sized for future upgrades to DC fast charging"

  # ============================================================
  # DRAINAGE TESTING AND INSPECTION
  # ============================================================
  - id: "DEP-PLE-090"
    trigger: "drainage_system"
    required_items: ["cctv_inspection_underground_drain", "water_test_drainage_pipes"]
    trade: "plumbing"
    priority: 1
    condition: "large_building"
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 500
    is_code_ref: "IS 1742"
    note: "Underground drainage pipes should be water-tested (fill to inspection chamber level and hold 30 minutes) before backfilling — leaking underground drains contaminate soil and groundwater and are extremely expensive to repair after backfill; CCTV inspection of underground drains in large buildings verifies correct gradients, confirms no sagging (which causes blockages), and detects displaced joints before handover"

  # ============================================================
  # CONCEALED CONDUIT QUALITY CONTROL
  # ============================================================
  - id: "DEP-PLE-091"
    trigger: "concealed_electrical_conduit"
    required_items: ["conduit_inspection_before_plastering", "pull_wire_installed", "bend_radius_min_4x_od"]
    trade: "electrical"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 732"
    note: "All concealed conduit must be inspected (continuity check, pull wire verified) before plastering — discovering missing junction boxes or kinked bends after plastering requires hacking out; bend radius must be minimum 4x conduit OD to allow cable pulling without damage; pull wire must be left in each conduit from panel to outlet to facilitate future wiring"

  # ============================================================
  # FIRE RATED CABLE AND CONTAINMENT
  # ============================================================
  - id: "DEP-PLE-092"
    trigger: "fire_safety_wiring"
    required_items: ["fire_rated_cable_2hr_for_critical_circuits", "fire_rated_conduit_or_cable_tray"]
    trade: "electrical"
    priority: 1
    condition: "building_above_15m"
    building_types: [all]
    room_types: []
    min_floors: 5
    min_area_sqm: 0
    is_code_ref: "NBC Part 4"
    note: "Wiring for fire alarm, emergency lighting, fire pumps, and pressurization fans must use fire-resistant cable (FRC, minimum 2-hour resistance) per NBC Part 4 — standard PVC cables melt and fail within minutes of fire, cutting power to life-safety systems exactly when they are needed; fire-resistant containment (mineral-insulated cable or fire-rated conduit) ensures these circuits survive even in areas of active fire"

  # ============================================================
  # UPS BYPASS AND MAINTENANCE
  # ============================================================
  - id: "DEP-PLE-093"
    trigger: "ups_installation"
    required_items: ["static_bypass_switch", "manual_maintenance_bypass", "battery_room_ventilation"]
    trade: "electrical"
    priority: 1
    condition: ""
    building_types: ["commercial", "hospital", "data_center"]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: ""
    note: "UPS must have static bypass for seamless switchover on overload, and manual maintenance bypass so UPS can be serviced without cutting critical loads — UPS without bypass cannot be maintained without disrupting protected equipment; battery rooms must be ventilated to remove hydrogen gas (evolved during charging) that is explosive above 4% concentration; battery rooms must not have sparking equipment (switches, motors)"

  # ============================================================
  # WATER METER PROVISION PER UNIT
  # ============================================================
  - id: "DEP-PLE-094"
    trigger: "multi_unit_water_supply"
    required_items: ["individual_water_meter_per_unit", "meter_reading_access", "isolation_valve_per_unit"]
    trade: "plumbing"
    priority: 1
    condition: "multi_unit_building"
    building_types: ["residential_apartment", "commercial"]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "Local Bylaws"
    note: "Individual water meters per unit are now required by most municipality bye-laws and RERA regulations — shared meters make it impossible to charge units fairly and deter water conservation; meter must be accessible without entering the dwelling (meter box in common corridor); isolation valve per unit allows water to be cut to one flat without affecting others during repairs"

  # ============================================================
  # PIPE SLOPE FOR DRAINAGE
  # ============================================================
  - id: "DEP-PLE-095"
    trigger: "horizontal_drainage_pipes"
    required_items: ["minimum_slope_1_in_50", "slope_check_at_installation"]
    trade: "plumbing"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 1742"
    note: "IS 1742 specifies minimum 1:50 gradient for 100mm soil pipes and 1:40 for 75mm waste pipes — insufficient slope causes solid deposits and frequent blockages; excessive slope (> 1:20) causes water to run ahead of solids, also causing blockages; slope must be checked with spirit level at installation before concealment as post-pour correction requires demolishing screed and relaying"

  # ============================================================
  # PIPE SLEEVES THROUGH STRUCTURE
  # ============================================================
  - id: "DEP-PLE-096"
    trigger: "pipes_through_slab_or_wall"
    required_items: ["core_sleeve_one_size_larger", "fire_stop_intumescent_collar", "pipe_annulus_seal"]
    trade: "plumbing"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "NBC Part 4"
    note: "Sleeves through fire-compartment slabs and walls must be fitted with intumescent fire stop collars (halogen-free, tested to minimum 60-minute fire resistance) per NBC Part 4 — without collars, pipe penetrations are pathways for fire and smoke to spread between floors, negating compartmentation; annulus between pipe and sleeve must be sealed against sound transmission and water ingress"

  # ============================================================
  # POWER FACTOR CORRECTION
  # ============================================================
  - id: "DEP-PLE-097"
    trigger: "large_electrical_installation"
    required_items: ["power_factor_correction_capacitor_bank", "target_pf_0_95_lagging"]
    trade: "electrical"
    priority: 2
    condition: "load_above_50kva"
    building_types: ["commercial", "hospital", "hotel", "factory"]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 732"
    note: "DISCOMs impose power factor surcharge for PF below 0.90 — poor power factor (typically 0.7-0.8 without correction) incurs 3-5% penalty on electricity bills; capacitor bank raises PF to 0.95+ eliminating penalties and reducing apparent load on HT cables and transformer; automatic power factor correction (APFC) panel adjusts capacitance dynamically as load varies throughout the day"

  # ============================================================
  # SEWAGE EJECTOR / PUMPING STATION
  # ============================================================
  - id: "DEP-PLE-098"
    trigger: "below_grade_toilet_or_kitchen"
    required_items: ["sewage_ejector_pump", "non_return_valve_sewage", "pump_alarm_system"]
    trade: "plumbing"
    priority: 1
    condition: "drainage_below_sewer_level"
    building_types: [all]
    room_types: ["toilet", "basement"]
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 2065"
    note: "Toilets and kitchens in basement cannot drain by gravity if below the sewer invert — sewage ejector pump (grinder pump) is required; non-return valve prevents sewer backing up into basement if pump fails; high-level alarm is essential to warn before sewage overflows — failure to provide ejector pump in basement toilets results in sewage flooding, a serious health hazard"

  # ============================================================
  # LIGHTNING PROTECTION SYSTEM
  # ============================================================
  - id: "DEP-PLE-099"
    trigger: "lightning_protection"
    required_items: ["air_termination_network", "down_conductors_at_4_corners", "test_clamps_each_down_conductor", "earth_termination"]
    trade: "electrical"
    priority: 1
    condition: "building_above_15m"
    building_types: [all]
    room_types: []
    min_floors: 5
    min_area_sqm: 0
    is_code_ref: "IS 2309"
    note: "IS 2309 lightning protection system for buildings above 15m: air termination (Franklin rods or mesh) captures lightning strike; down conductors at building corners carry current to earth termination; test clamps at each down conductor allow individual resistance checks without disconnecting the system; unprotected high-rise buildings in lightning-prone monsoon zones (Kerala, NE India) risk structural damage and fire"

  # ============================================================
  # CABLE SIZING FOR VOLTAGE DROP
  # ============================================================
  - id: "DEP-PLE-100"
    trigger: "long_cable_runs"
    required_items: ["voltage_drop_check_max_3pct", "cable_upsized_if_required"]
    trade: "electrical"
    priority: 1
    condition: "cable_run_above_30m"
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 732"
    note: "IS 732 limits voltage drop to 3% from source to furthest point — long cable runs from distribution board to remote sockets (common in commercial and industrial buildings) require cable upsizing beyond current-carrying capacity to meet voltage drop limits; undersized cables cause motors to run hot, reduce LED driver life, and cause flicker complaints in lighting; voltage drop calculation must accompany cable schedule"

  # ============================================================
  # PUMP TESTING AND COMMISSIONING
  # ============================================================
  - id: "DEP-PLE-101"
    trigger: "pump_installation"
    required_items: ["pump_performance_test", "flow_rate_and_head_verified", "vibration_check_pump_set"]
    trade: "plumbing"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: ""
    note: "Pumps must be tested to verify flow rate and head match specification before handover — an incorrectly selected or impeller-trimmed pump delivers insufficient water to upper floors; vibration check (maximum 4mm/s RMS) identifies misalignment or bearing faults before they cause premature motor failure; pump test report with flow, head, current, and vibration readings must be included in O&M manual"

  # ============================================================
  # FIRE PUMP TESTING
  # ============================================================
  - id: "DEP-PLE-102"
    trigger: "fire_pump_system"
    required_items: ["fire_pump_flow_test_at_100pct_design", "duty_standby_auto_changeover_test", "jockey_pump_cut_in_cut_out_test"]
    trade: "fire_safety"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 3844"
    note: "Fire pump must be flow-tested at 100% design flow (typically 2280 LPM for wet riser) to verify it achieves required pressure at the highest hydrant — an untested fire pump that fails when needed during a fire is catastrophic; automatic changeover from duty to standby pump must be tested; jockey pump cut-in (0.5 bar below duty pump pressure) and cut-out settings must be calibrated and documented"

  # ============================================================
  # MOTOR CONTROL CENTRE
  # ============================================================
  - id: "DEP-PLE-103"
    trigger: "mcc_panel"
    required_items: ["star_delta_starter_or_vfd", "overload_relay_each_motor", "ammeter_voltmeter_per_feeder"]
    trade: "electrical"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 8623"
    note: "MCC feeders for motors above 5kW must have star-delta starters (or VFDs for variable speed) to limit starting current — Direct-On-Line starting of large motors (>15kW) causes voltage dip affecting other loads; thermal overload relay must be sized for each motor's full load current; ammeter and voltmeter per feeder allow operators to detect abnormal currents indicating mechanical overload or electrical faults"

  # ============================================================
  # SPRINKLER SYSTEM HYDRAULIC CALCULATION
  # ============================================================
  - id: "DEP-PLE-104"
    trigger: "fire_sprinkler_design"
    required_items: ["hydraulic_calculation_sprinkler", "design_area_and_density_per_hazard", "pump_selection_based_on_calc"]
    trade: "fire_safety"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 15105"
    note: "IS 15105 requires hydraulic calculation for sprinkler systems to determine operating pressure and flow at each zone — trial-and-error or rule-of-thumb pipe sizing leads to inadequate pressure at the most hydraulically remote sprinkler; hazard classification (Light, Ordinary, Extra Hazard) determines design density (mm/min) and area of operation, which directly drives pump size and tank capacity"

  # ============================================================
  # SEPTIC TANK SIZING
  # ============================================================
  - id: "DEP-PLE-105"
    trigger: "septic_tank"
    required_items: ["septic_tank_sizing_is2470", "soak_pit_sizing_per_soil", "inspection_chambers_both_ends"]
    trade: "plumbing"
    priority: 1
    condition: "no_sewer"
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 2470"
    note: "IS 2470 specifies septic tank sizing at 0.13 cum per user per day (2 days retention) — under-sized tanks overflow, creating a health hazard; soak pit area must be designed based on soil infiltration rate from percolation test — clay soils with low infiltration rate require larger soak pits; inspection chambers at both ends allow desludging with vacuum tanker, which must be done every 2-3 years"

  # ============================================================
  # GREASE TRAP FOR COMMERCIAL KITCHENS
  # ============================================================
  - id: "DEP-PLE-106"
    trigger: "commercial_kitchen_drainage"
    required_items: ["grease_trap_sized_per_meals", "grease_trap_accessible_for_cleaning", "grease_trap_before_main_drain"]
    trade: "plumbing"
    priority: 1
    condition: "commercial_kitchen"
    building_types: ["hotel", "restaurant", "commercial"]
    room_types: ["kitchen"]
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 2065"
    note: "Grease trap intercepts fats, oils, and greases before they enter the main drain and solidify, causing blockages — grease blockages are the most common cause of restaurant drainage failure and attract PCMC/GHMC penalty notices; grease trap must be sized for peak meal throughput (1.5 litres per meal served) and cleaned weekly in high-volume operations; placement before connection to municipal sewer is a condition in most restaurant trade licenses"

  # ============================================================
  # ELECTRICAL LOAD BALANCING
  # ============================================================
  - id: "DEP-PLE-107"
    trigger: "three_phase_electrical_installation"
    required_items: ["load_balancing_across_phases", "neutral_current_check", "phase_sequence_verification"]
    trade: "electrical"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 732"
    note: "Single-phase loads (lighting, sockets, ACs) must be balanced across three phases within 10% — unbalanced loading causes neutral current heating, voltage imbalance that damages sensitive equipment, and DISCOM penalties; phase sequence must be verified correct before motor connections (incorrect phase sequence reverses motor rotation direction); neutral current must not exceed 20% of phase current"

  # ============================================================
  # MANHOLE AND INSPECTION CHAMBER
  # ============================================================
  - id: "DEP-PLE-108"
    trigger: "underground_drainage"
    required_items: ["manhole_at_every_change_of_direction", "inspection_chamber_at_100m_max", "cast_iron_manhole_cover_loading"]
    trade: "plumbing"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 1742"
    note: "IS 1742 requires manhole at every change of direction and gradient — without manholes, blockages in underground drains cannot be rodded or jett-cleaned; inspection chambers at maximum 100m spacing allow access for CCTV inspection; manhole covers must be load-rated for the vehicle type in the area (D400 for car parks, E600 for driveways, F900 for HGV routes) — under-rated covers collapse under vehicle loads"

  # ============================================================
  # CABLING FIRE STOP
  # ============================================================
  - id: "DEP-PLE-109"
    trigger: "cable_penetrations_fire_wall"
    required_items: ["intumescent_fire_stop_sealant", "fire_stop_test_certificate", "fire_stop_installed_by_certified_contractor"]
    trade: "electrical"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "NBC Part 4"
    note: "Cable penetrations through fire-rated walls and slabs must be sealed with tested intumescent fire stop systems (minimum fire rating equal to wall or slab) — cable bundles are one of the most common fire spread pathways in buildings; installation must be done by a contractor certified by the product manufacturer; test certificate with EI (integrity and insulation) rating must be provided for each product used"

  # ============================================================
  # DOMESTIC HOT WATER MIXING VALVE
  # ============================================================
  - id: "DEP-PLE-110"
    trigger: "hot_water_delivery"
    required_items: ["thermostatic_mixing_valve_55_to_60c", "legionella_prevention_protocol"]
    trade: "plumbing"
    priority: 1
    condition: "central_hot_water_system"
    building_types: ["hotel", "hospital", "residential_apartment"]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: ""
    note: "Central hot water must be stored at 60°C to kill Legionella bacteria; thermostatic mixing valve (TMV) blends down to safe delivery temperature of 43-46°C at outlets, preventing scalding — WHO recommends this dual-temperature approach; hospitals and hotels are particularly vulnerable to Legionella liability; without TMV, either water is too hot (scald risk) or too cool (Legionella colonisation risk)"
