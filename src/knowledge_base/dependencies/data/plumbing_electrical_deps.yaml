rules:
  # ============================================================
  # BUILDING-LEVEL PLUMBING DEPENDENCIES
  # ============================================================
  - id: "DEP-PLE-001"
    trigger: "every_building"
    required_items: ["overhead_tank", "underground_sump", "pump_set", "distribution_piping", "drainage_system", "vent_pipe", "water_meter"]
    trade: "plumbing"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 2065"
    note: "Every building requires OH tank, sump, pump, distribution, drainage, vent, and meter"

  - id: "DEP-PLE-002"
    trigger: "every_building"
    required_items: ["earthing_system", "main_earth_pit", "earth_bus"]
    trade: "electrical"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 3043"
    note: "Every building requires earthing system with earth pits and earth bus per IS 3043"

  - id: "DEP-PLE-003"
    trigger: "water_supply"
    required_items: ["incoming_main", "isolation_valve", "check_valve", "pressure_gauge", "water_meter"]
    trade: "plumbing"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 2065"
    note: "Water supply system: incoming main, isolation valve, check valve, pressure gauge, meter"

  - id: "DEP-PLE-004"
    trigger: "drainage_system"
    required_items: ["soil_pipe", "waste_pipe", "vent_pipe", "manholes", "inspection_chambers"]
    trade: "plumbing"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 1742"
    note: "Building drainage: soil, waste, and vent pipes with manholes and inspection chambers"

  - id: "DEP-PLE-005"
    trigger: "water_tank_sump"
    required_items: ["rcc_sump", "waterproofing", "inlet_valve", "outlet_pipe", "overflow_pipe", "drain_valve", "level_indicator"]
    trade: "plumbing"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 3370"
    note: "Underground sump with waterproofing, valves, overflow, drain, and level indicator"

  - id: "DEP-PLE-006"
    trigger: "pump_room"
    required_items: ["pump_set_duty_standby", "panel_board", "pressure_vessel", "isolating_valves", "non_return_valve", "flooring", "drainage"]
    trade: "plumbing"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: ""
    note: "Pump room: duty-standby pump set, panel, pressure vessel, valves, flooring, drainage"

  # ============================================================
  # TOILET PLUMBING DEPENDENCIES
  # ============================================================
  - id: "DEP-PLE-007"
    trigger: "toilet_plumbing"
    required_items: ["cold_water_inlet", "hot_water_inlet", "soil_pipe_100mm", "waste_pipe_50mm", "floor_drain_trap", "concealed_valves"]
    trade: "plumbing"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: ["toilet", "bathroom"]
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 2065"
    note: "Every toilet requires cold/hot inlet, soil/waste pipes, floor drain, concealed valves"

  - id: "DEP-PLE-008"
    trigger: "toilet_plumbing"
    required_items: ["exhaust_duct", "ventilation_pipe"]
    trade: "plumbing"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: ["toilet", "bathroom"]
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: ""
    note: "Toilet exhaust duct and ventilation pipe for odour control"

  - id: "DEP-PLE-009"
    trigger: "toilet_plumbing"
    required_items: ["pipe_sleeves_through_slab", "pipe_clamps", "testing_pressure"]
    trade: "plumbing"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: ["toilet", "bathroom"]
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: ""
    note: "Pipe sleeves through slab, clamps for support, and pressure testing before closing"

  # ============================================================
  # KITCHEN PLUMBING DEPENDENCIES
  # ============================================================
  - id: "DEP-PLE-010"
    trigger: "kitchen_plumbing"
    required_items: ["cold_water_inlet", "hot_water_inlet", "waste_pipe_40mm", "gas_point", "chimney_duct"]
    trade: "plumbing"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: ["kitchen"]
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: ""
    note: "Kitchen plumbing: cold/hot inlets, waste pipe, gas point, chimney exhaust duct"

  - id: "DEP-PLE-011"
    trigger: "kitchen_plumbing"
    required_items: ["grease_trap"]
    trade: "plumbing"
    priority: 1
    condition: "commercial_kitchen"
    building_types: ["hotel", "restaurant", "commercial"]
    room_types: ["kitchen"]
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: ""
    note: "Commercial kitchen requires grease trap before connecting to drainage"

  # ============================================================
  # FLOOR-LEVEL ELECTRICAL DEPENDENCIES
  # ============================================================
  - id: "DEP-PLE-012"
    trigger: "every_floor"
    required_items: ["floor_db", "rccb", "mcb_per_circuit"]
    trade: "electrical"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 732"
    note: "Every floor requires distribution board with RCCB and MCB per circuit"

  - id: "DEP-PLE-013"
    trigger: "every_floor"
    required_items: ["conduit_system", "wiring", "junction_boxes"]
    trade: "electrical"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 732"
    note: "Floor electrical: conduit system, wiring, and junction boxes"

  - id: "DEP-PLE-014"
    trigger: "every_floor"
    required_items: ["emergency_light", "exit_sign"]
    trade: "electrical"
    priority: 1
    condition: "multi_storey"
    building_types: [all]
    room_types: []
    min_floors: 3
    min_area_sqm: 0
    is_code_ref: "NBC Part 4"
    note: "Emergency lighting and exit signage on every floor of multi-storey buildings"

  # ============================================================
  # BEDROOM ELECTRICAL DEPENDENCIES
  # ============================================================
  - id: "DEP-PLE-015"
    trigger: "bedroom_electrical"
    required_items: ["light_point_2", "fan_point", "ac_point_16a", "socket_5a_2", "socket_16a_1", "tv_point", "telephone_point"]
    trade: "electrical"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: ["bedroom"]
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 732"
    note: "Bedroom: 2 lights, fan, AC 16A, 2x5A sockets, 1x16A socket, TV, telephone"

  - id: "DEP-PLE-016"
    trigger: "bedroom_electrical"
    required_items: ["two_way_switch_bed_side", "bed_side_socket"]
    trade: "electrical"
    priority: 2
    condition: ""
    building_types: [all]
    room_types: ["bedroom"]
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: ""
    note: "Bedroom convenience: two-way switch at bedside with socket"

  # ============================================================
  # KITCHEN ELECTRICAL DEPENDENCIES
  # ============================================================
  - id: "DEP-PLE-017"
    trigger: "kitchen_electrical"
    required_items: ["light_point_2", "exhaust_fan_point", "socket_16a_3", "chimney_point_16a", "purifier_point", "dishwasher_point", "fridge_point"]
    trade: "electrical"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: ["kitchen"]
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 732"
    note: "Kitchen: 2 lights, exhaust, 3x16A sockets, chimney, purifier, dishwasher, fridge points"

  - id: "DEP-PLE-018"
    trigger: "kitchen_electrical"
    required_items: ["separate_mcb_kitchen", "platform_level_sockets"]
    trade: "electrical"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: ["kitchen"]
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 732"
    note: "Kitchen requires separate MCB and sockets at platform height for appliances"

  # ============================================================
  # TOILET ELECTRICAL DEPENDENCIES
  # ============================================================
  - id: "DEP-PLE-019"
    trigger: "toilet_electrical"
    required_items: ["light_point", "exhaust_fan_point", "geyser_point_16a"]
    trade: "electrical"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: ["toilet", "bathroom"]
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 732"
    note: "Toilet electrical: light, exhaust fan, geyser 16A point with separate MCB"

  - id: "DEP-PLE-020"
    trigger: "toilet_electrical"
    required_items: ["ip44_rated_accessories"]
    trade: "electrical"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: ["toilet", "bathroom"]
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 732"
    note: "Toilet/bathroom electrical accessories must be IP44 rated for wet area"

  # ============================================================
  # LIVING ROOM ELECTRICAL DEPENDENCIES
  # ============================================================
  - id: "DEP-PLE-021"
    trigger: "living_room_electrical"
    required_items: ["light_point_3", "fan_point", "ac_point_16a", "socket_5a_3", "tv_point"]
    trade: "electrical"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: ["living_room"]
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 732"
    note: "Living room: 3 lights, fan, AC 16A, 3x5A sockets, TV point"

  - id: "DEP-PLE-022"
    trigger: "living_room_electrical"
    required_items: ["dimmer_provision", "scene_control"]
    trade: "electrical"
    priority: 2
    condition: "premium"
    building_types: [all]
    room_types: ["living_room"]
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: ""
    note: "Premium living room: dimmer provision and scene control for lighting"

  # ============================================================
  # BUILDING-LEVEL ELECTRICAL DEPENDENCIES
  # ============================================================
  - id: "DEP-PLE-023"
    trigger: "building_electrical"
    required_items: ["main_cable_from_transformer", "msb_main_switch_board", "earthing_system", "energy_meter", "dg_provision"]
    trade: "electrical"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 732"
    note: "Building electrical: main cable, MSB, earthing, energy meter, DG provision"

  - id: "DEP-PLE-024"
    trigger: "building_electrical"
    required_items: ["lightning_protection"]
    trade: "electrical"
    priority: 1
    condition: "building_above_15m"
    building_types: [all]
    room_types: []
    min_floors: 5
    min_area_sqm: 0
    is_code_ref: "IS 2309"
    note: "Lightning protection system for buildings above 15m per IS 2309"

  - id: "DEP-PLE-025"
    trigger: "building_electrical"
    required_items: ["cable_tray", "cable_ladder", "riser_shaft"]
    trade: "electrical"
    priority: 1
    condition: "multi_storey"
    building_types: [all]
    room_types: []
    min_floors: 3
    min_area_sqm: 0
    is_code_ref: "IS 732"
    note: "Multi-storey building requires cable tray, ladder, and riser shaft for vertical distribution"

  - id: "DEP-PLE-026"
    trigger: "building_electrical"
    required_items: ["transformer", "ht_cable", "ht_panel"]
    trade: "electrical"
    priority: 1
    condition: "load_above_100kva"
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 500
    is_code_ref: "IS 732"
    note: "Large buildings with load above 100kVA require dedicated transformer and HT connection"

  - id: "DEP-PLE-027"
    trigger: "dg_set"
    required_items: ["dg_room", "acoustic_enclosure", "fuel_tank", "exhaust_piping", "amf_panel", "earthing"]
    trade: "electrical"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 4722"
    note: "DG set requires room, acoustic enclosure, fuel tank, exhaust, AMF panel, earthing"

  # ============================================================
  # MULTI-STOREY RISER SHAFT DEPENDENCIES
  # ============================================================
  - id: "DEP-PLE-028"
    trigger: "multi_storey"
    required_items: ["plumbing_riser_shaft", "electrical_riser_shaft", "hvac_riser_shaft", "fire_riser_shaft"]
    trade: "services"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 4
    min_area_sqm: 0
    is_code_ref: ""
    note: "Multi-storey building requires separate riser shafts for plumbing, electrical, HVAC, and fire"

  - id: "DEP-PLE-029"
    trigger: "plumbing_riser"
    required_items: ["supply_riser", "drainage_stack", "vent_stack", "fire_stop_at_slab"]
    trade: "plumbing"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 4
    min_area_sqm: 0
    is_code_ref: "IS 2065"
    note: "Plumbing riser: supply riser, drainage stack, vent stack, fire stop at each floor slab"

  - id: "DEP-PLE-030"
    trigger: "electrical_riser"
    required_items: ["bus_duct_or_cable", "floor_db", "fire_stop_at_slab", "access_door"]
    trade: "electrical"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 4
    min_area_sqm: 0
    is_code_ref: "IS 732"
    note: "Electrical riser: bus duct or cable, floor DB, fire stop at each slab, access door"

  # ============================================================
  # SOLAR SYSTEM DEPENDENCIES
  # ============================================================
  - id: "DEP-PLE-031"
    trigger: "solar_system"
    required_items: ["solar_panels", "inverter", "net_meter", "dc_cabling", "ac_cabling", "mounting_structure", "earthing"]
    trade: "electrical"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 14286"
    note: "Solar system: panels, inverter, net meter, DC/AC cabling, mounting, earthing"

  - id: "DEP-PLE-032"
    trigger: "solar_system"
    required_items: ["acdb", "dcdb", "lightning_arrester", "surge_protection"]
    trade: "electrical"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 14286"
    note: "Solar system protection: ACDB, DCDB, lightning arrester, surge protection"

  - id: "DEP-PLE-033"
    trigger: "solar_water_heater"
    required_items: ["collector_panels", "storage_tank", "piping_insulated", "mixing_valve", "mounting_frame"]
    trade: "plumbing"
    priority: 2
    condition: ""
    building_types: ["residential"]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: ""
    note: "Solar water heater: collector panels, storage tank, insulated piping, mixing valve"

  # ============================================================
  # STP DEPENDENCIES
  # ============================================================
  - id: "DEP-PLE-034"
    trigger: "stp_required"
    required_items: ["stp_plant", "inlet_chamber", "outlet_chamber", "sludge_drying_bed", "treated_water_tank"]
    trade: "plumbing"
    priority: 1
    condition: "no_municipal_sewer_or_above_10000sqft"
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 930
    is_code_ref: "CPCB Guidelines"
    note: "STP required if no municipal sewer or built-up above 10000 sqft"

  - id: "DEP-PLE-035"
    trigger: "stp"
    required_items: ["electrical_connection", "blower", "dosing_system", "control_panel", "sampling_point"]
    trade: "plumbing"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "CPCB Guidelines"
    note: "STP requires electrical, blower, dosing, control panel, sampling point"

  # ============================================================
  # RWH DEPENDENCIES
  # ============================================================
  - id: "DEP-PLE-036"
    trigger: "rwh_required"
    required_items: ["roof_collection", "first_flush_diverter", "filter_chamber", "storage_tank_or_recharge_pit"]
    trade: "plumbing"
    priority: 1
    condition: "plot_above_100sqm"
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 100
    is_code_ref: "Local Bylaws"
    note: "Rainwater harvesting required for plots above 100 sqm per most local bylaws"

  - id: "DEP-PLE-037"
    trigger: "rwh"
    required_items: ["rain_water_pipe", "collection_chamber", "overflow_connection"]
    trade: "plumbing"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "Local Bylaws"
    note: "RWH components: rain water down-pipe, collection chamber, overflow to drain"

  # ============================================================
  # HOT WATER SYSTEM DEPENDENCIES
  # ============================================================
  - id: "DEP-PLE-038"
    trigger: "hot_water_system"
    required_items: ["hot_water_generator", "insulated_piping", "mixing_valve", "return_line"]
    trade: "plumbing"
    priority: 1
    condition: "central_system"
    building_types: ["hotel", "hospital"]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: ""
    note: "Central hot water: generator, insulated piping, mixing valve, return line"

  - id: "DEP-PLE-039"
    trigger: "geyser_point"
    required_items: ["hot_water_pipe", "cold_water_inlet", "power_point_16a", "mixing_valve"]
    trade: "plumbing"
    priority: 1
    condition: "individual_geyser"
    building_types: [all]
    room_types: ["toilet", "bathroom"]
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: ""
    note: "Individual geyser point: hot/cold pipes, 16A power point, mixing valve"

  # ============================================================
  # GAS PIPING DEPENDENCIES
  # ============================================================
  - id: "DEP-PLE-040"
    trigger: "gas_piping"
    required_items: ["gi_pipe", "isolation_valve", "regulator", "gas_detector", "emergency_shutoff"]
    trade: "plumbing"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: ["kitchen"]
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 5572"
    note: "Gas piping: GI pipe, isolation valves, regulator, gas detector, emergency shutoff"

  - id: "DEP-PLE-041"
    trigger: "piped_gas_supply"
    required_items: ["gas_meter", "manifold", "distribution_pipe", "gas_cock_at_appliance"]
    trade: "plumbing"
    priority: 1
    condition: ""
    building_types: ["residential_apartment"]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 5572"
    note: "Piped gas supply: meter, manifold, distribution pipes, gas cock at each appliance"

  # ============================================================
  # FIRE FIGHTING PLUMBING DEPENDENCIES
  # ============================================================
  - id: "DEP-PLE-042"
    trigger: "fire_hydrant_system"
    required_items: ["fire_tank", "fire_pump_set", "jockey_pump", "wet_riser", "landing_valve", "hose_reel"]
    trade: "fire_safety"
    priority: 1
    condition: "building_above_15m"
    building_types: [all]
    room_types: []
    min_floors: 5
    min_area_sqm: 0
    is_code_ref: "IS 3844"
    note: "Fire hydrant system: tank, pump set, jockey pump, wet riser, landing valve, hose reel"

  - id: "DEP-PLE-043"
    trigger: "fire_sprinkler_system"
    required_items: ["sprinkler_heads", "piping_network", "alarm_valve", "fire_pump", "fire_tank"]
    trade: "fire_safety"
    priority: 1
    condition: "building_above_15m"
    building_types: [all]
    room_types: []
    min_floors: 5
    min_area_sqm: 0
    is_code_ref: "IS 15105"
    note: "Fire sprinkler: heads, piping, alarm valve, pump, and dedicated tank"

  # ============================================================
  # UPS AND POWER BACKUP DEPENDENCIES
  # ============================================================
  - id: "DEP-PLE-044"
    trigger: "ups_system"
    required_items: ["ups_unit", "battery_bank", "bypass_switch", "ups_db", "dedicated_earthing"]
    trade: "electrical"
    priority: 1
    condition: ""
    building_types: ["commercial", "hospital", "data_center"]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: ""
    note: "UPS system: unit, battery bank, bypass switch, distribution board, dedicated earthing"

  - id: "DEP-PLE-045"
    trigger: "ups_room"
    required_items: ["ventilation", "fire_detection", "acid_resistant_flooring", "eye_wash_station"]
    trade: "electrical"
    priority: 1
    condition: ""
    building_types: ["commercial", "hospital", "data_center"]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: ""
    note: "UPS room requires ventilation, fire detection, acid-resistant floor, eye wash"

  # ============================================================
  # COMMUNICATION AND DATA DEPENDENCIES
  # ============================================================
  - id: "DEP-PLE-046"
    trigger: "structured_cabling"
    required_items: ["server_room", "patch_panel", "cat6_cable", "data_sockets", "cable_tray"]
    trade: "electrical"
    priority: 1
    condition: ""
    building_types: ["commercial", "hospital", "hotel"]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: ""
    note: "Structured cabling: server room, patch panels, Cat6 cable, data sockets, cable tray"

  - id: "DEP-PLE-047"
    trigger: "intercom_system"
    required_items: ["intercom_unit_per_flat", "gate_unit", "cabling", "power_supply"]
    trade: "electrical"
    priority: 2
    condition: ""
    building_types: ["residential_apartment"]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: ""
    note: "Intercom: unit per flat, gate unit, cabling, power supply"

  # ============================================================
  # CCTV AND SECURITY DEPENDENCIES
  # ============================================================
  - id: "DEP-PLE-048"
    trigger: "cctv_system"
    required_items: ["cameras", "nvr", "monitor", "cabling", "power_supply", "storage"]
    trade: "electrical"
