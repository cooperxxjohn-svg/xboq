    min_area_sqm: 0
    is_code_ref: ""
    note: "Terrace garden: heavy duty waterproofing, root barrier, drainage, soil, planting, irrigation"

  # ============================================================
  # SITE MOBILISATION - SAFETY PLAN AND BOCW
  # ============================================================
  - id: "DEP-EXT-051"
    trigger: "site_mobilisation"
    required_items: ["written_safety_plan_site", "bocw_registration_certificate", "labour_insurance_esic_epf"]
    trade: "preliminaries"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "BOCW Act 1996"
    note: "Before any construction work commences, BOCW registration with Labour Department is mandatory for projects > Rs.10 lakhs — registration triggers the cess (1%) that funds worker welfare; a written site safety plan must be prepared and approved by the safety officer; ESIC and EPF registration is required for labour welfare and is checked by Labour Inspector during routine inspections; absent registrations expose the developer to criminal liability"

  - id: "DEP-EXT-052"
    trigger: "site_mobilisation"
    required_items: ["site_hoarding_approved_height", "watchman_cabin", "site_address_board"]
    trade: "preliminaries"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "Local Authority"
    note: "Site hoarding (minimum 2.1m high opaque sheet) is required by most municipal bye-laws within 2 days of commencement — hoardings prevent material theft and protect the public from site hazards; site address board (required by NBC and RERA) must display building permit number, architect, structural engineer, and RERA registration number; watchman cabin with telephone prevents unauthorised entry"

  # ============================================================
  # CONCRETE WORK - MIX DESIGN IS 10262
  # ============================================================
  - id: "DEP-EXT-053"
    trigger: "concrete_work_on_site"
    required_items: ["concrete_mix_design_is10262_approved", "trial_mixes_before_production", "batching_plant_calibration"]
    trade: "structural"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 10262"
    note: "IS 10262 mix design must be approved by structural consultant before first pour — mix design uses actual materials (specific cement, aggregates from the project source) and is not transferable between sites; trial mixes must be cast, cured, and tested before production to confirm design strength is achievable; batching plant weighing systems must be calibrated monthly to ensure water/cement ratio is controlled to ± 2% — uncalibrated plants are responsible for many low cube strength incidents"

  # ============================================================
  # THIRD PARTY LAB APPOINTMENT
  # ============================================================
  - id: "DEP-EXT-054"
    trigger: "any_material_testing"
    required_items: ["nabl_accredited_lab_appointment", "testing_schedule_before_work_starts", "site_laboratory_if_large_project"]
    trade: "preliminaries"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 456"
    note: "All material testing (concrete cubes, steel, soil, bricks) must be done at NABL-accredited laboratory — test certificates from non-accredited labs are not accepted by structural consultants, local authorities, or RERA; testing schedule (what tests, frequency, responsibility) must be agreed with the structural consultant before construction starts; large projects (>5000 sqm) justify a site laboratory for routine cube testing with calibrated compression machine"

  # ============================================================
  # COMPLETION - SNAGGING AND DEFECT RECTIFICATION
  # ============================================================
  - id: "DEP-EXT-055"
    trigger: "project_completion"
    required_items: ["snagging_list_joint_inspection", "defect_rectification_before_handover", "reinspection_after_rectification"]
    trade: "preliminaries"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: ""
    note: "Joint snagging inspection with client, consultant, and contractor before handover produces an agreed defect list — without a formal snagging process, disputes about what was defective before handover are common during the DLP; all items on snagging list must be rectified and reinspected before handover documents are signed; RERA regulations give buyers the right to withhold 5-10% of payment until snagging is cleared"

  # ============================================================
  # HANDOVER O&M MANUALS AND AS-BUILT
  # ============================================================
  - id: "DEP-EXT-056"
    trigger: "project_handover"
    required_items: ["om_manuals_all_systems", "as_built_drawings_all_services_stamped", "training_facility_management_team"]
    trade: "preliminaries"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: ""
    note: "O&M manuals for every installed system (HVAC, electrical, plumbing, lifts, fire) must be submitted at handover — without O&M manuals, facilities management teams cannot maintain equipment correctly, resulting in premature failure and loss of warranties; as-built drawings stamped by the installed contractor reflect actual pipe routes, cable routes, and equipment locations needed for future modifications; facility management team training on BMS, fire panel, and generator operation must be documented"

  # ============================================================
  # EXTERNAL STORM WATER DRAINAGE DESIGN
  # ============================================================
  - id: "DEP-EXT-057"
    trigger: "external_works"
    required_items: ["storm_water_drainage_design", "rainfall_intensity_based_on_local_data", "retention_pond_or_percolation_if_required"]
    trade: "external"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "Local Bylaws"
    note: "Storm water drainage design must be based on local rainfall intensity data (100-year return period storm event) — under-designed drainage causes site flooding, basement seepage, and road damage; impervious site coverage increases runoff over pre-development levels and several states now require on-site retention or percolation to restore pre-development runoff coefficient; storm water design must be submitted with building plan application in many municipalities"

  # ============================================================
  # LANDSCAPING - IRRIGATION AND PLANTING SCHEME
  # ============================================================
  - id: "DEP-EXT-058"
    trigger: "landscaping"
    required_items: ["irrigation_system_design", "water_efficient_drip_or_sprinkler", "planting_scheme_approved_species"]
    trade: "landscape"
    priority: 2
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: ""
    note: "Irrigation system must be designed for the specific plant palette and local climate — drip irrigation for trees and shrubs reduces water consumption by 50-70% over overhead sprinklers; water-efficient drip irrigation is required for GRIHA and LEED water credit; planting scheme must use locally adapted species (ideally native) that require minimal irrigation once established — exotic species with high water demand routinely die during summer, requiring expensive replacement"

  - id: "DEP-EXT-059"
    trigger: "landscaping"
    required_items: ["landscape_architect_approved_species_list", "soil_preparation_organic_matter", "mulching_after_planting"]
    trade: "landscape"
    priority: 2
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: ""
    note: "Landscape architect must approve species selection for site microclimate, soil conditions, and maintenance requirements; soil must be prepared with organic matter (compost, vermicompost) before planting as construction sites have degraded, compacted soil with no topsoil; mulching (75-100mm bark chip or coir) after planting dramatically reduces moisture loss and weed growth, reducing irrigation demand by 30-40% in the first year"

  # ============================================================
  # SIGNAGE AND NUMBERING
  # ============================================================
  - id: "DEP-EXT-060"
    trigger: "building_completion"
    required_items: ["flat_numbering_and_floor_signage", "fire_exit_signage_illuminated", "emergency_contact_board"]
    trade: "external"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "NBC Part 4"
    note: "Flat numbering and floor level signage are required before occupancy — emergency services cannot locate a fire or medical incident without clear flat number identification; illuminated fire exit signs (continuous) per NBC Part 4 must be connected to emergency power (UPS or central battery); emergency contact board at main entrance with fire, police, gas emergency, and building management contacts is required by most RWA rules"

  # ============================================================
  # PORTABLE WATER TESTING AT HANDOVER
  # ============================================================
  - id: "DEP-EXT-061"
    trigger: "water_system_handover"
    required_items: ["potable_water_bacteriological_test_at_handover", "chlorination_documentation"]
    trade: "plumbing"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 10500"
    note: "Bacteriological water quality test per IS 10500 at point of delivery (tap, not just tank) must be done and passed before building handover — construction debris and biofilm accumulate in new pipework; chlorination at 50ppm minimum followed by flushing, then final test confirms zero E. coli and total coliforms; handover without water quality certificate creates legal liability if occupants fall ill"

  # ============================================================
  # PROJECT INSURANCE AT COMPLETION
  # ============================================================
  - id: "DEP-EXT-062"
    trigger: "project_handover"
    required_items: ["latent_defect_insurance_10_years", "structural_warranty_provision"]
    trade: "preliminaries"
    priority: 2
    condition: "residential_apartment"
    building_types: ["residential_apartment", "commercial"]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "RERA 2016"
    note: "RERA Section 14 makes developer liable for structural defects for 5 years after handover — latent defect insurance (available from Indian insurers) transfers this risk to an insurer; structural warranty for 10 years protects buyers and is a marketing differentiator; documentation of design compliance, testing records, and construction supervision must be retained to defend warranty claims"

  # ============================================================
  # FIRE TENDER ROAD AND ACCESS
  # ============================================================
  - id: "DEP-EXT-063"
    trigger: "site_external_works"
    required_items: ["fire_tender_access_road_complete_before_occupation", "hard_standing_area_at_building_face"]
    trade: "external"
    priority: 1
    condition: "building_above_15m"
    building_types: [all]
    room_types: []
    min_floors: 5
    min_area_sqm: 0
    is_code_ref: "NBC Part 4"
    note: "NBC Part 4 requires fire tender access road (minimum 6m wide, 4m clear height, 180 kN turning radius for 18-tonne appliance) to be complete before the building is occupied — fire brigade cannot access a burning high-rise without a prepared road; hard standing at building face must support fire appliance outriggers; road must be available 24/7 and not blocked by parked vehicles (clear signage and enforcement mechanism required)"

  # ============================================================
  # EXTERNAL PLINTH PROTECTION
  # ============================================================
  - id: "DEP-EXT-064"
    trigger: "external_works_complete"
    required_items: ["plinth_protection_600mm_wide_slope_away", "anti_termite_treatment_external"]
    trade: "external"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 6313"
    note: "Plinth protection apron (PCC 1:2:4 minimum 75mm thick, 600mm wide, sloped 1:20 away from building) prevents rain splashing back onto DPC and directs surface water away from foundations — absent plinth protection causes DPC bridging by fill, leading to rising damp in ground floor walls within 2-3 monsoons; perimeter anti-termite chemical treatment (IS 6313 Part 3) as final external work before handover prevents subterranean termite attack from surrounding soil"

  # ============================================================
  # SOIL TESTING BEFORE EXCAVATION
  # ============================================================
  - id: "DEP-EXT-065"
    trigger: "pre_construction"
    required_items: ["soil_investigation_with_spt_borehole", "chemical_analysis_soil_sulphate_chloride", "ground_water_table_level_report"]
    trade: "structural"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 1892"
    note: "IS 1892 soil investigation with SPT boreholes (minimum 2 per 500 sqm footprint, depth 1.5x building depth below ground) is essential before footing design — presumed safe bearing capacity is often wrong; chemical analysis for sulphates (>0.3% requires sulphate-resistant cement) and chlorides (>0.5% accelerates rebar corrosion) affects concrete specification; ground water table level determines need for dewatering and waterproofing category"

  # ============================================================
  # SURVEY AND SETTING OUT
  # ============================================================
  - id: "DEP-EXT-066"
    trigger: "pre_construction_survey"
    required_items: ["topographic_survey_before_design", "permanent_benchmark_fixed", "building_layout_verified_by_licensed_surveyor"]
    trade: "preliminaries"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: ""
    note: "Topographic survey before design confirms actual levels, existing utilities, and boundary conditions — designing from assumed or outdated survey data leads to drainage design errors and disputes with neighbours; a permanent benchmark (BM) fixed to a structure before excavation provides a datum for all level control throughout construction; building layout must be verified by a licensed surveyor against approved plan coordinates before excavation begins — encroachment on setback or neighbour's land requires demolition"

  # ============================================================
  # TEMPORARY SERVICES
  # ============================================================
  - id: "DEP-EXT-067"
    trigger: "construction_site"
    required_items: ["temporary_power_connection_from_discom", "temporary_water_connection", "site_drainage_during_construction"]
    trade: "preliminaries"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: ""
    note: "Temporary DISCOM power connection (with meter) must be obtained before DG-only sites switch to permanent supply — sites running entirely on DG for years incur 3-4x higher power cost; temporary water connection must provide adequate supply for curing concrete (7 days after each pour), plastering, and labour use; site drainage must be established before excavation to prevent waterlogged working conditions that slow construction and damage completed foundations"

  # ============================================================
  # WASTE MANAGEMENT DURING CONSTRUCTION
  # ============================================================
  - id: "DEP-EXT-068"
    trigger: "construction_site"
    required_items: ["construction_waste_segregation_bins", "disposal_to_approved_site", "no_burning_on_site"]
    trade: "preliminaries"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "Construction and Demolition Waste Management Rules 2016"
    note: "C&D Waste Management Rules 2016 require construction waste to be segregated (concrete, masonry, steel, wood) and disposed of only at designated C&D waste recycling facilities — burning wood and other site waste on site violates CPCB Air Quality norms and results in fines; project must maintain a waste management log documenting quantities removed; green building ratings (GRIHA, LEED) require minimum 50% diversion of construction waste from landfill"

  # ============================================================
  # DOCUMENTATION FOR RERA
  # ============================================================
  - id: "DEP-EXT-069"
    trigger: "project_registration_rera"
    required_items: ["rera_registration_before_marketing", "quarterly_progress_report_rera_portal", "escrow_account_70pct_funds"]
    trade: "statutory"
    priority: 1
    condition: "residential_apartment"
    building_types: ["residential_apartment"]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "RERA 2016"
    note: "Real Estate (Regulation and Development) Act 2016 requires RERA registration before any marketing or sales of a residential project — marketing without RERA registration carries Rs. 10 lakh per day penalty; quarterly progress reports must be uploaded to state RERA portal; 70% of sale proceeds must be deposited in a dedicated escrow account and can only be withdrawn for land and construction costs with CA certificate — escrow ensures project completion funds are not diverted"

  # ============================================================
  # PRE-HANDOVER COMMISSIONING TESTING
  # ============================================================
  - id: "DEP-EXT-070"
    trigger: "pre_handover"
    required_items: ["all_systems_commissioned_before_handover", "integrated_testing_fire_systems", "lift_load_test_before_use"]
    trade: "preliminaries"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: ""
    note: "All building systems (HVAC, plumbing, electrical, fire, lifts) must be commissioned and tested before handover — systems handed over untested routinely fail within weeks of occupancy leading to expensive emergency repairs, dissatisfied occupants, and loss of developer reputation; integrated fire system testing (fire alarm triggers sprinkler flow switch, BMS shuts AHU) must be witnessed by Fire Officer before fire NOC is issued; lift load test (IS 14665: 125% rated load) is mandatory before passengers can use the lift"

  # ============================================================
  # NOISE BARRIER FOR CONSTRUCTION
  # ============================================================
  - id: "DEP-EXT-071"
    trigger: "construction_adjacent_sensitive_use"
    required_items: ["noise_barrier_hoarding", "restricted_working_hours_as_per_local_rules", "vibration_monitoring_adjacent_structures"]
    trade: "preliminaries"
    priority: 1
    condition: "adjacent_hospital_school_residential"
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "CPCB Noise Rules 2000"
    note: "Construction adjacent to hospitals, schools, and residential areas must use noise barriers (dense hoarding) and restrict noisy operations (pile driving, compaction) to permitted hours per local rules (typically 7am-10pm residential, 9am-6pm commercial); vibration monitoring on adjacent structures during piling and heavy compaction is required — CPCB Noise Rules 2000 set construction site limits; courts routinely grant injunctions stopping construction near hospitals based on noise complaints, causing project delays of months"

  # ============================================================
  # STREET REINSTATEMENT
  # ============================================================
  - id: "DEP-EXT-072"
    trigger: "site_access_construction"
    required_items: ["road_reinstatement_after_construction", "utility_crossing_permit", "footpath_restoration"]
    trade: "external"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "Local Authority"
    note: "Any road or footpath disturbed for utility crossings (water, sewer, electrical) must be reinstated to the original (or better) condition with a road-opening permit — without permit, municipality imposes penalty and may require additional reinstatement; utility crossing permit defines the reinstatement specification (e.g., asphaltic concrete wearing course on arterial roads); incomplete reinstatement is a common reason for municipality withholding completion certificate"

  # ============================================================
  # ENVIRONMENTAL PROTECTION DURING CONSTRUCTION
  # ============================================================
  - id: "DEP-EXT-073"
    trigger: "construction_site_environment"
    required_items: ["dust_suppression_water_sprinkler_on_site", "vehicle_wash_exit", "green_netting_on_scaffolding"]
    trade: "preliminaries"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "CPCB Air Quality Guidelines"
    note: "Construction dust suppression is mandatory under CPCB Air Quality norms — automated water sprinklers or manual spraying on exposed soil and material stockpiles must be done daily; vehicle wheel-wash at site exit prevents road mud that creates PM10 pollution and accident hazards; green netting on scaffolding above 10m containing dust from breaking of external plaster or brickwork is required in most metropolitan cities (NMCG/BMTPC guidelines)"

  # ============================================================
  # COMPLETION OF EXTERNAL WORKS BEFORE OCCUPATION
  # ============================================================
  - id: "DEP-EXT-074"
    trigger: "occupation_of_building"
    required_items: ["external_works_substantially_complete", "access_roads_surfaced", "external_lighting_operational"]
    trade: "external"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "Local Authority"
    note: "External works — roads, drainage, compound wall, external lighting — should be substantially complete before occupation; newly occupied buildings with incomplete external works attract complaints and can delay Occupancy Certificate; access roads must be surfaced before heavy moving-in traffic damages sub-base; external lighting must be operational for safety — many handover disputes begin because developers hand over buildings with external works only 30-40% complete"

  # ============================================================
  # PEST CONTROL BEFORE OCCUPATION
  # ============================================================
  - id: "DEP-EXT-075"
    trigger: "pre_handover"
    required_items: ["general_pest_control_treatment", "anti_termite_certificate", "rodent_proofing_all_pipe_penetrations"]
    trade: "specialist"
    priority: 2
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 6313"
    note: "General pest control treatment before handover eliminates insects (cockroaches, ants) that have established during construction — once occupants move in, pest control is disruptive and occupants resist; anti-termite certificate from IS 6313-certified contractor must be part of the handover package; all pipe penetrations through external walls must be rodent-proofed with steel wool and sealant — rats entering through pipe gaps are among the most common post-occupancy complaints in Indian housing projects"
