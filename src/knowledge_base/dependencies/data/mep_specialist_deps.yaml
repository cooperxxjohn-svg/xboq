  # ============================================================
  # SPLIT AC DEDICATED CIRCUIT AND SUPPORT
  # ============================================================
  - id: "DEP-MEP-061"
    trigger: "split_ac"
    required_items: ["dedicated_electrical_circuit_16a", "condensate_drain_to_outlet", "structural_support_bracket"]
    trade: "hvac"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: ""
    note: "Split AC outdoor unit must have a dedicated 16A circuit (shared circuits cause nuisance tripping when compressor starts); condensate drain pipe from indoor unit must reach a designated drain point — condensate discharged to balcony is a nuisance and stains facade; outdoor unit structural bracket must be sized for unit weight plus wind load, especially at heights above 10m where wind uplift is significant"

  # ============================================================
  # CHILLER COOLING TOWER AND CHEMICAL DOSING
  # ============================================================
  - id: "DEP-MEP-062"
    trigger: "chiller_plant"
    required_items: ["cooling_tower_sized_for_heat_rejection", "condenser_water_pump_vfd", "chemical_dosing_system"]
    trade: "hvac"
    priority: 1
    condition: ""
    building_types: ["commercial", "hospital", "hotel"]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: ""
    note: "Cooling tower must be sized for the chiller's heat rejection load (typically 1.2-1.3x cooling capacity) accounting for Indian summer wet bulb temperatures — undersized cooling tower drives up chilled water supply temperature, reducing chiller efficiency by 2-3% per °C; VFD on condenser water pump saves 40-60% pump energy; chemical dosing (biocide, corrosion inhibitor, scale inhibitor) prevents Legionella growth in cooling tower fill, which is a major public health risk"

  # ============================================================
  # AHU FRESH AIR DAMPER AND RETURN AIR DUCT
  # ============================================================
  - id: "DEP-MEP-063"
    trigger: "ahu_system"
    required_items: ["fresh_air_damper_motorised", "return_air_duct_sized", "filter_access_panel_ahu"]
    trade: "hvac"
    priority: 1
    condition: ""
    building_types: ["commercial", "hospital", "hotel"]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "ASHRAE 62.1"
    note: "Motorised fresh air damper enables BMS to modulate outside air per CO2 level and occupancy (ASHRAE 62.1 demand control ventilation) — fixed open dampers waste enormous cooling energy; return air duct must be sized for full return air volume (building operates at slight positive pressure); filter access panel must be generous enough for a maintenance worker to change bags without removing duct sections"

  # ============================================================
  # BMS DDC PANELS AND TRAINING
  # ============================================================
  - id: "DEP-MEP-064"
    trigger: "bms_system"
    required_items: ["ddc_panels_per_system", "field_devices_sensors_and_actuators", "operator_training_40_hours_min"]
    trade: "hvac"
    priority: 2
    condition: ""
    building_types: ["commercial", "hospital", "hotel"]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: ""
    note: "BMS DDC panels must be commissioned for each HVAC, fire, and electrical system; field devices (temperature sensors, differential pressure transducers, actuated valves) must be calibrated after installation; minimum 40 hours operator training is essential — untrained facility managers frequently override setpoints, turn off sub-systems, or fail to respond to alarms, negating 60-70% of BMS energy savings potential; training record should be contractually required"

  # ============================================================
  # FIRE ALARM ZONE WIRING AND CAUSE-AND-EFFECT
  # ============================================================
  - id: "DEP-MEP-065"
    trigger: "fire_alarm_system"
    required_items: ["zone_wiring_diagram", "cause_and_effect_matrix", "integration_with_hvac_and_fire_suppression"]
    trade: "fire_safety"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 2189"
    note: "Fire alarm zone wiring diagram showing which detectors are on each zone is required for panel programming and troubleshooting; cause-and-effect matrix (C&E matrix) documents exactly which outputs (HVAC shutdown, door release, sprinkler alert, PA evacuation) are triggered by which detector zone and alarm level — without a verified C&E matrix, incorrect sequences (e.g., not shutting down fresh air during fire) negate the fire protection strategy"

  # ============================================================
  # SPRINKLER HYDRAULIC CALCULATION AND PUMP SIZING
  # ============================================================
  - id: "DEP-MEP-066"
    trigger: "fire_sprinkler_system"
    required_items: ["hydraulic_calculation_most_remote_zone", "pump_sizing_from_calculation", "tank_sizing_30_min_operation"]
    trade: "fire_safety"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 15105"
    note: "Hydraulic calculation for the most hydraulically unfavourable zone determines required inlet pressure and flow — pump must be selected to deliver this pressure at full design flow; IS 15105 specifies tank capacity for minimum 30 minutes operation at design flow rate; using rule-of-thumb pump sizing (very common in India) routinely results in insufficient pressure at upper-floor sprinklers and is only discovered during commissioning testing when pump motor overloads"

  # ============================================================
  # HVAC TAB REPORT
  # ============================================================
  - id: "DEP-MEP-067"
    trigger: "hvac_commissioning"
    required_items: ["tab_report_testing_adjusting_balancing", "air_flow_measured_at_each_grille", "water_flow_balanced_each_coil"]
    trade: "hvac"
    priority: 1
    condition: ""
    building_types: ["commercial", "hospital", "hotel"]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "ASHRAE"
    note: "TAB (Testing, Adjusting, Balancing) report is mandatory for complex HVAC systems — air flow must be measured (Pitot tube or anemometer) at every supply and return grille and adjusted to design CFM by volume control dampers; chilled water flow must be balanced at each AHU coil; without TAB, some zones are overcooled and others are sweltering; TAB by a certified AABC/NEBB contractor provides a legal commissioning record required for LEED/GRIHA rating"

  # ============================================================
  # LIFT MACHINE ROOM VENTILATION AND LIGHTING
  # ============================================================
  - id: "DEP-MEP-068"
    trigger: "lift_machine_room"
    required_items: ["machine_room_ventilation_10_ach", "machine_room_lighting_200_lux", "pit_drainage_sump"]
    trade: "vertical_transport"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 14665"
    note: "IS 14665 Part 5 requires lift machine room to be maintained below 40°C — 10 ACH ventilation (supply and extract) is needed for heat generated by drive motors and transformers; 200 lux lighting is required for maintenance work in machine room; pit drainage sump prevents water accumulation from condensation and roof leaks that damage controller electronics at the bottom of the pit"

  # ============================================================
  # VRF REFRIGERANT PIPING CALCULATION AND LEAK TEST
  # ============================================================
  - id: "DEP-MEP-069"
    trigger: "vrf_vrvs_system"
    required_items: ["refrigerant_piping_length_calculation", "oil_return_slope_check", "nitrogen_pressure_test_before_refrigerant_charge", "leak_test_electronic_detector"]
    trade: "hvac"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: ""
    note: "VRF piping total equivalent length must be within manufacturer's limits (typically 200-300m) — excessive piping length causes refrigerant distribution problems and reduced capacity; oil return slope (minimum 1:250 on horizontal runs away from compressor) prevents oil accumulating in piping; nitrogen pressure test at 1.5x design pressure before refrigerant charging finds leaks — R410A/R32 refrigerant is expensive and environmentally harmful; electronic leak detector must be used post-charge as a final check"

  # ============================================================
  # FIRE DAMPER AND TESTING
  # ============================================================
  - id: "DEP-MEP-070"
    trigger: "hvac_duct_through_fire_wall"
    required_items: ["fire_damper_at_every_fire_wall_penetration", "fire_damper_access_door", "fire_damper_test_certificate"]
    trade: "hvac"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "NBC Part 4"
    note: "Every HVAC duct penetrating a fire-rated wall or slab must have a fire damper rated equal to or greater than the wall rating — without fire dampers, ducts become chimneys carrying fire and smoke between compartments; each fire damper must have an access door of adequate size for fusible link replacement; fire damper test certificate (drop test and thermal trip test) is required for fire NOC; dampers must be inspected annually per NBC"

  # ============================================================
  # MEDICAL GAS ZONE VALVE AND ALARMS
  # ============================================================
  - id: "DEP-MEP-071"
    trigger: "medical_gas_piping"
    required_items: ["zone_valve_box_each_ward", "area_alarm_panel", "pressure_test_and_purity_test"]
    trade: "medical"
    priority: 1
    condition: ""
    building_types: ["hospital"]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 7484"
    note: "Medical gas zone valve box in each ward allows isolation of that ward without cutting gas to the whole floor — essential for maintenance and emergency shutdown; area alarm panels display gas pressure and sound audible alarm if pressure drops outside 90-110% of design; pressure test at 1.5x working pressure and gas purity test per IS 7484 are mandatory before commissioning — contaminated medical oxygen is a direct patient safety risk"

  # ============================================================
  # PRECISION AIR CONDITIONING DATA CENTRE
  # ============================================================
  - id: "DEP-MEP-072"
    trigger: "precision_air_conditioning"
    required_items: ["pac_unit_n_plus_1_redundancy", "temperature_humidity_control", "underfloor_air_delivery", "ec_fan_motor"]
    trade: "hvac"
    priority: 1
    condition: ""
    building_types: ["data_center"]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "TIA-942"
    note: "PAC (Precision Air Conditioning) units for data centres must maintain temperature 18-27°C and humidity 40-60%RH per ASHRAE A1-class server environment; N+1 redundancy ensures no single PAC failure causes thermal runaway; underfloor air delivery through perforated tiles aims cold air directly at server intake; EC (electronically commutated) fan motors are 30-40% more efficient than AC fans and provide variable speed control"

  # ============================================================
  # SMOKE EXTRACTION DESIGN
  # ============================================================
  - id: "DEP-MEP-073"
    trigger: "smoke_extraction_system"
    required_items: ["smoke_exhaust_fan_high_temp_rated_400c_2hr", "smoke_duct_class_b_minimum", "makeup_air_50pct_of_exhaust"]
    trade: "hvac"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: ["basement", "atrium"]
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "NBC Part 4"
    note: "Smoke exhaust fans in fire mode must operate at 400°C for minimum 2 hours (certified per EN 12101-3) — standard AC fans fail within minutes in smoke; smoke ductwork must be Class B minimum (60-minute fire resistance) to ensure smoke is exhausted through the designated path; makeup air (50% of exhaust) prevents excessive negative pressure that prevents building exit doors from opening and limits smoke-filling delay"

  # ============================================================
  # LIFT ANNUAL MAINTENANCE CONTRACT
  # ============================================================
  - id: "DEP-MEP-074"
    trigger: "elevator_commissioning"
    required_items: ["lift_amc_first_year_included", "lift_log_book", "emergency_rescue_procedure"]
    trade: "vertical_transport"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 14665"
    note: "Lift AMC (annual maintenance contract) for at least the first year must be included in handover package — lift without AMC will have no maintenance until residents negotiate separately, during which period the lift may fail and trap passengers; lift log book (IS 14665 requirement) records all maintenance visits, tests, and incidents; emergency rescue procedure must be posted in machine room for fire brigade and maintenance staff"

  # ============================================================
  # HVAC NOISE CRITERIA
  # ============================================================
  - id: "DEP-MEP-075"
    trigger: "hvac_ductwork"
    required_items: ["duct_velocity_within_nc_limits", "duct_lining_if_noise_criterion_nc35_or_lower", "flexible_duct_connection_ahu_to_main_duct"]
    trade: "hvac"
    priority: 2
    condition: "noise_sensitive_area"
    building_types: ["hotel", "hospital", "commercial"]
    room_types: ["bedroom", "conference_room", "ot"]
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "ASHRAE"
    note: "Hotel bedrooms require NC-30 (equivalent to 35 dB background noise); duct velocity above 5 m/s in branch ducts causes audible noise from turbulence; acoustic duct lining (25mm mineral wool) required in supply ducts serving quiet areas; flexible duct connection between AHU discharge and rigid ductwork absorbs vibration and prevents motor hum from being transmitted along the duct — a common cause of noise complaints in hotel rooms above plant rooms"

  # ============================================================
  # ELECTRICAL ROOM COOLING
  # ============================================================
  - id: "DEP-MEP-076"
    trigger: "electrical_room_hvac"
    required_items: ["cooling_system_electrical_room", "temperature_below_40c", "separate_cooling_from_common_system"]
    trade: "hvac"
    priority: 1
    condition: ""
    building_types: ["commercial", "hospital", "data_center"]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 8623"
    note: "Electrical rooms with switchgear, UPS, and transformers generate significant heat — transformer rooms require 10 ACH ventilation with inlet/exhaust vented outside; IS 8623 requires switchgear to operate below 40°C ambient; electrical room cooling must be independent from common HVAC (dedicated splits or ventilation) so electrical systems remain cool even if main building HVAC fails"

  # ============================================================
  # HELIPAD NAVIGATION LIGHTS
  # ============================================================
  - id: "DEP-MEP-077"
    trigger: "helipad"
    required_items: ["perimeter_lights_red_low_intensity", "floodlighting_500_lux_at_pad", "wind_cone", "aviation_authority_noc"]
    trade: "electrical"
    priority: 1
    condition: ""
    building_types: ["hospital", "hotel"]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "DGCA"
    note: "Hospital and hotel helipads require DGCA NOC and must have: perimeter low-intensity steady red lights; pad flood lighting at 500 lux; wind cone to indicate wind direction; edge lighting must be fail-safe on UPS power — missing or failed helipad lighting prevents night or poor-visibility operations and can be a life-safety issue for emergency medical evacuations"

  # ============================================================
  # AUTOMATIC TRANSFER SWITCH
  # ============================================================
  - id: "DEP-MEP-078"
    trigger: "power_changeover"
    required_items: ["ats_automatic_transfer_switch", "transfer_time_below_15_seconds", "interlocking_between_mains_and_dg"]
    trade: "electrical"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 4722"
    note: "ATS must mechanically and electrically interlock mains and DG supplies to prevent paralleling — back-feeding mains supply onto DG is an extremely dangerous fault that can kill DISCOM linesmen working on the apparently dead supply; transfer time below 15 seconds is required for hospitals (NABH) and data centres; ATS logic must also handle 3-phase mains failure detection (loss of any one phase, not just all-three)"

  # ============================================================
  # HVAC REFRIGERANT LEAK DETECTION
  # ============================================================
  - id: "DEP-MEP-079"
    trigger: "refrigerant_system"
    required_items: ["refrigerant_leak_detector_enclosed_plant_room", "emergency_exhaust_fan_plant_room", "refrigerant_type_low_gwp"]
    trade: "hvac"
    priority: 1
    condition: "plant_room_enclosed"
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "ASHRAE 15"
    note: "Enclosed plant rooms with refrigerant-containing equipment require fixed refrigerant leak detectors per ASHRAE 15 — R410A is non-toxic but displaces oxygen at high concentration; R32 and R290 (propane) are mildly and highly flammable respectively; emergency exhaust fan must activate on leak detection to prevent dangerous concentrations; new systems should prefer low-GWP refrigerants (R32, R454B) to future-proof against HFC phase-down under the Kigali Amendment"

  # ============================================================
  # HVAC ENERGY EFFICIENCY
  # ============================================================
  - id: "DEP-MEP-080"
    trigger: "chiller_or_vrf_selection"
    required_items: ["minimum_cop_or_iplv_per_ecbc", "vfd_on_all_pumps_and_fans_above_11kw", "energy_meter_per_hvac_system"]
    trade: "hvac"
    priority: 2
    condition: ""
    building_types: ["commercial", "hotel", "hospital"]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "ECBC 2017"
    note: "ECBC 2017 specifies minimum efficiency for chillers (COP 5.5+ for screw, 6.0+ for centrifugal), VRF systems, and packaged units; VFDs on pumps and fans above 11kW are required by ECBC and save 40-60% of part-load energy which represents 80-90% of operating hours; sub-metering each major HVAC system enables fault detection, energy benchmarking, and GRIHA documentation"

  # ============================================================
  # COMPRESSED GAS CYLINDER STORAGE
  # ============================================================
  - id: "DEP-MEP-081"
    trigger: "medical_gas_cylinder_storage"
    required_items: ["cylinder_store_ventilated", "cylinder_chaining_to_wall", "oxidiser_fuel_separate_storage"]
    trade: "medical"
    priority: 1
    condition: ""
    building_types: ["hospital"]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 7484"
    note: "Medical gas cylinders (O2, N2O) must be stored in a dedicated, naturally ventilated room — oxygen-enriched atmosphere from leaking cylinders dramatically increases fire risk; cylinders must be chained or racked to prevent falling (a full oxygen cylinder falling and snapping its valve is a projectile hazard); oxidising gases (O2, N2O) and fuel gases (C2H2) must not be stored in the same compartment per PESO regulations"

  # ============================================================
  # HVAC OUTDOOR UNIT PLACEMENT
  # ============================================================
  - id: "DEP-MEP-082"
    trigger: "outdoor_unit_placement"
    required_items: ["minimum_clearance_for_air_discharge", "vibration_isolation_pads", "condenser_not_facing_prevailing_wind"]
    trade: "hvac"
    priority: 2
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: ""
    note: "Outdoor units require minimum clearance per manufacturer specification (typically 500mm on sides, 1000mm above) for condenser air discharge — recirculation of hot discharge air back to condenser inlet reduces cooling capacity by 10-25% and increases power consumption; vibration isolation pads prevent structure-borne noise transmission into occupied spaces; condenser should face away from the prevailing summer wind direction to avoid hot wind driving into the coil"

  # ============================================================
  # BMS OPEN PROTOCOL REQUIREMENT
  # ============================================================
  - id: "DEP-MEP-083"
    trigger: "bms_procurement"
    required_items: ["open_protocol_bacnet_or_modbus", "web_based_interface", "historian_data_logging"]
    trade: "hvac"
    priority: 2
    condition: ""
    building_types: ["commercial", "hospital", "hotel"]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: ""
    note: "BMS must use open protocols (BACnet/IP or Modbus TCP) so that future expansions and maintenance can be done by any qualified vendor — proprietary protocol BMS systems lock clients into a single vendor for life-cycle support at inflated prices; web-based interface allows remote monitoring via any browser without proprietary software; historian data logging (minimum 1-year storage) is required for ECBC energy reporting and GRIHA credit documentation"

  # ============================================================
  # ACCESS FLOOR FOR DATA CENTRE COOLING
  # ============================================================
  - id: "DEP-MEP-084"
    trigger: "data_centre_cooling"
    required_items: ["raised_floor_600mm_minimum", "perforated_tiles_in_cold_aisle", "blanking_panels_all_empty_rack_slots"]
    trade: "hvac"
    priority: 1
    condition: ""
    building_types: ["data_center"]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "TIA-942"
    note: "600mm underfloor plenum provides adequate airflow distribution to perforated floor tiles in cold aisles — insufficient plenum depth causes airflow starvation in remote rows; blanking panels in all empty rack unit spaces prevent hot server exhaust recirculating through empty slots to cold aisle (bypass airflow), which is the most common cause of hot spots in data centres and server thermal throttling"

  # ============================================================
  # FIRE SUPPRESSION FM200 / NOVEC DATA CENTRE
  # ============================================================
  - id: "DEP-MEP-085"
    trigger: "gas_fire_suppression_data_centre"
    required_items: ["agent_concentration_design_c_factor", "discharge_time_10_seconds_max", "room_integrity_test"]
    trade: "fire_safety"
    priority: 1
    condition: ""
    building_types: ["data_center"]
    room_types: ["server_room"]
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "NFPA 2001"
    note: "FM200 or Novec 1230 concentration must achieve design extinguishing concentration throughout the protected volume within 10 seconds — slow discharge allows fire to grow beyond suppressible limits; room integrity test (door fan test) verifies that protected room retains agent for minimum 10 minutes (hold time); unsealed floor/ceiling penetrations (cable entry points) routinely fail integrity tests and must be sealed with fire stop before system commissioning"

  # ============================================================
  # PRESSURISED STAIRCASE TESTING
  # ============================================================
  - id: "DEP-MEP-086"
    trigger: "staircase_pressurization_system"
    required_items: ["pressure_differential_test_50pa_minimum", "flow_test_with_doors_open", "commissioning_report"]
    trade: "fire_safety"
    priority: 1
    condition: "building_above_15m"
    building_types: [all]
    room_types: []
    min_floors: 5
    min_area_sqm: 0
    is_code_ref: "NBC Part 4"
    note: "NBC Part 4 requires staircase overpressure of minimum 50 Pa above the corridor with all exit doors closed — this prevents smoke entering the staircase; system must also be tested with one or more exit doors open (representing evacuation scenario) to ensure pressure differential is maintained; commissioning report documenting pressure readings at each floor is required for fire NOC; undertested pressurization systems fail to prevent smoke entry, which kills evacuees in staircase"

  # ============================================================
  # HVAC DUCT LEAKAGE TEST
  # ============================================================
  - id: "DEP-MEP-087"
    trigger: "hvac_ductwork"
    required_items: ["duct_leakage_test_class_b_max_6pct", "duct_sealing_mastic_at_joints"]
    trade: "hvac"
    priority: 2
    condition: "supply_duct_above_ceiling"
    building_types: ["commercial", "hospital", "hotel"]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "ASHRAE"
    note: "Ductwork leakage of 10-20% is common in Indian construction — poorly sealed duct joints dump conditioned air into the ceiling void, increasing HVAC energy consumption by 10-15%; ASHRAE duct leakage class B allows maximum 6% of design flow; duct sealing with mastic compound (not duct tape which dries and cracks) at all longitudinal seams and joints before ceiling closure must be contractually required; testing with duct blaster before ceiling closure is strongly recommended on large projects"

  # ============================================================
  # ELECTRICAL SUBSTATION EARTHING
  # ============================================================
  - id: "DEP-MEP-088"
    trigger: "electrical_substation"
    required_items: ["substation_earthing_mesh", "transformer_neutral_earthing", "touch_voltage_check"]
    trade: "electrical"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 3043"
    note: "Substation earthing mesh must achieve < 1 ohm for HT equipment per IS 3043; transformer neutral must be solidly earthed at the star point to provide a fault return path and stabilise phase voltages; touch voltage at earth pit conductors and equipment frames must be below 50V during a fault condition — high touch voltage during earth faults can be fatal; these calculations and tests are required before DISCOM energises HT equipment"

  # ============================================================
  # HVAC INDOOR AIR QUALITY MONITORING
  # ============================================================
  - id: "DEP-MEP-089"
    trigger: "commercial_hvac"
    required_items: ["co2_sensor_per_zone", "iaq_monitor_pm2_5_and_voc", "outside_air_damper_modulation_by_co2"]
    trade: "hvac"
    priority: 2
    condition: ""
    building_types: ["commercial", "hospital", "hotel", "school"]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "ASHRAE 62.1"
    note: "CO2 sensors per zone enable demand-controlled ventilation — when zone CO2 exceeds 1000 ppm, outside air damper opens to increase fresh air; IAQ monitors tracking PM2.5 and total VOC enable GRIHA/LEED credit documentation and real-time dashboard display (WELL Building Standard requirement in premium commercial and healthcare); post-COVID, building occupants increasingly expect IAQ to be monitored and displayed"

  # ============================================================
  # SOLAR THERMAL SYSTEM
  # ============================================================
  - id: "DEP-MEP-090"
    trigger: "solar_water_heating"
    required_items: ["solar_collector_area_calculation", "storage_tank_4_6_hours_capacity", "auxiliary_heating_backup", "scale_prevention_treatment"]
    trade: "plumbing"
    priority: 2
    condition: ""
    building_types: ["hotel", "hospital", "residential_apartment"]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 12933"
    note: "IS 12933 specifies solar collector area for different solar zones (Zone I-IV) — under-specification means the system cannot heat the full daily demand on cloudy days without heavy auxiliary dependence; storage tank at 4-6x daily hot water use allows overnight draw-down; auxiliary heating (electric element or heat pump) covers nights and monsoon periods; Indian hard water causes scale in collectors that reduces efficiency by 20-30% annually without anti-scale treatment (water softener or scale inhibitor dosing)"
