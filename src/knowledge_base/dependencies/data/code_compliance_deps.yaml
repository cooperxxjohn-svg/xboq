    note: "IS 456 Clause 15.2 mandates minimum 3 cube specimens per 50 cum or fraction thereof at every RCC pour — cubes cured in water for 28 days and tested at approved lab; test reports form part of the quality register required by structural consultants and local authorities before issuing completion certificate"

  # ============================================================
  # IS 1786 STEEL MILL TEST CERTIFICATE
  # ============================================================
  - id: "DEP-COD-052"
    trigger: "tmt_bar_purchase"
    required_items: ["mill_test_certificate_is1786", "heat_number_traceability"]
    trade: "structural"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 1786"
    note: "Every TMT bar delivery must be accompanied by the manufacturer's mill test certificate showing yield strength (min 500 MPa for Fe500D), UTS, elongation (min 16%), and chemical composition (C, S, P, CEV) per IS 1786 — bars without MTCs are presumed sub-standard and must be rejected; heat number traceability links bars to the specific melt batch"

  # ============================================================
  # IS 13920 SEISMIC ZONE III/IV DUCTILE DETAILING
  # ============================================================
  - id: "DEP-COD-053"
    trigger: "rcc_columns_seismic_zone_iii_iv"
    required_items: ["ductile_detailing_is13920", "confinement_zone_stirrups", "special_confining_reinforcement"]
    trade: "structural"
    priority: 1
    condition: "seismic_zone_iii_iv_v"
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 13920"
    note: "IS 13920 mandatory for all RCC buildings in seismic zone III and above: columns must have closely-spaced hoop reinforcement in confinement zones (top and bottom L_o = max(h, b/6, 450mm)); special confining reinforcement ensures column ductility under repeated cyclic seismic loading — non-compliance discovered during audit can require retrofitting entire column sets"

  # ============================================================
  # BUILDING ABOVE 30M STRUCTURAL ENGINEER INSPECTION
  # ============================================================
  - id: "DEP-COD-054"
    trigger: "building_above_30m"
    required_items: ["structural_engineer_inspection_certificate_periodic", "stage_completion_certificates"]
    trade: "structural"
    priority: 1
    condition: "height_above_30m"
    building_types: [all]
    room_types: []
    min_floors: 10
    min_area_sqm: 0
    is_code_ref: "Local Authority"
    note: "Buildings exceeding 30m height require structural engineer to issue inspection certificates at defined stages (foundation, plinth, each 5 floors) — many urban local bodies (MCGM Bye-law 42, BBMP Building Bye-laws) make this mandatory; without stage certificates, municipal officials can stop work and cancel building permission"

  # ============================================================
  # BUILDING PERMIT - AS-BUILT AND COMPLETION CERTIFICATE
  # ============================================================
  - id: "DEP-COD-055"
    trigger: "project_completion_permit"
    required_items: ["as_built_drawings_all_services", "completion_certificate_from_licensed_architect"]
    trade: "statutory"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "Model Building Bye-Laws"
    note: "Model Building Bye-Laws (TCPO) and all state building regulations require as-built drawings (architectural, structural, MEP) and completion certificate from the licensed architect/engineer of record before the local body issues an Occupancy Certificate — without OC, building cannot be legally occupied, insured, or sold"

  # ============================================================
  # GREEN BUILDING RATING - ENERGY SIMULATION AND DOCUMENTATION
  # ============================================================
  - id: "DEP-COD-056"
    trigger: "green_building_rating_target"
    required_items: ["energy_simulation_ecbc_compliance", "griha_or_leed_documentation", "commissioning_agent"]
    trade: "services"
    priority: 2
    condition: "griha_or_leed_or_igbc_targeted"
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "GRIHA/LEED/IGBC"
    note: "GRIHA, LEED, and IGBC ratings require energy simulation (e.g., EnergyPlus, eQUEST) showing compliance with ECBC 2017 baselines; documentation must be assembled credit-by-credit and submitted for third-party review; a commissioning agent is needed to verify that installed systems perform per design — starting documentation late in construction is a major cause of rating failures"

  # ============================================================
  # ACCESSIBILITY - RAMP, TACTILE PATH, ACCESSIBLE TOILET
  # ============================================================
  - id: "DEP-COD-057"
    trigger: "public_building_accessibility"
    required_items: ["ramp_1_in_12_gradient", "tactile_path_at_entry", "accessible_toilet_per_floor"]
    trade: "finishing"
    priority: 1
    condition: ""
    building_types: ["commercial", "hospital", "school", "hotel", "government", "retail_mall"]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "RPwD Act 2016 / NBC Part 3"
    note: "RPwD Act 2016 and NBC Part 3 Chapter 11 make barrier-free access mandatory for all public buildings: ramp gradient max 1:12 with handrails on both sides; tactile walking surface indicators (TWSI) from car park to building entry; at least one accessible unisex toilet per floor — non-compliance discovered during fire NOC or occupancy certificate process requires expensive retrofitting"

  # ============================================================
  # SWIMMING POOL - IS 3370 AND FINA SPEC
  # ============================================================
  - id: "DEP-COD-058"
    trigger: "swimming_pool_construction"
    required_items: ["is3370_water_tightness_test_pool", "fina_spec_check_competition_pool"]
    trade: "specialist"
    priority: 1
    condition: ""
    building_types: ["hotel", "residential_apartment", "sports"]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 3370"
    note: "Swimming pool shell is a liquid retaining structure designed per IS 3370 — water tightness test (fill and observe for 7 days, max 10mm drop) is mandatory before tiling; competition pools must also comply with FINA specifications for lane widths, depth, timing system, and lighting — non-compliant pools discovered after tiling require partial demolition"

  # ============================================================
  # HOSPITAL - MEDICAL GAS, CLEAN ROOM, INFECTION CONTROL
  # ============================================================
  - id: "DEP-COD-059"
    trigger: "hospital_construction"
    required_items: ["medical_gas_piping_is7484", "clean_room_classification", "infection_control_during_construction"]
    trade: "medical"
    priority: 1
    condition: ""
    building_types: ["hospital"]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 7484 / NABH"
    note: "Hospital medical gas piping (O2, N2O, vacuum, air) per IS 7484 must be pressure-tested, purged, and certified before commissioning; OT and ICU clean room classification (ISO class) requires HEPA filtration and particle count testing; infection control during construction (ICRA) prevents fungal spore contamination of clinical areas — NABH accreditation auditors specifically check all three"

  # ============================================================
  # SCHOOL - ACOUSTIC TREATMENT AND EMERGENCY ASSEMBLY
  # ============================================================
  - id: "DEP-COD-060"
    trigger: "school_construction"
    required_items: ["acoustic_treatment_classrooms", "emergency_assembly_area_designated"]
    trade: "finishing"
    priority: 1
    condition: ""
    building_types: ["school"]
    room_types: ["classroom"]
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "NBC Part 8"
    note: "NBC Part 8 specifies maximum reverberation time of 0.6 seconds for classrooms — acoustic panels or carpeting are needed especially in high-ceiling assemblies; emergency assembly area must be designated in site plan and marked on drawings as required by CBSE/CISCE affiliation norms and local fire NOC — schools without designated assembly areas are denied fire clearance"

  # ============================================================
  # IS 1893 SEISMIC ANALYSIS MANDATORY
  # ============================================================
  - id: "DEP-COD-061"
    trigger: "structural_design_all_buildings"
    required_items: ["seismic_load_analysis_is1893", "design_basis_report"]
    trade: "structural"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 1893"
    note: "IS 1893 makes seismic load analysis mandatory for all new buildings — the Design Basis Report (DBR) prepared by structural engineer defines seismic zone, importance factor, response reduction factor, and analysis method; structural drawings not accompanied by DBR are rejected by most municipal building plan approval authorities"

  # ============================================================
  # FIRE SAFETY - NOC REQUIREMENTS
  # ============================================================
  - id: "DEP-COD-062"
    trigger: "fire_noc_application"
    required_items: ["fire_noc_from_cfo", "fire_system_completion_certificate", "mock_drill_record"]
    trade: "fire_safety"
    priority: 1
    condition: "building_above_15m_or_occupancy_above_500sqm"
    building_types: [all]
    room_types: []
    min_floors: 5
    min_area_sqm: 0
    is_code_ref: "NBC Part 4"
    note: "Fire NOC from Chief Fire Officer is mandatory before occupancy for all buildings above 15m or commercial buildings above 500 sqm — requires all fire systems installed and commissioned, certificate from installer, and mock drill conducted with staff; without fire NOC, occupancy certificate is not issued"

  # ============================================================
  # IS 875 WIND LOAD COMPLIANCE
  # ============================================================
  - id: "DEP-COD-063"
    trigger: "structural_design"
    required_items: ["wind_load_analysis_is875", "basic_wind_speed_zone_map"]
    trade: "structural"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 875 Part 3"
    note: "IS 875 Part 3 wind load analysis must use the correct basic wind speed from the zone map for the project location (50m/s for most coastal cities, 39m/s for inland areas) — using a lower wind speed to save steel is a code violation; wind load is the governing lateral load above 15 floors in moderate seismic zones"

  # ============================================================
  # LIFT INSTALLATION LICENSE
  # ============================================================
  - id: "DEP-COD-064"
    trigger: "lift_installation"
    required_items: ["lift_license_from_factory_inspectorate", "is14665_compliance_certificate"]
    trade: "vertical_transport"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 4
    min_area_sqm: 0
    is_code_ref: "IS 14665"
    note: "Lifts require IS 14665 compliance and a license from the Chief Inspector of Factories and Boilers (or equivalent state authority) before commissioning — unlicensed lifts operating in buildings are illegal and expose owners to criminal liability; license requires annual renewal and safety inspection"

  # ============================================================
  # FACADE GLASS SAFETY
  # ============================================================
  - id: "DEP-COD-065"
    trigger: "glass_facade"
    required_items: ["toughened_or_laminated_glass", "glass_testing_certificate", "wind_pressure_check_facade"]
    trade: "facade"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 2553"
    note: "IS 2553 and NBC Part 3 require toughened or laminated safety glass for facades above ground level — untoughened glass shatters into dangerous shards; glass thickness must be checked against wind pressure (IS 875 Part 3); glass test certificates from manufacturer (EN 12150 / IS 2553) must accompany supply"

  # ============================================================
  # STRUCTURAL STABILITY OF FAÇADE
  # ============================================================
  - id: "DEP-COD-066"
    trigger: "external_cladding"
    required_items: ["cladding_design_wind_load", "anchor_design_approved", "periodic_facade_audit"]
    trade: "facade"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 3
    min_area_sqm: 0
    is_code_ref: "IS 875 Part 3"
    note: "Cladding systems must be wind-load-designed for the project location — anchor pull-out capacity must exceed design load by a safety factor of at least 2; periodic facade audit every 5 years is required in many states after high-rise cladding failures; unverified cladding anchors have caused multiple façade collapses in Indian cities"

  # ============================================================
  # STP COMPLIANCE
  # ============================================================
  - id: "DEP-COD-067"
    trigger: "stp_plant"
    required_items: ["stp_effluent_quality_cpcb_standards", "stp_operator_trained"]
    trade: "plumbing"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "CPCB Guidelines"
    note: "CPCB consent-to-operate requires treated effluent to meet standards: BOD < 10 mg/L, COD < 50 mg/L, TSS < 10 mg/L for irrigation reuse; treated water must be monitored monthly and records kept; an untrained operator is a common cause of STP failure leading to environmental violations and fines from SPCB"

  # ============================================================
  # LABOUR AND WORKER WELFARE COMPLIANCE
  # ============================================================
  - id: "DEP-COD-068"
    trigger: "construction_site"
    required_items: ["bocw_registration", "bocw_cess_payment", "worker_welfare_facilities"]
    trade: "preliminaries"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "BOCW Act 1996"
    note: "BOCW (Building and Other Construction Workers) Act mandates registration of any project worth > Rs.10 lakhs with Labour Department; 1% cess on project cost must be paid; welfare facilities — potable water, sanitation, first aid, crèche for 10+ children — are statutory; non-compliance results in stoppage of work orders and penalties"

  # ============================================================
  # DG SET NOISE COMPLIANCE
  # ============================================================
  - id: "DEP-COD-069"
    trigger: "dg_set_installation"
    required_items: ["acoustic_enclosure_dg", "exhaust_muffler", "noise_level_below_75dba_at_1m"]
    trade: "electrical"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "CPCB Noise Rules 2000"
    note: "CPCB Noise Pollution Rules 2000 and IS 3043 require DG sets to have acoustic enclosures reducing noise to < 75 dB(A) at 1m from enclosure; exhaust stacks must discharge above roof level to prevent re-entry; noise violations attract shutdown notices from SPCB — apartment residents filing complaints against DG noise are increasingly successful"

  # ============================================================
  # POTABLE WATER QUALITY
  # ============================================================
  - id: "DEP-COD-070"
    trigger: "potable_water_system"
    required_items: ["water_quality_test_is10500", "chlorination_residual_0_2_ppm"]
    trade: "plumbing"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 10500"
    note: "IS 10500 specifies potable water quality — pH 6.5-8.5, TDS < 500 mg/L, no coliform; water testing at tank and at point of use before handover is required by most local authorities; residual chlorine of 0.2 ppm at delivery point prevents bacterial regrowth in the distribution system — particularly critical for hospitals and schools"

  # ============================================================
  # OHS PLAN AND SITE SAFETY
  # ============================================================
  - id: "DEP-COD-071"
    trigger: "construction_safety"
    required_items: ["written_safety_plan", "safety_officer_bocw", "ppe_mandatory_site"]
    trade: "preliminaries"
    priority: 1
    condition: "project_above_50_workers"
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "BOCW Act 1996"
    note: "BOCW Rules require a written safety plan and a qualified Safety Officer for sites employing > 50 workers; PPE (hard hat, safety shoes, harness at height > 2m) is mandatory; non-compliance is a criminal offence under the Act with imprisonment up to 3 months — labour inspectors routinely issue stop-work orders on non-compliant sites"

  # ============================================================
  # ELECTRICAL INSPECTOR APPROVAL
  # ============================================================
  - id: "DEP-COD-072"
    trigger: "electrical_installation"
    required_items: ["electrical_inspector_test_clearance", "cei_licensed_supervisor"]
    trade: "electrical"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "CEA Regulations 2010"
    note: "Central Electricity Authority (Technical Standards) Regulations 2010 require electrical installations above 250V to be inspected and cleared by the Electrical Inspector before energisation; work must be executed under the supervision of a CEI-licensed electrical engineer — unlicensed installations cannot be connected to DISCOM supply, blocking occupancy"

  # ============================================================
  # FIRE SEPARATION BETWEEN OCCUPANCIES
  # ============================================================
  - id: "DEP-COD-073"
    trigger: "mixed_occupancy_building"
    required_items: ["fire_rated_compartmentation_2hr", "fire_doors_at_compartment_boundary"]
    trade: "fire_safety"
    priority: 1
    condition: ""
    building_types: ["mixed_use", "commercial", "retail_mall"]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "NBC Part 4"
    note: "NBC Part 4 requires 2-hour fire-rated compartmentation between different occupancy types (e.g., residential above commercial) — this limits fire spread and allows safe evacuation of one zone while the other burns; fire-rated walls and floors must be continuous with no penetrations except through fire-rated assemblies with intumescent seals"

  # ============================================================
  # AIR POLLUTION CONTROL FOR CONCRETE BATCHING
  # ============================================================
  - id: "DEP-COD-074"
    trigger: "on_site_batching_plant"
    required_items: ["dust_suppression_batching", "spcb_consent_to_operate", "vehicle_wheel_wash"]
    trade: "preliminaries"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "CPCB Air Quality Norms"
    note: "On-site concrete batching plants require SPCB Consent-to-Operate for air emissions; dust suppression (water sprays, enclosures) is mandatory; vehicle wheel-wash before exiting site prevents road mud — in cities with Construction Dust Action Plans (Delhi, Mumbai), non-compliance attracts site closure and fines up to Rs.50,000/day"

  # ============================================================
  # PLAN APPROVAL AND COMMENCEMENT CERTIFICATE
  # ============================================================
  - id: "DEP-COD-075"
    trigger: "construction_commencement"
    required_items: ["approved_building_plan_on_site", "commencement_certificate_from_authority"]
    trade: "statutory"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "Model Building Bye-Laws"
    note: "Approved building plan and commencement certificate must be available on site at all times — building without approved plan is an illegal structure liable for demolition; municipal officers routinely check for approved drawings during site inspections; commencement certificate fixes the permitted parameters (height, FAR, setbacks) that cannot be deviated from without fresh approval"

  # ============================================================
  # STRUCTURAL PEER REVIEW FOR HIGH-RISE
  # ============================================================
  - id: "DEP-COD-076"
    trigger: "high_rise_above_50m"
    required_items: ["structural_peer_review", "independent_structural_reviewer_certificate"]
    trade: "structural"
    priority: 1
    condition: "height_above_50m"
    building_types: [all]
    room_types: []
    min_floors: 15
    min_area_sqm: 0
    is_code_ref: "Local Authority"
    note: "Several state regulations (Maharashtra, Karnataka) require an independent structural peer review for buildings above 50m — an experienced structural engineer not associated with the project reviews the structural design for adequacy; this extra check catches design errors before construction, preventing costly retrofits or, in extreme cases, collapse"

  # ============================================================
  # CHILD PROTECTION FEATURES IN SCHOOLS
  # ============================================================
  - id: "DEP-COD-077"
    trigger: "school_safety"
    required_items: ["window_grills_max_100mm_gap", "staircase_balusters_max_100mm_gap", "safe_play_equipment"]
    trade: "finishing"
    priority: 1
    condition: ""
    building_types: ["school"]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "NBC Part 4"
    note: "NBC and school safety guidelines mandate window grills and staircase balusters with maximum 100mm gap to prevent children climbing through; play equipment must be verified safe (IS 15567); missing or inadequate child protection features are flagged during CBSE affiliation inspection and can result in school closure — liability claims for child accidents are significant"

  # ============================================================
  # NBC MINIMUM ROOM SIZES
  # ============================================================
  - id: "DEP-COD-078"
    trigger: "habitable_room"
    required_items: ["minimum_room_area_9_5sqm", "minimum_room_height_2_75m"]
    trade: "architectural"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: ["bedroom", "living_room"]
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "NBC Part 3"
    note: "NBC Part 3 mandates minimum floor area of 9.5 sqm for habitable rooms and minimum clear height of 2.75m (2.4m in mezzanine) — rooms below minimum dimensions are cited in building plan approvals as non-compliant and must be redesigned; undersized rooms also affect building valuation and RERA registration"

  # ============================================================
  # STRUCTURAL DESIGN DOCUMENTATION
  # ============================================================
  - id: "DEP-COD-079"
    trigger: "structural_drawing_submission"
    required_items: ["structural_design_report", "structural_drawings_signed_by_licensed_engineer"]
    trade: "structural"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "Local Authority"
    note: "All structural drawings submitted for building plan approval must be signed by a licensed structural engineer registered with the local body — unsigned or self-prepared structural drawings are rejected; the structural design report (design basis, load calculations, foundation design) must be retained on site and available for inspection throughout construction"

  # ============================================================
  # SOLAR WATER HEATER MANDATORY PROVISION
  # ============================================================
  - id: "DEP-COD-080"
    trigger: "residential_apartment_above_10units"
    required_items: ["solar_water_heater_provision", "rooftop_area_reserved_solar"]
    trade: "electrical"
    priority: 1
    condition: "above_10_dwelling_units"
    building_types: ["residential_apartment", "hotel", "hospital"]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "Local Bylaws / ECBC 2017"
    note: "Most state building rules and ECBC 2017 mandate solar water heater (SWH) provision for residential apartments above 10 units, hotels, and hospitals — rooftop structural load (typically 25 kg/sqm for SWH) must be accounted for in terrace slab design; SWH provision is checked during building plan approval and non-compliance can delay plan sanction"
