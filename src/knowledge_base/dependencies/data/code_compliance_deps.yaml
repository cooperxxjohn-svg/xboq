  # ============================================================
  # IS 456 CONCRETE CUBE TESTING COMPLIANCE
  # ============================================================
  - id: "DEP-COD-051"
    trigger: "rcc_pour"
    required_items: ["concrete_cube_samples_3_per_50cum", "cube_curing_28_days", "cube_test_report"]
