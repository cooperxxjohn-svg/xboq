rules:
  # ============================================================
  # FIRE SAFETY - BUILDING ABOVE 15M
  # ============================================================
  - id: "DEP-COD-001"
    trigger: "building_above_15m"
    required_items: ["fire_hydrant_system", "sprinkler_system", "smoke_detector", "fire_alarm_panel"]
    trade: "fire_safety"
    priority: 1
    condition: "height_above_15m"
    building_types: [all]
    room_types: []
    min_floors: 5
    min_area_sqm: 0
    is_code_ref: "NBC Part 4"
    note: "Buildings above 15m require fire hydrant, sprinkler, smoke detection, and alarm panel"

  - id: "DEP-COD-002"
    trigger: "building_above_15m"
    required_items: ["pressurized_staircase", "fire_rated_doors", "refuge_area"]
    trade: "fire_safety"
    priority: 1
    condition: "height_above_15m"
    building_types: [all]
    room_types: []
    min_floors: 5
    min_area_sqm: 0
    is_code_ref: "NBC Part 4"
    note: "Buildings above 15m require pressurized staircase, fire doors, and refuge area"

  - id: "DEP-COD-003"
    trigger: "building_above_15m"
    required_items: ["dg_for_fire_systems", "emergency_lighting_1hr", "exit_signage_illuminated"]
    trade: "fire_safety"
    priority: 1
    condition: "height_above_15m"
    building_types: [all]
    room_types: []
    min_floors: 5
    min_area_sqm: 0
    is_code_ref: "NBC Part 4"
    note: "Buildings above 15m: DG for fire systems, 1hr emergency lighting, illuminated exit signs"

  - id: "DEP-COD-004"
    trigger: "building_above_15m"
    required_items: ["wet_riser", "fire_pump_house", "fire_water_tank"]
    trade: "fire_safety"
    priority: 1
    condition: "height_above_15m"
    building_types: [all]
    room_types: []
    min_floors: 5
    min_area_sqm: 0
    is_code_ref: "NBC Part 4"
    note: "Buildings above 15m: wet riser, fire pump house, dedicated fire water tank"

  # ============================================================
  # SEISMIC DESIGN - DELHI NCR
  # ============================================================
  - id: "DEP-COD-005"
    trigger: "building_delhi_ncr"
    required_items: ["seismic_zone_iv_design", "ductile_detailing", "strong_column_weak_beam"]
    trade: "structural"
    priority: 1
    condition: "location_delhi_ncr"
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 1893"
    note: "Delhi NCR buildings require seismic zone IV design, ductile detailing, SCWB per IS 1893"

  - id: "DEP-COD-006"
    trigger: "building_delhi_ncr"
    required_items: ["special_moment_resisting_frame", "confinement_reinforcement"]
    trade: "structural"
    priority: 1
    condition: "location_delhi_ncr"
    building_types: [all]
    room_types: []
    min_floors: 3
    min_area_sqm: 0
    is_code_ref: "IS 13920"
    note: "Multi-storey buildings in Delhi NCR require SMRF and confinement reinforcement"

  - id: "DEP-COD-007"
    trigger: "seismic_zone_iii_iv_v"
    required_items: ["shear_wall_or_bracing", "foundation_tie_beam"]
    trade: "structural"
    priority: 1
    condition: "seismic_zone_iii_plus"
    building_types: [all]
    room_types: []
    min_floors: 4
    min_area_sqm: 0
    is_code_ref: "IS 1893"
    note: "Seismic zone III/IV/V multi-storey requires shear wall or bracing and foundation tie beams"

  # ============================================================
  # ACCESSIBILITY - DISABLED PERSONS
  # ============================================================
  - id: "DEP-COD-008"
    trigger: "public_building"
    required_items: ["ramp_1_12_gradient", "disabled_toilet", "tactile_flooring", "braille_signage", "wheelchair_access"]
    trade: "finishing"
    priority: 1
    condition: ""
    building_types: ["commercial", "hospital", "school", "hotel", "retail_mall", "government"]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "RPwD Act 2016"
    note: "Public buildings: ramp 1:12, disabled toilet, tactile floor, braille signage, wheelchair access"

  - id: "DEP-COD-009"
    trigger: "public_building"
    required_items: ["accessible_elevator", "grab_bars_toilet", "lowered_counter"]
    trade: "finishing"
    priority: 1
    condition: ""
    building_types: ["commercial", "hospital", "school", "hotel", "retail_mall", "government"]
    room_types: []
    min_floors: 2
    min_area_sqm: 0
    is_code_ref: "RPwD Act 2016"
    note: "Multi-storey public buildings: accessible lift, toilet grab bars, lowered counters"

  - id: "DEP-COD-010"
    trigger: "public_building"
    required_items: ["accessible_parking", "signage_international_symbol"]
    trade: "external"
    priority: 1
    condition: ""
    building_types: ["commercial", "hospital", "school", "hotel", "retail_mall", "government"]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "RPwD Act 2016"
    note: "Public buildings: accessible parking spaces with international symbol signage"

  # ============================================================
  # BUILDING ABOVE 24M
  # ============================================================
  - id: "DEP-COD-011"
    trigger: "building_above_24m"
    required_items: ["fire_lift", "refuge_floor_every_4_floors", "standby_dg_fire_systems"]
    trade: "fire_safety"
    priority: 1
    condition: "height_above_24m"
    building_types: [all]
    room_types: []
    min_floors: 8
    min_area_sqm: 0
    is_code_ref: "NBC Part 4"
    note: "Buildings above 24m: fire lift, refuge floor every 4 floors, standby DG for fire"

  - id: "DEP-COD-012"
    trigger: "building_above_24m"
    required_items: ["dual_staircase", "pressurized_lobby"]
    trade: "fire_safety"
    priority: 1
    condition: "height_above_24m"
    building_types: [all]
    room_types: []
    min_floors: 8
    min_area_sqm: 0
    is_code_ref: "NBC Part 4"
    note: "Buildings above 24m require dual staircases and pressurized lift lobbies"

  # ============================================================
  # COMMERCIAL ABOVE 500 SQM
  # ============================================================
  - id: "DEP-COD-013"
    trigger: "commercial_above_500sqm"
    required_items: ["fire_alarm_addressable", "sprinkler_system", "pa_voice_evacuation"]
    trade: "fire_safety"
    priority: 1
    condition: "commercial_above_500sqm"
    building_types: ["commercial", "retail_mall"]
    room_types: []
    min_floors: 0
    min_area_sqm: 500
    is_code_ref: "NBC Part 4"
    note: "Commercial above 500 sqm: addressable fire alarm, sprinklers, PA/voice evacuation"

  - id: "DEP-COD-014"
    trigger: "commercial_above_500sqm"
    required_items: ["emergency_lighting", "exit_signage", "fire_extinguishers"]
    trade: "fire_safety"
    priority: 1
    condition: "commercial_above_500sqm"
    building_types: ["commercial", "retail_mall"]
    room_types: []
    min_floors: 0
    min_area_sqm: 500
    is_code_ref: "NBC Part 4"
    note: "Commercial above 500 sqm: emergency lighting, exit signage, fire extinguishers"

  # ============================================================
  # ASSEMBLY BUILDING
  # ============================================================
  - id: "DEP-COD-015"
    trigger: "assembly_building"
    required_items: ["min_2_exits", "panic_hardware_doors", "emergency_lighting", "exit_signage"]
    trade: "fire_safety"
    priority: 1
    condition: ""
    building_types: ["auditorium", "cinema", "convention", "school", "temple", "mosque", "church"]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "NBC Part 4"
    note: "Assembly buildings: minimum 2 exits, panic hardware, emergency lighting, exit signs"

  - id: "DEP-COD-016"
    trigger: "assembly_building"
    required_items: ["aisle_width_min_1050mm", "seat_row_spacing_min_850mm"]
    trade: "finishing"
    priority: 1
    condition: ""
    building_types: ["auditorium", "cinema", "convention"]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "NBC Part 4"
    note: "Assembly building seating: min 1050mm aisle width, min 850mm row spacing"

  # ============================================================
  # BASEMENT PARKING
  # ============================================================
  - id: "DEP-COD-017"
    trigger: "basement_parking"
    required_items: ["mechanical_ventilation_6_ach", "co_detection", "jet_fans", "fire_sprinkler"]
    trade: "hvac"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: ["basement_parking"]
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "NBC Part 4"
    note: "Basement parking: 6 ACH ventilation, CO detection, jet fans, fire sprinkler"

  - id: "DEP-COD-018"
    trigger: "basement_parking"
    required_items: ["ramp_gradient_max_1_8", "vehicle_barrier", "fire_escape_stair"]
    trade: "structural"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: ["basement_parking"]
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "NBC Part 4"
    note: "Basement parking: max 1:8 ramp gradient, vehicle barriers, fire escape staircase"

  # ============================================================
  # HIGH RISE ABOVE 30M
  # ============================================================
  - id: "DEP-COD-019"
    trigger: "high_rise_above_30m"
    required_items: ["structural_wind_analysis", "facade_wind_design", "building_sway_limit"]
    trade: "structural"
    priority: 1
    condition: "height_above_30m"
    building_types: [all]
    room_types: []
    min_floors: 10
    min_area_sqm: 0
    is_code_ref: "IS 875 Part 3"
    note: "High-rise above 30m: wind analysis, facade wind design, sway limit check per IS 875"

  - id: "DEP-COD-020"
    trigger: "high_rise_above_30m"
    required_items: ["wind_tunnel_test"]
    trade: "structural"
    priority: 2
    condition: "height_above_60m"
    building_types: [all]
    room_types: []
    min_floors: 20
    min_area_sqm: 0
    is_code_ref: "IS 875 Part 3"
    note: "Buildings above 60m may require wind tunnel testing for facade and structural design"

  # ============================================================
  # ECBC COMPLIANCE
  # ============================================================
  - id: "DEP-COD-021"
    trigger: "ecbc_applicable"
    required_items: ["building_envelope_compliance", "hvac_efficiency", "lighting_power_density"]
    trade: "services"
    priority: 1
    condition: "commercial_above_100kw"
    building_types: ["commercial", "hotel", "hospital"]
    room_types: []
    min_floors: 0
    min_area_sqm: 500
    is_code_ref: "ECBC 2017"
    note: "ECBC applicable: building envelope, HVAC efficiency, lighting power density compliance"

  - id: "DEP-COD-022"
    trigger: "ecbc_applicable"
    required_items: ["solar_panel_provision", "swh_provision", "bms_energy_monitoring"]
    trade: "electrical"
    priority: 2
    condition: "ecbc_compliance"
    building_types: ["commercial", "hotel", "hospital"]
    room_types: []
    min_floors: 0
    min_area_sqm: 500
    is_code_ref: "ECBC 2017"
    note: "ECBC: solar panel provision, solar water heater, BMS energy monitoring"

  # ============================================================
  # ALL BUILDINGS - MANDATORY
  # ============================================================
  - id: "DEP-COD-023"
    trigger: "all_buildings"
    required_items: ["dpc_at_plinth", "anti_termite_treatment", "curing_7_days_min", "concrete_testing"]
    trade: "structural"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 456"
    note: "All buildings: DPC at plinth, anti-termite, minimum 7 days curing, concrete testing"

  - id: "DEP-COD-024"
    trigger: "all_buildings"
    required_items: ["fire_extinguisher_per_floor"]
    trade: "fire_safety"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "NBC Part 4"
    note: "All buildings require fire extinguishers on every floor"

  - id: "DEP-COD-025"
    trigger: "all_buildings"
    required_items: ["adequate_ventilation", "natural_light"]
    trade: "architectural"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "NBC Part 8"
    note: "All habitable rooms must have adequate ventilation and natural light per NBC"

  # ============================================================
  # STRUCTURAL DESIGN LOADS
  # ============================================================
  - id: "DEP-COD-026"
    trigger: "structural_design"
    required_items: ["dead_load_analysis", "live_load_per_use", "wind_load_analysis"]
    trade: "structural"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 875 Parts 1-3"
    note: "Structural design per IS 875: dead load, live load by use, wind load analysis"

  - id: "DEP-COD-027"
    trigger: "structural_design"
    required_items: ["seismic_load_analysis"]
    trade: "structural"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 1893"
    note: "Seismic load analysis mandatory for all buildings per IS 1893"

  # ============================================================
  # CONCRETE CODE COMPLIANCE
  # ============================================================
  - id: "DEP-COD-028"
    trigger: "rcc_construction"
    required_items: ["minimum_grade_m20", "cover_as_per_exposure"]
    trade: "structural"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 456"
    note: "RCC: minimum M20 grade, concrete cover as per exposure condition per IS 456"

  - id: "DEP-COD-029"
    trigger: "rcc_construction"
    required_items: ["minimum_reinforcement", "maximum_reinforcement", "lap_splice_length"]
    trade: "structural"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 456"
    note: "RCC detailing: minimum/maximum reinforcement limits, lap splice length per IS 456"

  # ============================================================
  # PLUMBING CODE COMPLIANCE
  # ============================================================
  - id: "DEP-COD-030"
    trigger: "plumbing_design"
    required_items: ["water_supply_per_capita", "drainage_per_capita"]
    trade: "plumbing"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 1172"
    note: "Water supply and drainage design per capita as per IS 1172 and local bylaws"

  - id: "DEP-COD-031"
    trigger: "plumbing_design"
    required_items: ["trap_on_every_drain", "vent_pipe_provision"]
    trade: "plumbing"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 2065"
    note: "Plumbing: trap on every drain point, vent pipe provision per IS 2065"

  # ============================================================
  # ELECTRICAL CODE COMPLIANCE
  # ============================================================
  - id: "DEP-COD-032"
    trigger: "electrical_design"
    required_items: ["load_calculation", "cable_sizing", "protection_coordination"]
    trade: "electrical"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 732"
    note: "Electrical design: load calculation, cable sizing, protection coordination per IS 732"

  - id: "DEP-COD-033"
    trigger: "electrical_design"
    required_items: ["rccb_mandatory", "mcb_per_circuit"]
    trade: "electrical"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 732"
    note: "RCCB mandatory for all installations, MCB per circuit per IS 732"

  # ============================================================
  # GREEN BUILDING COMPLIANCE
  # ============================================================
  - id: "DEP-COD-034"
    trigger: "green_building"
    required_items: ["rwh_mandatory", "swh_solar_water_heater", "led_lighting", "water_efficient_fixtures"]
    trade: "services"
    priority: 2
    condition: "green_rating_targeted"
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "GRIHA/IGBC"
    note: "Green building: RWH, solar water heater, LED lighting, water-efficient fixtures"

  - id: "DEP-COD-035"
    trigger: "green_building"
    required_items: ["stormwater_management", "construction_waste_management"]
    trade: "external"
    priority: 2
    condition: "green_rating_targeted"
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "GRIHA/IGBC"
    note: "Green building: stormwater management, construction waste management"

  # ============================================================
  # LIFT CODE COMPLIANCE
  # ============================================================
  - id: "DEP-COD-036"
    trigger: "lift_installation"
    required_items: ["lift_per_is_14665", "ard_device", "overload_protection"]
    trade: "vertical_transport"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 4
    min_area_sqm: 0
    is_code_ref: "IS 14665"
    note: "Lift installation per IS 14665 with ARD and overload protection"

  # ============================================================
  # NOISE AND ACOUSTIC COMPLIANCE
  # ============================================================
  - id: "DEP-COD-037"
    trigger: "noise_compliance"
    required_items: ["dg_acoustic_enclosure", "acoustic_barrier"]
    trade: "mechanical"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "CPCB Noise Rules"
    note: "DG set acoustic enclosure and barriers per CPCB noise standards"

  # ============================================================
  # RAIN WATER HARVESTING MANDATORY
  # ============================================================
  - id: "DEP-COD-038"
    trigger: "rwh_mandatory"
    required_items: ["rain_water_collection", "recharge_structure"]
    trade: "plumbing"
    priority: 1
    condition: "plot_above_100sqm"
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 100
    is_code_ref: "Local Bylaws"
    note: "RWH mandatory for plots above 100 sqm in most Indian cities"

  # ============================================================
  # STP MANDATORY
  # ============================================================
  - id: "DEP-COD-039"
    trigger: "stp_mandatory"
    required_items: ["stp_plant", "treated_water_reuse"]
    trade: "plumbing"
    priority: 1
    condition: "above_10000_sqft_or_20_dwelling"
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 930
    is_code_ref: "CPCB/Local Bylaws"
    note: "STP mandatory for buildings above 10000 sqft or 20 dwelling units"

  # ============================================================
  # SOLAR ENERGY PROVISION
  # ============================================================
  - id: "DEP-COD-040"
    trigger: "solar_mandatory"
    required_items: ["solar_panel_area_provision", "solar_water_heater"]
    trade: "electrical"
    priority: 1
    condition: ""
    building_types: ["residential_apartment", "hotel", "hospital"]
    room_types: []
    min_floors: 0
    min_area_sqm: 500
    is_code_ref: "Local Bylaws"
    note: "Solar provision mandatory in many states for buildings above 500 sqm"

  # ============================================================
  # PARKING REQUIREMENTS
  # ============================================================
  - id: "DEP-COD-041"
    trigger: "parking_provision"
    required_items: ["parking_per_local_bylaw", "visitor_parking", "disabled_parking"]
    trade: "external"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "Local Bylaws"
    note: "Parking provision as per local development control rules with visitor and disabled spaces"

  # ============================================================
  # FIRE ESCAPE AND EXIT REQUIREMENTS
  # ============================================================
  - id: "DEP-COD-042"
    trigger: "fire_escape"
    required_items: ["exit_width_per_occupancy", "travel_distance_max", "dead_end_max"]
    trade: "fire_safety"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "NBC Part 4"
    note: "Fire escape: exit width per occupancy, maximum travel distance, dead-end limit per NBC"

  - id: "DEP-COD-043"
    trigger: "fire_escape"
    required_items: ["staircase_width_min_1200mm", "staircase_enclosed"]
    trade: "fire_safety"
    priority: 1
    condition: "building_above_15m"
    building_types: [all]
    room_types: []
    min_floors: 5
    min_area_sqm: 0
    is_code_ref: "NBC Part 4"
    note: "Fire staircase: minimum 1200mm width, enclosed with fire doors above 15m"

  # ============================================================
  # STRUCTURAL STABILITY AND TESTING
  # ============================================================
  - id: "DEP-COD-044"
    trigger: "structural_stability"
    required_items: ["stability_check_overturning", "stability_check_sliding"]
    trade: "structural"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "IS 456"
    note: "Structural stability: overturning and sliding checks per IS 456"

  # ============================================================
  # NBC OCCUPANCY REQUIREMENTS
  # ============================================================
  - id: "DEP-COD-045"
    trigger: "occupancy_load"
    required_items: ["toilet_ratio_per_occupancy", "drinking_water_per_occupancy"]
    trade: "plumbing"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "NBC Part 8"
    note: "Toilet and drinking water provision per occupancy load as per NBC"

  # ============================================================
  # CONSTRUCTION SAFETY CODE
  # ============================================================
  - id: "DEP-COD-046"
    trigger: "construction_safety"
    required_items: ["safety_officer", "safety_equipment", "site_barricading"]
    trade: "preliminaries"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "BOCW Act"
    note: "Construction safety per BOCW Act: safety officer, equipment, barricading"

  # ============================================================
  # ELECTRICAL SAFETY CODE
  # ============================================================
  - id: "DEP-COD-047"
    trigger: "electrical_safety"
    required_items: ["cei_approval", "electrical_inspector_test"]
    trade: "electrical"
    priority: 1
    condition: ""
    building_types: [all]
    room_types: []
    min_floors: 0
    min_area_sqm: 0
    is_code_ref: "CEA Regulations"
    note: "Electrical safety: CEI approval and electrical inspector testing per CEA regulations"

  # ============================================================
  # FOOD SAFETY CODE
  # ============================================================
  - id: "DEP-COD-048"
    trigger: "commercial_kitchen"
    required_items: ["fssai_compliant_kitchen", "exhaust_hood", "grease_trap", "pest_control"]
    trade: "specialist"
    priority: 1
    condition: ""
