- id: RFI-MS-EL-011
  trigger_type: missing_spec
  trigger_keywords:
  - generator capacity
  - DG capacity
  - genset kVA
  - DG set rating
  trigger_trade: electrical
  question_template: 'Generator (DG set) capacity is mentioned but not defined for {area}. Please clarify:

    (a) Essential load schedule — which loads are on generator backup (lifts, common lighting, fire pump, UPS, HVAC)?

    (b) DG capacity in kVA at 0.8 power factor — prime rating or standby rating?

    (c) Number of DG sets — single unit or parallel operation for redundancy?

    (d) Voltage regulation and harmonic distortion limits — for UPS/inverter loads?

    '
  why_it_matters: DG set capacity must be based on essential load schedule, not total building load. A 100% backup DG (full load) costs 2-3x a 30% essential load DG. Prime vs standby rating is a frequent
    source of disputes — standby rating is 10% higher but for emergency use only. Non-linear loads (UPS, VFD) require generator with low harmonic distortion — standard DG sets may not be suitable. Wrong
    DG sizing causes tripping under load or wasted capital.
  suggested_resolution: Provide essential load schedule defining which loads are backed up and at what diversity. Specify DG capacity (prime/standby), voltage regulation, harmonic distortion limit, and
    approved makes.
  priority: high
