- id: RFI-MS-EL-012
  trigger_type: missing_spec
  trigger_keywords:
  - UPS backup
  - battery backup duration
  - UPS battery
  - inverter backup time
  trigger_trade: electrical
  question_template: 'UPS/inverter battery backup duration is not specified for {area}. Please clarify:

    (a) Backup duration — 15 minutes (standard for bridging to DG start), 1 hour (extended), or 4-8 hours (critical facilities)?

    (b) Load on UPS — computers/workstations only, or includes servers, medical equipment, and HVAC controls?

    (c) Battery type — VRLA (sealed lead-acid), tubular lead-acid, or lithium-ion?

    (d) Battery room requirement — ventilation, temperature control, and acid-proof flooring if VRLA?

    '
  why_it_matters: Backup duration drives battery bank size and cost significantly — 15-minute backup costs 20-30% of a 4-hour backup system. Lithium-ion batteries cost 2-3x VRLA but last 3-4x longer and
    require no maintenance. Battery rooms for large VRLA banks require dedicated ventilation (hydrogen gas emission) and acid-proof flooring — civil and MEP scope that must be planned early. Without specifying
    backup duration, the UPS vendor assumes minimum, which may be inadequate.
  suggested_resolution: Define UPS backup duration requirement for each critical load. Specify battery type and quantity. Include battery room requirements (size, ventilation, temperature) in civil/MEP
    scope.
  priority: medium
  building_types:
  - all
